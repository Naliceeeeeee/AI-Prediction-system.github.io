// Strip the heavy base64 dataURL from student-attached files so the students
// array stays well below the ~5MB localStorage quota. The file metadata
// (name/type/size) is preserved so the UI keeps showing "Uploaded: <name>".
const stripStudentFiles = (s) => {
  if(!s || typeof s !== "object") return s;
  const out = { ...s };
  if(out.medicalFormFile && out.medicalFormFile.data) {
    out.medicalFormFile = { name: out.medicalFormFile.name, type: out.medicalFormFile.type, size: out.medicalFormFile.size };
  }
  if(out.semesterResultFile && out.semesterResultFile.data) {
    out.semesterResultFile = { name: out.semesterResultFile.name, type: out.semesterResultFile.type, size: out.semesterResultFile.size };
  }
  return out;
};

const lsSet=(k,v)=>{
  try{
    let payload = v;
    // Heavy base64 file blobs would blow past the localStorage quota. Strip
    // them out so the rest of the student record (gpa, factors, …) always
    // persists. Without this the next read could return stale data and
    // predictions would vanish on the student dashboard.
    if(k === "dai_s" && Array.isArray(v)) payload = v.map(stripStudentFiles);
    localStorage.setItem(k, JSON.stringify(payload));
  }catch{
    // Last-ditch fallback: drop the file fields entirely and retry once so we
    // never lose the student record itself when the quota is exceeded.
    try{
      if(k === "dai_s" && Array.isArray(v)) {
        const slim = v.map(s => {
          const x = stripStudentFiles(s);
          if(x) { delete x.medicalFormFile; delete x.semesterResultFile; }
          return x;
        });
        localStorage.setItem(k, JSON.stringify(slim));
      }
    }catch{}
  }
};

// ─── EXPORT UTILITY ──────────────────────────────────────────────────────────
// Wraps every cell: escapes quotes, wraps in quotes so commas inside are safe.
// Prepends UTF-8 BOM so Excel opens it correctly without garbling characters.
const toCSVCell = (v) => {
  if(v == null) return '""';
  const s = String(v).replace(/"/g, '""');
  return `"${s}"`;
};
const downloadCSV = (filename, rows) => {
  if(!rows || rows.length === 0) return;
  const csvContent = rows.map(row => row.map(toCSVCell).join(",")).join("\n");
  // BOM makes Excel auto-detect UTF-8
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csvContent], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 200);
};

// ─── DEDUPLICATION UTILITIES ─────────────────────────────────────────────────
// Dedup students: keep the last record per unique id, then per unique sid,
// then per unique name (case-insensitive). Runs on load and every insertion.
const dedupStudents = (arr) => {
  const seenId   = new Map();
  const seenSid  = new Map();
  const seenName = new Map();
  // Process in order; later entries (more recent) win on id/sid collisions
  arr.forEach(s => {
    if(s.id  != null) seenId.set(String(s.id), s);
    if(s.sid)         seenSid.set(s.sid.trim().toUpperCase(), s);
  });
  // Build from seenId (primary key), then add any that only appear by sid
  const byId = Array.from(seenId.values());
  byId.forEach(s => {
    if(s.sid) seenName.set(s.name.trim().toLowerCase(), s);
  });
  // Return unique by id only — sid/name duplication rejected at insert time
  return byId;
};

// Check if a student already exists (by id, sid, or full name)
const studentExists = (existing, candidate) => {
  const name = (candidate.name || "").trim().toLowerCase();
  const sid  = (candidate.sid  || "").trim().toUpperCase();
  const id   = candidate.id != null ? String(candidate.id) : null;
  return existing.some(s =>
    (id   && String(s.id) === id)   ||
    (sid  && s.sid  && s.sid.trim().toUpperCase()  === sid)  ||
    (name && s.name && s.name.trim().toLowerCase() === name)
  );
};

// Dedup users: unique by id and email
const dedupUsers = (arr) => {
  const seenId    = new Map();
  const seenEmail = new Map();
  arr.forEach(u => {
    if(u.id    != null) seenId.set(String(u.id), u);
    if(u.email)         seenEmail.set(u.email.toLowerCase().trim(), u);
  });
  return Array.from(seenId.values());
};

// Check if a user already exists (by id or email)
const userExists = (existing, candidate) => {
  const email = (candidate.email || "").toLowerCase().trim();
  const id    = candidate.id != null ? String(candidate.id) : null;
  return existing.some(u =>
    (id    && String(u.id) === id) ||
    (email && u.email && u.email.toLowerCase().trim() === email)
  );
};

// ─── ML MODEL ─────────────────────────────────────────────────────────────────
const ML = {
  coef: [-0.9821, 0.6134],
  intercept: 1.247,
  mean: [2.89, 1.01],
  std:  [0.51, 0.82],
  trainedOn: "Mar 2026",
  trainAcc: 89.4,
  testAcc: 82.5,
  trainSize: 160,
  testSize: 40,
};
const sigmoid = x => 1 / (1 + Math.exp(-x));
// Mutable threshold ref — updated by SettingsPage
const THRESHOLD_REF = { value: 0.5 };

// ── Logistic Regression trainer (gradient descent) ────────────────────────────
function trainLogisticRegression(samples) {
  // samples: [{ features:[gpa,fin], label:0|1 }]
  if(samples.length < 5) return null;

  const n = samples.length;
  const nf = 2;

  // Compute mean and std for standardisation
  const mean = Array(nf).fill(0);
  const std  = Array(nf).fill(0);
  samples.forEach(s => s.features.forEach((v,i) => mean[i] += v));
  mean.forEach((_, i) => mean[i] /= n);
  samples.forEach(s => s.features.forEach((v,i) => std[i] += (v-mean[i])**2));
  std.forEach((_, i) => std[i] = Math.sqrt(std[i]/n) || 1);

  // Standardise features
  const X = samples.map(s => s.features.map((v,i) => (v-mean[i])/std[i]));
  const y = samples.map(s => s.label);

  // Gradient descent
  let w = Array(nf).fill(0);
  let b = 0;
  const lr = 0.1;
  const epochs = 1000;

  for(let e = 0; e < epochs; e++) {
    let dw = Array(nf).fill(0);
    let db = 0;
    for(let i = 0; i < n; i++) {
      const z = X[i].reduce((s,v,j) => s + v*w[j], b);
      const p = sigmoid(z);
      const err = p - y[i];
      X[i].forEach((v,j) => dw[j] += err * v);
      db += err;
    }
    w = w.map((v,j) => v - lr * dw[j] / n);
    b = b - lr * db / n;
  }

  // Compute train accuracy
  let correct = 0;
  for(let i = 0; i < n; i++) {
    const z = X[i].reduce((s,v,j) => s + v*w[j], b);
    const pred = sigmoid(z) >= THRESHOLD_REF.value ? 1 : 0;
    if(pred === y[i]) correct++;
  }
  const trainAcc = (correct / n * 100);

  return { coef:w, intercept:b, mean, std, trainAcc, trainSize:n };
}

// ── Extra non-academic risk factors (in log-odds units) ─────────────────────
// Every input the student/staff submits feeds the prediction, not just GPA.
// Each factor ALWAYS emits a row so the UI can show the full picture: if a
// student hasn't entered the field, the row carries contrib:0 and is flagged
// notSubmitted:true. This way "Factor Influence" lists every factor — even
// ones the student hasn't filled in yet — instead of silently hiding them.
function extraFactorContribs(s) {
  if (!s || typeof s !== "object") s = {};
  const has = v => v != null && v !== "" && !Number.isNaN(Number(v));
  const out = [];

  const pushFactor = (cfg) => {
    const provided = has(cfg.raw);
    out.push({
      key: cfg.key,
      label: cfg.label,
      color: cfg.color,
      contrib: provided ? cfg.contrib : 0,
      raw: provided ? Number(cfg.raw) : null,
      displayValue: provided ? cfg.displayValue : "Not submitted",
      notSubmitted: !provided,
    });
  };

  // AGE — capped to a *tiny* nudge (max ~+0.20 log-odds) so it never dominates
  // the prediction. Age on its own is a protected characteristic and using it
  // as a strong predictor would create age bias / disparate treatment.
  // The real reasons age sometimes correlates with dropout (working while
  // studying, heavy home responsibility, health issues, financial pressure)
  // are already separate factors below, so age here is just a minor context
  // signal — not a verdict on the student. A 60-year-old with a strong GPA,
  // stable finances and no family burden will NOT be flagged "at risk" by age.
  {
    const raw = s.age;
    const age = Number(raw);
    let c = 0;
    if (age >= 65)      c = 0.20;
    else if (age >= 55) c = 0.15;
    else if (age >= 45) c = 0.10;
    else if (age >= 35) c = 0.06;
    else if (age >= 30) c = 0.03;
    else if (age <= 16) c = 0.05;         // unusually young
    pushFactor({ key:"age", label:"Age", color:"#a855f7",
                 raw, contrib:c, displayValue: has(raw) ? `${age} yrs` : null });
  }

  // Fees status (0 stable · 1 moderate · 2 serious)
  {
    const raw = s.feesLevel;
    const v = Number(raw);
    const c = v >= 2 ? 1.3 : v === 1 ? 0.5 : 0;
    pushFactor({ key:"fees", label:"Fees status", color:"#fb923c",
                 raw, contrib:c,
                 displayValue: has(raw) ? (["Stable","Moderate","Serious"][v] || "—") : null });
  }

  // Family background support (0 strong · 1 average · 2 low)
  {
    const raw = s.familyBackground;
    const v = Number(raw);
    const c = v >= 2 ? 0.8 : v === 1 ? 0.3 : 0;
    pushFactor({ key:"family", label:"Family support", color:"#22d3ee",
                 raw, contrib:c,
                 displayValue: has(raw) ? (["Strong","Average","Low"][v] || "—") : null });
  }

  // Working while studying (0 no · 1 yes)
  {
    const raw = s.workingStatus;
    const v = Number(raw);
    const c = v >= 1 ? 0.45 : 0;
    pushFactor({ key:"working", label:"Working while studying", color:"#facc15",
                 raw, contrib:c,
                 displayValue: has(raw) ? (v ? "Yes" : "No") : null });
  }

  // Course is own choice (1 yes · 0 no)
  {
    const raw = s.courseChoice;
    const v = Number(raw);
    const c = v === 0 ? 0.7 : 0;
    pushFactor({ key:"choice", label:"Course is own choice", color:"#f87171",
                 raw, contrib:c,
                 displayValue: has(raw) ? (v ? "Yes" : "No") : null });
  }

  // Home responsibility (0 low · 1 moderate · 2 high)
  {
    const raw = s.homeResponsibility;
    const v = Number(raw);
    const c = v >= 2 ? 0.7 : v === 1 ? 0.25 : 0;
    pushFactor({ key:"home", label:"Home responsibility", color:"#60a5fa",
                 raw, contrib:c,
                 displayValue: has(raw) ? (["Low","Moderate","High"][v] || "—") : null });
  }

  // Health issues (0 no · 1 yes)
  {
    const raw = s.hasHealthIssue;
    const v = Number(raw);
    const c = v >= 1 ? 0.5 : 0;
    pushFactor({ key:"health", label:"Health issues", color:"#fb7185",
                 raw, contrib:c,
                 displayValue: has(raw) ? (v ? "Yes" : "No") : null });
  }

  // Medical form — ONLY relevant when the student has actually declared a
  // health issue. A perfectly healthy student should NOT be penalized for not
  // attaching a medical form they don't even need. When there's no declared
  // health issue (or it's unknown), the medical form row is marked
  // "Not applicable" and contributes 0 to the prediction.
  {
    const raw            = s.medicalFormSubmitted;
    const v              = Number(raw);
    const healthDeclared = Number(s.hasHealthIssue) === 1;
    const hasFile        = !!s.medicalFormFile;
    const submittedFlag  = has(raw) ? v === 1 : hasFile;   // accept either signal
    const contrib        = healthDeclared && !submittedFlag ? 0.35 : 0;
    const displayValue   = healthDeclared
      ? (submittedFlag ? "Submitted" : "Missing — health issue declared")
      : "Not applicable (no health issue)";
    out.push({
      key:"medical", label:"Medical form", color:"#94a3b8",
      contrib,
      raw: has(raw) ? v : null,
      displayValue,
      // We deliberately set notSubmitted=false when the form isn't required,
      // so the "missing factors" warning never fires for a healthy student.
      notSubmitted: healthDeclared && !submittedFlag,
      notApplicable: !healthDeclared,
    });
  }

  // Semester result document (1 yes · 0 no)
  {
    const raw = s.semesterResultSubmitted;
    const v = Number(raw);
    const c = v === 0 ? 0.45 : 0;
    pushFactor({ key:"sem", label:"Semester result document", color:"#a3e635",
                 raw, contrib:c,
                 displayValue: has(raw) ? (v ? "Submitted" : "Missing") : null });
  }

  return out;
}

// mlPredict — accepts either (gpa, fin) numerics or a full student-like object.
// When given a student object, every recorded factor (age, fees, family, working,
// course choice, home responsibility, health, medical form, semester result …)
// contributes to the risk score on top of the logistic-regression base.
function mlPredict(arg, finArg) {
  const s = (arg && typeof arg === "object")
    ? arg
    : { gpa: Number(arg) || 0, fin: Number(finArg) || 0 };

  const f = [Number(s.gpa) || 0, Number(s.fin) || 0];
  const std = f.map((v, i) => (v - ML.mean[i]) / ML.std[i]);
  let z = ML.intercept;
  std.forEach((v, i) => { z += ML.coef[i] * v; });

  // Layer in every extra factor the student entered (log-odds units)
  extraFactorContribs(s).forEach(e => { z += e.contrib; });

  const p = sigmoid(z);
  return { risk: p, prediction: p >= THRESHOLD_REF.value ? 1 : 0, confidence: Math.max(p, 1 - p) };
}

// mlImpacts — returns a per-factor breakdown so the UI can show every input
// that drove the prediction (not just GPA / Financial).
function mlImpacts(arg, finArg) {
  const s = (arg && typeof arg === "object")
    ? arg
    : { gpa: Number(arg) || 0, fin: Number(finArg) || 0 };

  const f = [Number(s.gpa) || 0, Number(s.fin) || 0];
  const hasGpa = s.gpa != null && s.gpa !== "" && !Number.isNaN(Number(s.gpa));
  const hasFin = s.fin != null && s.fin !== "" && !Number.isNaN(Number(s.fin));
  const base = [
    { key:"gpa",   label:"GPA",       color:"#14b8a6",
      raw: hasGpa ? Math.abs(ML.coef[0] * ((f[0] - ML.mean[0]) / ML.std[0])) : 0,
      displayValue: hasGpa ? Number(s.gpa).toFixed(2) : "Not submitted",
      notSubmitted: !hasGpa },
    { key:"fin",   label:"Financial", color:"#f59e0b",
      raw: hasFin ? Math.abs(ML.coef[1] * ((f[1] - ML.mean[1]) / ML.std[1])) : 0,
      displayValue: hasFin ? (["Good","Moderate","Poor"][Number(s.fin)] || "—") : "Not submitted",
      notSubmitted: !hasFin },
  ];
  const extras = extraFactorContribs(s).map(e => ({
    key:e.key, label:e.label, color:e.color,
    raw: Math.abs(e.contrib),
    displayValue: e.displayValue,
    notSubmitted: !!e.notSubmitted,
    notApplicable: !!e.notApplicable,
  }));
  const all = base.concat(extras);
  const total = all.reduce((sum, x) => sum + x.raw, 0) || 1;
  return all.map(x => ({
    key: x.key, label: x.label, color: x.color,
    impact: x.raw / total,
    displayValue: x.displayValue,
    notSubmitted: x.notSubmitted,
    notApplicable: !!x.notApplicable,
  }));
}

// ─── SEEDED PREDICTION HISTORY ───────────────────────────────────────────────
const makePredHistory = () => {
  const studs = makeStudents();
  const now = Date.now();
  const runBy = "Prof. James Mwangi";
  const out = [];
  studs.forEach((s, i) => {
    const phases = s.id <= 3 ? 3 : 1;
    for (let p = 0; p < phases; p++) {
      const periodIndex = p + 1;
      const y = Math.ceil(periodIndex / SEMESTERS_PER_YEAR);
      const sem = ((periodIndex - 1) % SEMESTERS_PER_YEAR) + 1;
      const gpaNudge = (p - (phases - 1)) * 0.12;
      const gpa = Math.max(1.5, Math.min(4.0, s.gpa + gpaNudge));
      const fin = s.fin;
      const res = mlPredict(gpa, fin);
      const meta = buildPeriodMeta({
        yearOfStudy: y,
        semesterInYear: sem,
        academicYearLabel: p === phases - 1 ? "2025/2026" : p === 0 ? "2024/2025" : "2024/2025",
        courseYears: 3,
      });
      out.push({
        res,
        student: { name:s.name, sid:s.sid, dept:s.dept, year:`Year ${y}`, gpa, fin },
        ts: new Date(now - (studs.length - i) * 6 * 60 * 60 * 1000 - (phases - 1 - p) * 120 * 24 * 60 * 60 * 1000).toISOString(),
        by: runBy,
        studentId: s.id,
        ...meta,
      });
    }
  });
  return out.sort((a, b) => new Date(b.ts) - new Date(a.ts));
};

const SEMESTERS_PER_YEAR = 2;

function totalCourseSemesters(courseYears) {
  const y = Math.max(1, Math.min(6, parseInt(courseYears, 10) || 3));
  return y * SEMESTERS_PER_YEAR;
}

function parseYearOfStudy(yearStr) {
  const m = String(yearStr || "").match(/(\d+)/);
  return m ? Math.min(6, Math.max(1, parseInt(m[1], 10))) : 1;
}

function studentSemesterInYear(s) {
  const v = parseInt(s?.semesterInYear, 10);
  return v === 2 ? 2 : 1;
}

/** e.g. "Year 2 · Sem 1" for dashboard copy */
function formatStudentPeriodLine(s, fallbackUser = null) {
  const src = s || fallbackUser;
  const yRaw = String(src?.year || "").trim();
  const sem = studentSemesterInYear(src);
  if (!yRaw) return `Semester ${sem}`;
  return `${yRaw} · Sem ${sem}`;
}

/** One-based semester index along the full programme (1 … totalSemesters). */
function buildPeriodMeta({ yearOfStudy, semesterInYear, academicYearLabel, courseYears }) {
  const cy = Math.max(1, Math.min(6, parseInt(courseYears, 10) || 3));
  const y = Math.max(1, Math.min(cy, parseInt(yearOfStudy, 10) || 1));
  const sem = parseInt(semesterInYear, 10) === 2 ? 2 : 1;
  const totalSemesters = totalCourseSemesters(cy);
  const periodIndex = Math.min(totalSemesters, (y - 1) * SEMESTERS_PER_YEAR + sem);
  const ay = (academicYearLabel || "").trim();
  const periodLabel = `Year ${y} · Sem ${sem}${ay ? ` · ${ay}` : ""}`;
  return { periodIndex, periodLabel, totalSemesters, academicYear: ay, yearOfStudy: y, semesterInYear: sem };
}

  padding: 9px 12px; color: var(--tx); font-family: var(--sans); font-size: 13px; width: 100%; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
/* Native combobox must look obviously clickable on every theme. Also make
   sure nothing is masking pointer events on top of the select. */
select { cursor: pointer; appearance: auto; -webkit-appearance: menulist; }
select:disabled { cursor: not-allowed; opacity: .55; }
input:focus, select:focus, textarea:focus {
  border-color: var(--primary, #3b82f6);
  box-shadow: 0 0 0 3px var(--primary-glow, rgba(59,130,246,.12));
}
input[type=range] { background: none; border: none; padding: 0; cursor: pointer; accent-color: var(--primary, #3b82f6); }
/* Dropdown options must be readable on BOTH themes — without this the
   native combobox inherits a dark background on dark theme and a default
   dark text colour, so options can render dark-on-dark and look "blank" /
   unclickable. Force matching text + background for every option. */
select option,
select optgroup {
  background: var(--sur);
  color: var(--tx);
  font-family: var(--sans);
  padding: 6px 10px;
}
select option:disabled { color: var(--tx3); }
select option:checked { background: var(--primary, #3b82f6); color: #fff; }
textarea { resize: vertical; min-height: 72px; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 4px; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideRight { from { opacity:0; transform:translateX(-18px) translateY(6px) scaleX(0.92); } to { opacity:1; transform:translateX(0) translateY(0) scaleX(1); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes fillBar { from { width:0; } to { width: var(--w); } }
@keyframes spinContinuous { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes topbarBounce {
  0%,100% { transform: translateX(0) rotate(0deg); }
  20%     { transform: translateX(-5px) rotate(-8deg); }
  40%     { transform: translateX(5px) rotate(8deg); }
  60%     { transform: translateX(-3px) rotate(-4deg); }
  80%     { transform: translateX(3px) rotate(4deg); }
}
.topbar-icon-animated {
  animation: topbarBounce 3s ease-in-out infinite;
}
.topbar-icon-animated:nth-child(2) { animation-delay: .4s; }
.topbar-icon-animated:nth-child(3) { animation-delay: .8s; }
.topbar-icon-animated:nth-child(4) { animation-delay: 1.2s; }
.gear-spin { animation: spinContinuous 4s linear infinite; }
.theme-swatch-panel {
  position: absolute;
  top: 46px;
  right: 0;
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 14px 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.55);
  z-index: 500;
  animation: fadeUp .15s ease;
  min-width: 200px;
}`;

// ─── RESPONSIVE GRID COMPONENT ───────────────────────────────────────────────
// Wraps children in a grid that collapses on mobile
const RGrid = ({ cols=2, gap=16, children, style={} }) => {
  const cls = cols === 4 ? "responsive-grid-4" : cols === 3 ? "responsive-grid-3" : cols === 2 ? "responsive-grid-2" : "";
  return (
    <div className={cls} style={{ gap, ...style }}>{children}</div>
  );
};

// ─── STYLE HELPERS ────────────────────────────────────────────────────────────
const S = {
  // Layout
  flex:   (gap=0, align="center", justify="flex-start") => ({ display:"flex", alignItems:align, justifyContent:justify, gap }),
  col:    (gap=0) => ({ display:"flex", flexDirection:"column", gap }),
  grid:   (cols, gap=16) => ({ display:"grid", gridTemplateColumns:cols, gap }),
  // Cards
  card:   (p=20) => ({ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:14, padding:p, boxShadow:"0 2px 12px rgba(0,0,0,.15)" }),
  card2:  (p=16) => ({ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:12, padding:p, boxShadow:"0 4px 18px rgba(0,0,0,.18)" }),

  sub:    { fontSize:13, color:"var(--tx2)", lineHeight:1.6 },

  // Misc
  divider:{ height:1, background:"var(--bdr)", margin:"16px 0" },

// ─── PRIMITIVE COMPONENTS ─────────────────────────────────────────────────────
const Btn = ({ children, variant="primary", size="md", onClick, disabled, style={}, ...p }) => {
  const vars = {
    primary: { bg:"var(--primary,#3b82f6)", color:"#fff", border:"none" },
    ghost:   { bg:"var(--sur2)", color:"var(--tx2)", border:"1px solid var(--bdr)" },
    danger:  { bg:"rgba(239,68,68,.1)", color:"var(--red)", border:"1px solid rgba(239,68,68,.3)" },
    success: { bg:"rgba(16,185,129,.1)", color:"var(--green)", border:"1px solid rgba(16,185,129,.3)" },
  };
  const sizes = { sm:{padding:"5px 12px",fontSize:11,borderRadius:7}, md:{padding:"9px 18px",fontSize:13,borderRadius:9}, lg:{padding:"12px 24px",fontSize:14,borderRadius:10,width:"100%",justifyContent:"center"} };
  const v = vars[variant] || vars.primary;
  const sz = sizes[size] || sizes.md;
  return (
    <button onClick={onClick} disabled={disabled} {...p}
      style={{ display:"inline-flex", alignItems:"center", gap:7, fontFamily:"var(--sans)", fontWeight:600, cursor:disabled?"not-allowed":"pointer", opacity:disabled?.5:1, transition:"all .15s", ...v, ...sz, ...style }}
      onMouseEnter={e => { if(!disabled) { e.currentTarget.style.filter="brightness(1.1)"; e.currentTarget.style.transform="translateY(-1px)"; }}}
      onMouseLeave={e => { e.currentTarget.style.filter=""; e.currentTarget.style.transform=""; }}>

const FinBadge = ({ fin }) => {

// ─── GAUGE ────────────────────────────────────────────────────────────────────
const RiskGauge = ({ score, isRisk }) => {
  const pct = (score * 100).toFixed(1);
  const fillColor = isRisk ? "#ef4444" : "#10b981";
  return (
    <div style={{ margin:"14px 0" }}>
      <div style={{ ...S.flex(0,"center","space-between"), fontSize:12, color:"var(--tx3)", marginBottom:6 }}>
        <span>Low Risk</span>
        <span style={{ fontFamily:"var(--mono)", fontWeight:700, color: isRisk?"var(--red)":"var(--green)", fontSize:14 }}>{pct}%</span>
        <span>High Risk</span>
      </div>
      <div style={{ height:10, background:"rgba(255,255,255,.05)", borderRadius:5, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:fillColor, borderRadius:5, transition:"width 1.2s cubic-bezier(.34,1.56,.64,1)" }} />
      </div>
    </div>
  );
};

// ─── MINI BAR CHART ───────────────────────────────────────────────────────────
const MiniBar = ({ data, color="#3b82f6" }) => {
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div style={{ ...S.flex(8,"flex-end") }}>
      {data.map((d, i) => (
        <div key={i} style={{ ...S.col(4, "center"), flex:1 }}>
          <div style={{ fontSize:9, color:"var(--tx3)", textAlign:"center" }}>{d.label}</div>
          <div style={{ width:"100%", height:80, background:"rgba(255,255,255,.04)", borderRadius:4, position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", bottom:0, width:"100%", height:`${(d.value/max)*100}%`, background:color, opacity:.8, borderRadius:"4px 4px 0 0", transition:"height .6s ease" }} />
          </div>
          <div style={{ fontFamily:"var(--mono)", fontSize:10, color, textAlign:"center" }}>{d.value}</div>
        </div>
      ))}
    </div>
  );
};

// ─── DONUT ────────────────────────────────────────────────────────────────────
const Donut = ({ value, total, color="#ef4444", label, onClick }) => {
  const pct = total > 0 ? (value / total) * 100 : 0;
  const r = 36, circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <div onClick={onClick}
      style={{ textAlign:"center", cursor:onClick?"pointer":"default", padding:"8px 12px", borderRadius:12, transition:"all .2s", border:"1px solid transparent" }}
      onMouseEnter={e=>{ if(onClick){ e.currentTarget.style.background=`${color}12`; e.currentTarget.style.borderColor=`${color}40`; e.currentTarget.style.transform="translateY(-3px)"; }}}
      onMouseLeave={e=>{ if(onClick){ e.currentTarget.style.background=""; e.currentTarget.style.borderColor="transparent"; e.currentTarget.style.transform=""; }}}>
      <svg width={100} height={100} viewBox="0 0 100 100" style={{ transform:"rotate(-90deg)" }}>
        <circle cx={50} cy={50} r={r} fill="none" stroke={color} strokeWidth={10} strokeOpacity={0.15} />
        <circle cx={50} cy={50} r={r} fill="none" stroke={color} strokeWidth={10}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{ transition:"stroke-dasharray .8s ease" }} />
      </svg>
      <div style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:700, color, marginTop:-4 }}>{pct.toFixed(0)}%</div>
      <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{label}</div>
      <div style={{ fontSize:10, fontWeight:700, color, marginTop:2 }}>{value} students</div>
      {onClick && <div style={{ fontSize:9, color:"var(--tx3)", marginTop:2 }}>Click to filter ↓</div>}
    </div>
  );
};

// ─── PREDICTION RESULT CARD ───────────────────────────────────────────────────
const PredictionResultCard = ({ result, student, showDetails=true }) => {
  const { risk, prediction, confidence } = result;
  const isRisk = prediction === 1;
  const impacts = mlImpacts(student);
  const recs = buildRecs(isRisk, student);

  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      <div style={{ background: isRisk ? "rgba(239,68,68,.08)" : "rgba(16,185,129,.08)", border:`1px solid ${isRisk?"rgba(239,68,68,.25)":"rgba(16,185,129,.25)"}`, borderRadius:12, padding:20, marginBottom:14 }}>
        <div style={{ fontSize:36, marginBottom:8 }}>{isRisk ? <i className="fa fa-exclamation-triangle" style={{color:"var(--red)",fontSize:36}}></i> : <i className="fa fa-check-circle" style={{color:"var(--green)",fontSize:36}}></i>}</div>
        <div style={{ fontSize:11, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.1em", fontFamily:"var(--mono)", marginBottom:4 }}>Prediction Result</div>
        <div style={{ fontSize:22, fontWeight:800, color: isRisk ? "var(--red)" : "var(--green)" }}>{isRisk ? "At Risk of Dropout" : "Not at Risk"}</div>
      </div>

      <RiskGauge score={risk} isRisk={isRisk} />

      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14 }}>
        {[
          { l:"Risk Score",  v:`${(risk*100).toFixed(1)}%`, c: isRisk?"var(--red)":"var(--green)" },
          { l:"Confidence",  v:`${(confidence*100).toFixed(1)}%`, c:"var(--blue)" },
          { l:"Model Acc.",  v:"82.5%", c:"var(--amber)" },
        ].map((m,i) => (
          <div key={i} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:9, padding:10, textAlign:"center" }}>
            <div style={{ fontFamily:"var(--mono)", fontSize:17, fontWeight:700, color:m.c }}>{m.v}</div>
            <div style={{ fontSize:10, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.08em", marginTop:3 }}>{m.l}</div>
          </div>
        ))}
      </div>

      {showDetails && <>
        <div style={{ ...S.card2(14), marginBottom:12 }}>
          <div style={{ ...S.label, marginBottom:4 }}>Factor Influence</div>
          <div style={{ fontSize:10, color:"var(--tx3)", marginBottom:10 }}>
            Every factor the student can submit is listed below. Bars show each factor's share of the prediction — factors the student hasn't entered yet are shown but contribute 0%.
          </div>
          {(() => {
            // Only the *truly* missing factors count toward this warning.
            // A factor marked notApplicable (e.g. medical form for a student
            // with no health issue) is intentionally skipped — it is NOT
            // missing, it just doesn't apply.
            const missing = impacts.filter(i => i.notSubmitted && !i.notApplicable);
            if(!missing.length) return null;
            const relevant = impacts.filter(i => !i.notApplicable).length;
            return (
              <div style={{ fontSize:10, color:"var(--amber)", background:"rgba(245,158,11,.08)", border:"1px solid rgba(245,158,11,.25)", borderRadius:6, padding:"6px 9px", marginBottom:10 }}>
                <i className="fa fa-info-circle" style={{ marginRight:6 }}></i>
                {missing.length} of {relevant} relevant factors not yet submitted by the student. The prediction uses only the factors that are available.
              </div>
            );
          })()}
          {/* Fairness note — make the age-debiasing visible to anyone reading
              the prediction. Helps avoid the "the model is ageist" reaction. */}
          <div style={{ fontSize:10, color:"var(--blue)", background:"rgba(59,130,246,.08)", border:"1px solid rgba(59,130,246,.25)", borderRadius:6, padding:"6px 9px", marginBottom:10 }}>
            <i className="fa fa-balance-scale" style={{ marginRight:6 }}></i>
            <strong>Fairness:</strong> Age contributes only a tiny share by design. A student is never flagged at risk because of age alone — only the behavioural factors (working, home responsibility, fees, health, GPA, etc.) drive the prediction.
          </div>
          {impacts.map(it => {
            const isMissing = it.notSubmitted;
            const isNA      = it.notApplicable;
            const dim       = isMissing || isNA;
            const barWidth  = dim ? 2 : Math.max(2, it.impact * 100);
            const barColor  = isNA ? "rgba(148,163,184,.4)" : isMissing ? "var(--bdr)" : it.color;
            const labelCol  = "var(--tx3)";
            const valueCol  = dim ? "var(--tx3)" : "var(--tx2)";
            const cellTag   = isNA ? "n/a" : isMissing ? "—" : `${(it.impact*100).toFixed(0)}%`;
            return (
              <div key={it.key} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:9, opacity: dim ? 0.55 : 1 }}>
                <div style={{ fontSize:11, color:labelCol, width:140, textAlign:"right", flexShrink:0, lineHeight:1.2 }}>
                  {it.label}
                  {it.displayValue != null && (
                    <div style={{ fontFamily:"var(--mono)", fontSize:9, color:valueCol, fontStyle: dim ? "italic" : "normal" }}>{it.displayValue}</div>
                  )}
                </div>
                <div style={{ flex:1, height:6, background:"rgba(255,255,255,.05)", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${barWidth.toFixed(0)}%`, background:barColor, borderRadius:3, transition:"width .8s ease" }} />
                </div>
                <div style={{ fontFamily:"var(--mono)", fontSize:10, width:34, textAlign:"right", color:valueCol }}>{cellTag}</div>
              </div>
            );
          })}
        </div>

        <div style={S.card2(14)}>
          <div style={{ ...S.label, marginBottom:10 }}>Recommendations</div>
          {recs.map((r,i) => (
            <div key={i} style={{ display:"flex", gap:8, fontSize:12, lineHeight:1.6, color:"var(--tx2)", marginBottom:8, padding:"8px 10px", background:"rgba(255,255,255,.03)", borderRadius:7, border:"1px solid var(--bdr)" }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background: isRisk?"var(--red)":"var(--green)", flexShrink:0, marginTop:5 }} />
              {r}
            </div>
          ))}
        </div>
      </>}
    </div>
  );
};

function buildRecs(isRisk, s) {
  const r = [];
  const num = v => (v == null || v === "") ? NaN : Number(v);
  if(s.gpa < 2.2) r.push("GPA critically low — enrol in academic support programme.");
  if(s.fin === 2) r.push("Severe financial hardship — urgent referral to financial aid office.");
  else if(s.fin === 1) r.push("Moderate financial strain — explore scholarship opportunities.");

  // Age-based suggestions are *supportive*, not punitive. We deliberately do
  // NOT say "older = more risk" because that would reproduce the age bias we
  // removed from the model. Suggestions only kick in alongside concrete
  // pressure points (heavy workload, work, home responsibility) so the
  // recommendation is grounded in real challenges, not in age itself.
  const age = num(s.age);
  if(!isNaN(age)) {
    const workingNum  = num(s.workingStatus);
    const homeNum     = num(s.homeResponsibility);
    const healthNum   = num(s.hasHealthIssue);
    const hasPressure = workingNum === 1 || homeNum >= 2 || healthNum === 1;
    if(age >= 45 && hasPressure)        r.push(`Non-traditional learner (age ${age}) balancing other commitments — proactively offer flexible/part-time study options and a dedicated mentor.`);
    else if(age >= 45)                  r.push(`Mature learner (age ${age}) — confirm course load suits the student's schedule and offer optional study-skills refreshers.`);
    else if(age <= 16)                  r.push(`Younger than the typical cohort (age ${age}) — pair with an academic mentor to support the transition into higher education.`);
  }

  if(num(s.hasHealthIssue) === 1)            r.push("Health issues declared — coordinate with the university medical centre and academic registrar.");
  // Only chase the medical form when the student actually declared a health
  // issue. Healthy students aren't expected to attach one.
  if(num(s.hasHealthIssue) === 1 && num(s.medicalFormSubmitted) === 0 && !s.medicalFormFile)
    r.push("Medical form not yet attached — request submission so care planning can begin.");
  if(num(s.semesterResultSubmitted) === 0)   r.push("Last semester result document missing — follow up with the examinations office.");
  if(num(s.workingStatus) === 1)             r.push("Working while studying — counsel on time management and a possibly reduced course load.");
  if(num(s.courseChoice) === 0)              r.push("Programme is not the student's own choice — schedule career counselling to confirm fit.");
  if(num(s.homeResponsibility) === 2)        r.push("Heavy responsibilities at home — explore distance/part-time learning or family-support resources.");
  if(num(s.familyBackground) === 2)          r.push("Low family support — connect with the student welfare office and peer-mentoring programme.");
  if(num(s.feesLevel) === 2)                 r.push("Serious fees challenge — refer immediately for emergency bursary or payment plan.");

  if(!isRisk) {
    r.push("Student shows positive indicators. Maintain routine check-ins.");
    if(s.gpa >= 3.0) r.push("Strong GPA — performing well above the critical threshold.");
  }
  if(!r.length) r.push("Multiple borderline factors present — schedule academic counselling.");
  return r;
}
