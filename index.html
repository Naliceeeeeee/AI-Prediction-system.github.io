            <Card><CardHeader title="ML Prediction" /><PredictionResultCard result={pred} student={liveStudent} /></Card>
          </div>
          <InterventionPanel student={liveStudent} interventions={interventions} addIntervention={addIntervention} userName={user.name} />
          <div>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:16 }}>
              <div>
                <h3 style={{ fontSize:15, fontWeight:800, marginBottom:2 }}><i className="fa fa-tasks" style={{marginRight:8}}></i>Recommended Actions</h3>
                <p style={{ fontSize:12, color:"var(--tx3)" }}>Auto-generated action plan based on this student's risk profile.</p>
              </div>
            </div>
            <RecommendedActionsPanel student={liveStudent} interventions={interventions} addIntervention={addIntervention} userName={user.name} />
          </div>
        </div>
      </RoleBasedRoute>
    );
  }

  if(page === "dept-comparison") return (
    <RoleBasedRoute allowed={["admin"]}>
      <DeptComparisonPage students={students} users={users} depts={depts} />
    </RoleBasedRoute>
  );

  if(page === "audit-log") return (
    <RoleBasedRoute allowed={["admin"]}>
      <AuditLogPage auditLog={auditLog} />
    </RoleBasedRoute>
  );

  // Admin default dashboard
  const risk = students.filter(s=>mlPredict(s).prediction===1).length;

  // Drill-down: compute which students belong to the clicked KPI
  const drillStudents = drillFilter === "all"  ? students
                      : drillFilter === "risk" ? students.filter(s=>s.gpa>0&&mlPredict(s).prediction===1)
                      : drillFilter === "safe" ? students.filter(s=>s.gpa>0&&mlPredict(s).prediction===0)
                      : drillFilter === "fin"  ? students.filter(s=>s.fin===2)
                      : [];
  const drillTitle    = drillFilter === "all"       ? "All Students"
                      : drillFilter === "risk"      ? "At-Risk Students"
                      : drillFilter === "safe"      ? "Safe Students"
                      : drillFilter === "fin"       ? "Poor Financial Status Students"
                      : drillFilter === "accuracy"  ? "Model Accuracy Breakdown"
                      : "";
  const drillColor    = drillFilter === "risk"      ? "#ef4444"
                      : drillFilter === "safe"      ? "#10b981"
                      : drillFilter === "fin"       ? "#f59e0b"
                      : drillFilter === "accuracy"  ? "#f59e0b"
                      : "#3b82f6";

  return (
    <RoleBasedRoute allowed={["admin"]}>
      <div style={S.col(20)}>
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", gap:16, alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap" }}>
            <div style={{ minWidth:0, flex:"1 1 280px" }}>
              <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-tachometer" style={{fontSize:18,marginRight:8}}></i>Admin Dashboard</h2>
              <p style={S.sub}>System-wide overview — {students.length} students, {lecturers.length} lecturers, {users.length} users</p>
            </div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", flex:"0 1 auto" }}>
              <Btn variant="ghost" title="Reset your password" onClick={() => setPage("my-profile")}><i className="fa fa-key"></i> Reset Password</Btn>
              <Btn variant="ghost" title="View Analytics" onClick={() => setPage("analytics")}><i className="fa fa-line-chart"></i> Analytics</Btn>
            </div>
          </div>
          <div style={{ height:1, background:"#000", width:"100%" }} />
        </div>

        <StatisticsCard students={students} onKpiClick={key => { if(key) setDrillFilter(f => f===key ? null : key); }} />

        {/* ── KPI Drill-Down Panel ── */}
        {drillFilter && (
          <div style={{ background:"var(--sur)", border:`1px solid ${drillColor}40`, borderRadius:14, padding:20, animation:"fadeUp .25s ease" }}>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:16 }}>
              <div style={S.flex(10,"center")}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:drillColor }} />
                <span style={{ fontSize:15, fontWeight:800 }}>{drillTitle}</span>
                {drillFilter !== "accuracy" && <span style={{ ...S.tag(drillColor), fontSize:11 }}>{drillStudents.length} students</span>}
              </div>
              <Btn size="sm" variant="ghost" onClick={() => setDrillFilter(null)}><i className="fa fa-times"></i> Close</Btn>
            </div>

            {drillFilter === "accuracy" ? (
              <div style={S.col(16)}>
                {/* Top metric tiles */}
                <div style={S.grid("repeat(4,1fr)",12)}>
                  {[
                    ["Test Accuracy",  "82.5%", "#f59e0b", "40 test samples"],
                    ["Train Accuracy", "89.4%", "#10b981", "160 train samples"],
                    ["Precision",      "80.0%", "#3b82f6", "Of predicted at-risk"],
                    ["Recall",         "80.0%", "#8b5cf6", "Of actual at-risk"],
                  ].map(([label, value, color, note]) => (
                    <div key={label} style={{ background:"var(--sur2)", border:`1px solid ${color}30`, borderRadius:10, padding:14, textAlign:"center" }}>
                      <div style={{ fontFamily:"var(--mono)", fontSize:24, fontWeight:800, color }}>{value}</div>
                      <div style={{ fontSize:11, fontWeight:700, color:"var(--tx2)", margin:"4px 0 2px" }}>{label}</div>
                      <div style={{ fontSize:10, color:"var(--tx3)" }}>{note}</div>
                    </div>
                  ))}
                </div>

                <div style={S.grid("1fr 1fr",16)}>
                  {/* Confusion Matrix */}
                  <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:16 }}>
                    <div style={{ ...S.label, marginBottom:12 }}>Confusion Matrix</div>
                    <div style={S.grid("1fr 1fr",8)}>
                      {[
                        ["True Positive",  "16", "#10b981", "Correctly predicted at-risk"],
                        ["False Negative",  "4", "#ef4444", "Missed at-risk students"],
                        ["False Positive",  "3", "#ef4444", "Wrongly flagged as at-risk"],
                        ["True Negative",  "17", "#10b981", "Correctly predicted safe"],
                      ].map(([label, val, color, note]) => (
                        <div key={label} style={{ background:`${color}10`, border:`1px solid ${color}30`, borderRadius:8, padding:12, textAlign:"center" }}>
                          <div style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:800, color }}>{val}</div>
                          <div style={{ fontSize:10, fontWeight:700, color:"var(--tx2)", marginTop:3 }}>{label}</div>
                          <div style={{ fontSize:9, color:"var(--tx3)", marginTop:2 }}>{note}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Feature Coefficients */}
                  <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:16 }}>
                    <div style={{ ...S.label, marginBottom:12 }}>Feature Coefficients</div>
                    {[
                      ["GPA",          -0.9821, "#10b981"],
                      ["Financial",     0.6134, "#ef4444"],
                    ].map(([name, val, color]) => (
                      <div key={name} style={{ ...S.flex(8,"center"), marginBottom:10 }}>
                        <div style={{ fontSize:12, color:"var(--tx3)", width:90, flexShrink:0 }}>{name}</div>
                        <div style={{ flex:1, height:6, background:"rgba(255,255,255,.05)", borderRadius:3, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${Math.abs(val)*100}%`, background:color, borderRadius:3 }} />
                        </div>
                        <div style={{ fontFamily:"var(--mono)", fontSize:11, fontWeight:700, color: val<0?"var(--green)":"var(--red)", width:52, textAlign:"right" }}>
                          {val>0?"+":""}{val}
                        </div>
                      </div>
                    ))}
                    <div style={{ marginTop:10, fontSize:11, color:"var(--tx3)", lineHeight:1.6, borderTop:"1px solid var(--bdr)", paddingTop:10 }}>
                      Algorithm: <span style={{ color:"var(--tx2)", fontWeight:600 }}>Logistic Regression</span> · 
                      AUC-ROC: <span style={{ color:"var(--tx2)", fontWeight:600 }}>~0.87</span> · 
                      F1 Score: <span style={{ color:"var(--tx2)", fontWeight:600 }}>80.0%</span>
                    </div>
                  </div>
                </div>
              </div>
            ) : drillStudents.length === 0 ? (
              <Empty icon={<i className="fa fa-users" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No students in this group." />
            ) : (
              <StudentListTable
                students={drillStudents}
                onView={s => { setActiveStudent(s); setPage("student-detail"); }}
                onEdit={s => { setActiveStudent(s); setPage("edit-student"); }}
                onDelete={deleteStudent}
                role="admin"
              />
            )}
          </div>
        )}

        <div style={S.grid("1fr 1fr",20)}>
          <Card>
            <CardHeader title="Donut Overview" />
            <div style={{ ...S.flex(20,"center","center"), padding:"10px 0" }}>
              <Donut value={risk} total={students.length} color="#ef4444" label="At Risk"
                onClick={() => setDrillFilter(f => f==="risk" ? null : "risk")} />
              <Donut value={students.length-risk} total={students.length} color="#10b981" label="Safe"
                onClick={() => setDrillFilter(f => f==="safe" ? null : "safe")} />
              <Donut value={students.filter(s=>s.fin===2).length} total={students.length} color="#f59e0b" label="Poor Finance"
                onClick={() => setDrillFilter(f => f==="fin" ? null : "fin")} />
            </div>
          </Card>
          <Card>
            <CardHeader title="Recent Predictions" action={<Btn size="sm" variant="ghost" onClick={()=>setPage("pred-history")}>View All →</Btn>} />
            {predHistory.length === 0 ? <Empty icon={<i className="fa fa-magic" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No predictions yet." /> : predHistory.slice(0,5).map((h,i) => (
              <div key={i} style={{ ...S.flex(0,"center","space-between"), padding:"8px 0", borderBottom:"1px solid var(--bdr)" }}>
                <div style={{ minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>{h.student?.name || "Unknown"}</div>
                  <div style={{ fontSize:11, color:"var(--tx3)", display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                    {h.periodLabel && (
                      <span style={{ background:"rgba(245,158,11,.15)", border:"1px solid rgba(245,158,11,.35)", color:"#f59e0b", padding:"1px 6px", borderRadius:6, fontWeight:700, fontSize:10 }}>{h.periodLabel}</span>
                    )}
                    <span>GPA {h.student?.gpa ?? "—"}</span>
                    <span>· by {h.by}</span>
                  </div>
                </div>
                <RiskBadge risk={h.res.prediction} score={h.res.risk} />
              </div>
            ))}
          </Card>
        </div>

        <Card>
          <CardHeader title="All Students Overview" action={<Btn size="sm" variant="ghost" onClick={() => setPage("students")}>Manage →</Btn>} />
          <StudentListTable students={students.slice(0,8)} onView={s=>{setActiveStudent(s);setPage("student-detail");}} role="admin" externalSearch={globalSearch} />
        </Card>

        <Card>
          <CardHeader
            title="Student Factors Overview"
            action={<span style={{ fontSize:11, color:"var(--tx3)" }}>Each factor a student has submitted — only the student can run their own prediction.</span>}
          />
          <div style={{ fontSize:12, color:"var(--tx3)", marginBottom:14, lineHeight:1.6 }}>
            All academic and personal factors entered by students. Click a row to open the full student profile. "—" means the student has not yet submitted that field.
          </div>
          <StudentFactorsOverview
            students={students}
            onView={s => { setActiveStudent(s); setPage("student-detail"); }}
          />
        </Card>

        {/* Self-service password reset for the admin — mirrors the card students
            and lecturers already get, so the admin can rotate their password
            directly from the dashboard instead of digging into the profile page. */}
        <PasswordChangeCard accentColor="#f59e0b" role="admin" />
      </div>
    </RoleBasedRoute>
  );
};

// ─── EDITABLE PROFILE PAGE ───────────────────────────────────────────────────
// ── Self-service password change card for the profile page. Used by students
//    (who default to DOB-as-password) so they can pick something only they
//    know, and by lecturers/admins for the same reason. Requires the current
//    password before accepting a new one.
const PasswordChangeCard = ({ accentColor = "#0ea5e9", role = "student" }) => {
  const { user, updateUser } = useContext(AuthCtx);
  const [open, setOpen]       = useState(false);
  const [current, setCurrent] = useState("");
  const [next, setNext]       = useState("");
  const [confirm, setConfirm] = useState("");
  const [show1, setShow1]     = useState(false);
  const [show2, setShow2]     = useState(false);
  const [show3, setShow3]     = useState(false);
  const [msg, setMsg]         = useState({ type:"", text:"" });

  const validate = (p) => {
    if(!p)                    return "New password is required.";
    if(p.length < 6)          return "Password must be at least 6 characters.";
    if(!/[A-Za-z]/.test(p))   return "Password must include at least one letter.";
    if(!/[0-9]/.test(p))      return "Password must include at least one number.";
    return "";
  };

  const reset = () => { setCurrent(""); setNext(""); setConfirm(""); setMsg({ type:"", text:"" }); };
  const close = () => { setOpen(false); reset(); };

  const save = () => {
    setMsg({ type:"", text:"" });
    if(!current)            { setMsg({ type:"error", text:"Please enter your current password." }); return; }
    if(current !== user.pwd){ setMsg({ type:"error", text:"Current password is incorrect." }); return; }
    const err = validate(next);
    if(err)                 { setMsg({ type:"error", text: err }); return; }
    if(next !== confirm)    { setMsg({ type:"error", text:"New password and confirmation do not match." }); return; }
    if(next === current)    { setMsg({ type:"error", text:"New password must be different from the current one." }); return; }
    updateUser({ pwd: next, mustChangePwd: false });
    setMsg({ type:"success", text:"Password updated successfully. Use your new password from now on." });
    setCurrent(""); setNext(""); setConfirm("");
    setTimeout(() => { setOpen(false); setMsg({ type:"", text:"" }); }, 2200);
  };

  const checks = [
    { label:"6+ characters",     met: next.length >= 6 },
    { label:"Contains letters",  met: /[A-Za-z]/.test(next) },
    { label:"Contains numbers",  met: /[0-9]/.test(next) },
    { label:"Matches confirm",   met: !!next && next === confirm },
  ];

  return (
    <Card>
      <CardHeader
        title="Password &amp; Security"
        action={
          !open
            ? <Btn size="sm" onClick={() => { reset(); setOpen(true); }} style={{ background: accentColor, color:"#fff" }}>
                <i className="fa fa-key" style={{marginRight:6}}></i>Reset Password
              </Btn>
            : <Btn size="sm" variant="ghost" onClick={close}><i className="fa fa-times" style={{marginRight:6}}></i>Cancel</Btn>
        }
      />
      {!open ? (
        <div style={{ fontSize:13, color:"var(--tx3)", lineHeight:1.6 }}>
          {role === "student"
            ? <>Your account was created with your <strong style={{color:"var(--tx2)"}}>date of birth (DDMMYYYY)</strong> as the default password. Reset it any time to something only you know — you'll then use the new password to log in.</>
            : <>Update the password you use to sign in. Choose something strong that only you know.</>}
        </div>
      ) : (
        <>
          <div style={{ background:"rgba(245,158,11,.06)", border:"1px solid rgba(245,158,11,.25)", borderRadius:8, padding:"10px 14px", fontSize:12, color:"var(--amber)", marginBottom:14, lineHeight:1.6 }}>
            <i className="fa fa-info-circle" style={{marginRight:6}}></i>
            For your security, please confirm your current password before choosing a new one. After saving, the next time you sign in you must use the new password.
          </div>

          <FieldGroup label="Current Password" required>
            <div style={{ position:"relative" }}>
              <input type={show1?"text":"password"} value={current} onChange={e=>setCurrent(e.target.value)} placeholder={role === "student" ? "Your DOB password (DDMMYYYY)" : "Enter current password"} autoFocus onKeyDown={e => e.key==="Enter" && save()} />
              <button type="button" onClick={()=>setShow1(v=>!v)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"var(--tx3)", fontSize:14 }}>
                <i className={`fa fa-eye${show1?"-slash":""}`}></i>
              </button>
            </div>
          </FieldGroup>

          <FieldGroup label="New Password" required>
            <div style={{ position:"relative" }}>
              <input type={show2?"text":"password"} value={next} onChange={e=>setNext(e.target.value)} placeholder="At least 6 chars, with letters and numbers" onKeyDown={e => e.key==="Enter" && save()} />
              <button type="button" onClick={()=>setShow2(v=>!v)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"var(--tx3)", fontSize:14 }}>
                <i className={`fa fa-eye${show2?"-slash":""}`}></i>
              </button>
            </div>
          </FieldGroup>

          <FieldGroup label="Confirm New Password" required>
            <div style={{ position:"relative" }}>
              <input type={show3?"text":"password"} value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Re-enter your new password" onKeyDown={e => e.key==="Enter" && save()} />
              <button type="button" onClick={()=>setShow3(v=>!v)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"var(--tx3)", fontSize:14 }}>
                <i className={`fa fa-eye${show3?"-slash":""}`}></i>
              </button>
            </div>
          </FieldGroup>

          {(next || confirm) && (
            <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"10px 14px", marginBottom:12 }}>
              {checks.map((c,i) => (
                <div key={i} style={{ fontSize:11, color: c.met ? "var(--green)" : "var(--tx3)", marginBottom:3 }}>
                  <i className={`fa fa-${c.met ? "check" : "circle-o"}`} style={{ marginRight:6 }}></i>{c.label}
                </div>
              ))}
            </div>
          )}

          {msg.text && <Alert type={msg.type} style={{ marginBottom:12 }}><i className={`fa fa-${msg.type==="success"?"check-circle":"exclamation-triangle"}`} style={{marginRight:6}}></i>{msg.text}</Alert>}

          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <Btn onClick={save} style={{ background: accentColor, color:"#fff" }}>
              <i className="fa fa-check" style={{marginRight:6}}></i>Save New Password
            </Btn>
            <Btn variant="ghost" onClick={close}>Cancel</Btn>
          </div>
        </>
      )}
    </Card>
  );
};

const EditableProfilePage = ({ role }) => {
  const { user, updateUser } = useContext(AuthCtx);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ name: user?.name||"", email: user?.email||"", phone: user?.phone||"", bio: user?.bio||"" });
  const [picPreview, setPicPreview] = useState(user?.profilePic || null);
  const [saved, setSaved] = useState(false);
  const [error, setError] = useState("");
  const fileRef = React.useRef();

  const isStudent = role === "student";
  const color = role === "admin" ? "#f59e0b" : role === "lecturer" ? "#8b5cf6" : "#0ea5e9";
  const initials = (user?.name||"?").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

  const handlePic = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024) { setError("Image must be under 2MB."); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      setPicPreview(ev.target.result);
      updateUser({ profilePic: ev.target.result });
    };
    reader.readAsDataURL(file);
  };

  const save = () => {
    if(!form.name.trim()) { setError("Name cannot be empty."); return; }
    updateUser({ name: form.name.trim(), phone: form.phone.trim(), bio: form.bio.trim() });
    setEditing(false);
    setError("");
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  if(!user) return null;

  return (
    <div style={S.col(20)}>
      {/* Header */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-user-circle" style={{fontSize:18,marginRight:8}}></i>My Profile</h2>
            <p style={S.sub}>Manage your personal information and profile picture.</p>
          </div>
          {!editing
            ? <Btn onClick={() => { setForm({ name:user.name||"", email:user.email||"", phone:user.phone||"", bio:user.bio||"" }); setEditing(true); setError(""); }} style={{ background:color }}><i className="fa fa-pencil"></i> Edit Profile</Btn>
            : <div style={S.flex(8)}>
                <Btn variant="ghost" onClick={() => { setEditing(false); setError(""); }}>Cancel</Btn>
                <Btn onClick={save} style={{ background:color }}><i className="fa fa-check"></i> Save Changes</Btn>
              </div>
          }
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {saved && (
        <div style={{ background:"rgba(16,185,129,.1)", border:"1px solid rgba(16,185,129,.3)", borderRadius:8, padding:"10px 16px", fontSize:13, color:"var(--green)", display:"flex", alignItems:"center", gap:8 }}>
          <i className="fa fa-check-circle"></i> Profile updated successfully!
        </div>
      )}

      <div style={S.grid("auto 1fr", 24)}>
        {/* Profile picture */}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:12 }}>
          <div style={{ position:"relative", width:120, height:120 }}>
            {picPreview
              ? <img src={picPreview} alt="Profile" style={{ width:120, height:120, borderRadius:"50%", objectFit:"cover", border:`3px solid ${color}`, boxShadow:`0 4px 16px ${color}40` }} />
              : <div style={{ width:120, height:120, borderRadius:"50%", background:color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:36, fontWeight:800, color:"#fff", border:`3px solid ${color}`, boxShadow:`0 4px 16px ${color}40` }}>{initials}</div>
            }
            <button onClick={() => fileRef.current.click()}
              style={{ position:"absolute", bottom:4, right:4, width:32, height:32, borderRadius:"50%", background:color, border:"2px solid var(--sur)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:13, color:"#fff", boxShadow:"0 2px 8px rgba(0,0,0,.3)" }}>
              <i className="fa fa-camera"></i>
            </button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handlePic} />
          <button onClick={() => fileRef.current.click()}
            style={{ fontSize:11, color:color, background:"none", border:`1px solid ${color}40`, borderRadius:7, padding:"4px 12px", cursor:"pointer", fontWeight:600 }}>
            <i className="fa fa-upload" style={{marginRight:4}}></i>Upload Photo
          </button>
          <div style={{ fontSize:10, color:"var(--tx3)", textAlign:"center", lineHeight:1.5 }}>JPG, PNG · Max 2MB</div>
        </div>

        {/* Info fields */}
        <div style={S.col(0)}>
          <Card>
            <CardHeader title="Personal Information" />

            {/* Name */}
            <FieldGroup label="Full Name" required>
              {editing && !isStudent
                ? <input value={form.name} onChange={e => setForm(f=>({...f, name:e.target.value}))} placeholder="Your full name" />
                : <div style={{ background:"var(--bg2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"9px 12px", fontSize:13, color:"var(--tx)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span>{user.name}</span>
                    {isStudent && <span style={{ fontSize:10, background:"rgba(245,158,11,.12)", color:"var(--amber)", border:"1px solid rgba(245,158,11,.25)", borderRadius:4, padding:"1px 6px" }}><i className="fa fa-lock"></i> LOCKED</span>}
                  </div>
              }
            </FieldGroup>

            {/* Email — always read-only */}
            <FieldGroup label="University Email">
              <div style={{ background:"var(--bg2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"9px 12px", fontSize:13, color:"var(--tx3)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <span>{user.email}</span>
                <span style={{ fontSize:10, background:"rgba(245,158,11,.12)", color:"var(--amber)", border:"1px solid rgba(245,158,11,.25)", borderRadius:4, padding:"1px 6px" }}><i className="fa fa-lock"></i> LOCKED</span>
              </div>
            </FieldGroup>

            {/* Role */}
            <FieldGroup label="Role">
              <div style={{ background:"var(--bg2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"9px 12px", fontSize:13 }}>
                <Badge color={color}>{role.charAt(0).toUpperCase()+role.slice(1)}</Badge>
              </div>
            </FieldGroup>

            {/* Department — locked for students */}
            {user.dept && (
              <FieldGroup label="Department">
                <div style={{ background:"var(--bg2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"9px 12px", fontSize:13, color:"var(--tx)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <span>{user.dept}</span>
                  {isStudent && <span style={{ fontSize:10, background:"rgba(245,158,11,.12)", color:"var(--amber)", border:"1px solid rgba(245,158,11,.25)", borderRadius:4, padding:"1px 6px" }}><i className="fa fa-lock"></i> LOCKED</span>}
                </div>
              </FieldGroup>
            )}

            {/* Phone */}
            <FieldGroup label="Phone Number">
              {editing
                ? <input value={form.phone} onChange={e => setForm(f=>({...f, phone:e.target.value}))} placeholder="e.g. +256 700 123456" />
                : <div style={{ background:"var(--bg2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"9px 12px", fontSize:13, color: user.phone ? "var(--tx)" : "var(--tx3)" }}>
                    {user.phone || "Not set — click Edit Profile to add"}
                  </div>
              }
            </FieldGroup>

            {/* Bio */}
            <FieldGroup label="Bio / About">
              {editing
                ? <textarea value={form.bio} onChange={e => setForm(f=>({...f, bio:e.target.value}))} placeholder="A short description about yourself…" style={{ minHeight:72 }} />
                : <div style={{ background:"var(--bg2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"9px 12px", fontSize:13, color: user.bio ? "var(--tx)" : "var(--tx3)", minHeight:48 }}>
                    {user.bio || "No bio yet — click Edit Profile to add one."}
                  </div>
              }
            </FieldGroup>

            {error && <Alert type="error" style={{ marginTop:8 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}

            {isStudent && editing && (
              <div style={{ background:"rgba(245,158,11,.07)", border:"1px solid rgba(245,158,11,.25)", borderRadius:8, padding:"10px 14px", fontSize:12, color:"var(--amber)", marginTop:8 }}>
                <i className="fa fa-info-circle" style={{marginRight:6}}></i>
                Name and department are managed by your institution. You can update your phone and bio.
              </div>
            )}
          </Card>

          <PasswordChangeCard accentColor={color} role={role} />
        </div>
      </div>
    </div>
  );
};

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
// ─── AUTO-REGISTRATION SCREEN ─────────────────────────────────────────────────
const AutoRegisterScreen = ({ email: _emailProp, pwd: _pwdProp, role="student", existingEmails=[], depts=DEPTS, onComplete, onCancel }) => {
  // Programme length (`courseYears`) is now part of registration so students
  // on 4- or 5-year programmes (Law, Engineering, Medicine, etc.) get the
  // correct number of semester checkpoints from day one. Default is 3 to
  // cover the most common Bachelor's degree at the university.
  const [form, setForm] = useState({ name:"", email:"", dept:"", year:"", semesterInYear: 1, courseYears: "3", dob:"", confirmPwd:"", lecPwd:"", lecConfirmPwd:"" });
  const [error, setError] = useState("");
  const [pwdStrength, setPwdStrength] = useState({ valid:false, msg:"" });
  const upd = (k,v) => setForm(f => ({...f,[k]:v}));
  const isLecturer = false;

  // Validate university email format: xx.lastname@unik.ac.ug
  const isValidUnikEmail = (e) => /^[a-z]+\.[a-z]+@unik\.ac\.ug$/.test(e.toLowerCase().trim());

  // Validate lecturer password: letters + numbers + symbols, max 8 chars
  const validateLecPwd = (p) => {
    if(!p) return { valid:false, msg:"" };
    if(p.length > 8) return { valid:false, msg:"Password must not exceed 8 characters." };
    if(p.length < 4) return { valid:false, msg:"Password must be at least 4 characters." };
    const hasLetter = /[a-zA-Z]/.test(p);
    const hasNumber = /[0-9]/.test(p);
    const hasSymbol = /[^a-zA-Z0-9]/.test(p);
    if(!hasLetter) return { valid:false, msg:"Password must contain at least one letter." };
    if(!hasNumber) return { valid:false, msg:"Password must contain at least one number." };
    if(!hasSymbol) return { valid:false, msg:"Password must contain at least one symbol (e.g. @, #, !)." };
    return { valid:true, msg:"Strong password!" };
  };

  // Generate password from DOB: DDMMYYYY
  const generatePwd = (dob) => {
    if(!dob) return "";
    const [y, m, d] = dob.split("-");
    return `${d}${m}${y}`;
  };

  const generatedPwd = generatePwd(form.dob);
  const lecPwdCheck = validateLecPwd(form.lecPwd);

  // ── Age policy ─────────────────────────────────────────────────────────────
  // Applicants must be at least 21 years old at registration. A learner born
  // this year (or only a few years ago) cannot realistically be enrolling at
  // university, so we reject those dates of birth outright.
  const MIN_AGE = 21;
  const MAX_AGE = 80;
  const calcAge = (dob) => {
    if(!dob) return null;
    const today = new Date();
    const b = new Date(dob);
    if(isNaN(b.getTime())) return null;
    let age = today.getFullYear() - b.getFullYear();
    const m = today.getMonth() - b.getMonth();
    if(m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
    return age;
  };
  const ageFromDob = calcAge(form.dob);
  // The latest date of birth that still makes the user >= MIN_AGE today, in YYYY-MM-DD.
  const maxDobDate = (() => {
    const t = new Date();
    t.setFullYear(t.getFullYear() - MIN_AGE);
    return t.toISOString().split("T")[0];
  })();
  // The earliest reasonable DOB (caps unrealistically old applicants).
  const minDobDate = (() => {
    const t = new Date();
    t.setFullYear(t.getFullYear() - MAX_AGE);
    return t.toISOString().split("T")[0];
  })();

  const submit = () => {
    if(!form.name.trim()) { setError("Full name is required."); return; }
    // Student
    const emailVal = form.email.toLowerCase().trim();
    if(!emailVal)        { setError("University email is required."); return; }
    if(!isValidUnikEmail(emailVal)) { setError("Email must be in the format: jn.namayanja@unik.ac.ug"); return; }
    if(existingEmails.includes(emailVal)) { setError("An account with this email already exists. Please log in."); return; }
    if(!form.dob)        { setError("Date of birth is required."); return; }
    if(ageFromDob == null || ageFromDob < MIN_AGE) {
      setError(`Date of birth is not realistic for a university applicant. You must be at least ${MIN_AGE} years old to register.`);
      return;
    }
    if(ageFromDob > MAX_AGE) {
      setError(`Date of birth is not realistic for a university applicant. Please check the year — maximum age accepted is ${MAX_AGE}.`);
      return;
    }
    if(!form.confirmPwd || form.confirmPwd !== generatedPwd) { setError("Please confirm your password by re-entering your date of birth in DDMMYYYY format."); return; }
    if(!form.dept)       { setError("Please select your department."); return; }
    if(!form.year)       { setError("Please select your year of study."); return; }
    const semesterInYear = form.semesterInYear === 2 ? 2 : 1;
    // Clamp programme length to a sensible range (3 → 6 years). Anything
    // outside that is almost certainly a typo or a stale value.
    const courseYears = Math.min(6, Math.max(3, parseInt(String(form.courseYears).trim(), 10) || 3));
    // Sanity check: the chosen year must fit within the chosen programme
    // length. Block "Year 5" registration for a 3-year programme.
    const chosenYearNum = parseYearOfStudy(form.year);
    if(form.year !== "Postgraduate" && chosenYearNum > courseYears) {
      setError(`You picked ${form.year}, but your programme length is only ${courseYears} year${courseYears===1?"":"s"}. Please increase the programme length or pick a lower year of study.`);
      return;
    }
    const studentId = "STU-" + String(Date.now()).slice(-5);
    onComplete({ name: form.name.trim(), dept: form.dept, year: form.year, semesterInYear, courseYears, email: emailVal, pwd: generatedPwd, studentId, dob: form.dob, age: ageFromDob });
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20, background:"var(--bg)" }}>
      <div className="login-card" style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:20, padding:36, width:"100%", maxWidth:440, animation:"fadeUp .4s ease" }}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", marginBottom:12 }}>
            <img src="./assets/university-of-kisubi-logo.png" alt="University of Kisubi" style={{ width:"min(210px, 80vw)", height:"auto", maxHeight:74, objectFit:"contain" }} />
          </div>
          <div style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>Complete Your Registration</div>
          <div style={{ fontSize:13, color:"var(--tx3)", lineHeight:1.6 }}>
            Welcome! Fill in your details to create your {isLecturer ? "lecturer" : "student"} account.<br/>
            <span style={{ color:"var(--amber)", fontWeight:600 }}>Name, email and department are fixed after signup. Year and semester can be updated anytime on your dashboard.</span>
          </div>
        </div>

        <div style={{ background: isLecturer ? "rgba(139,92,246,.08)" : "rgba(14,165,233,.08)", border:`1px solid ${isLecturer ? "rgba(139,92,246,.2)" : "rgba(14,165,233,.2)"}`, borderRadius:9, padding:"10px 14px", fontSize:12, color: isLecturer ? "#8b5cf6" : "#0ea5e9", marginBottom:18, display:"flex", gap:8, alignItems:"flex-start" }}>
          <span style={{ fontSize:16, flexShrink:0 }}><i className="fa fa-info-circle"></i></span>
          <span>{isLecturer ? "Use your own email and choose a password (letters + numbers + symbols, max 8 characters)." : "Use your university email (e.g. jn.namayanja@unik.ac.ug). Your password is your date of birth in DDMMYYYY format."}</span>
        </div>

        <FieldGroup label="Full Name" required>
          <input value={form.name} onChange={e=>upd("name",e.target.value)} placeholder={isLecturer ? "e.g. Dr. John Okafor" : "e.g. John Nathan Namayanja"} autoFocus />
        </FieldGroup>

        {/* Lecturer: own email */}
        {isLecturer && (
        <FieldGroup label="Email Address" required>
          <input type="email" value={form.email} onChange={e=>upd("email",e.target.value.toLowerCase())} placeholder="e.g. dr.okafor@gmail.com" />
        </FieldGroup>
        )}

        {/* Student: university email */}
        {!isLecturer && (
        <FieldGroup label="University Email" required>
          <input type="email" value={form.email} onChange={e=>upd("email",e.target.value.toLowerCase())} placeholder="jn.namayanja@unik.ac.ug" />
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Format: initials.lastname@unik.ac.ug — this will be your login email.
          </div>
        </FieldGroup>
        )}

        <FieldGroup label="Department" required>
          <select value={form.dept} onChange={e=>upd("dept",e.target.value)}>
            <option value="">— Select your department —</option>
            {depts.map(d=><option key={d}>{d}</option>)}
          </select>
        </FieldGroup>

        {/* Lecturer password fields */}
        {isLecturer && (
        <FieldGroup label="Password" required>
          <input type="password" value={form.lecPwd} onChange={e => { upd("lecPwd", e.target.value); }} placeholder="e.g. Dr@2024 (max 8 chars)" maxLength={8} />
          {form.lecPwd && (
            <div style={{ fontSize:11, marginTop:5, display:"flex", alignItems:"center", gap:6,
              color: lecPwdCheck.valid ? "var(--green)" : form.lecPwd.length > 0 ? "var(--red)" : "var(--tx3)" }}>
              <i className={`fa fa-${lecPwdCheck.valid ? "check-circle" : "times-circle"}`}></i>
              {lecPwdCheck.valid ? "Strong password ✓" : lecPwdCheck.msg}
            </div>
          )}
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Must include letters, numbers and a symbol. Max 8 characters.
          </div>
        </FieldGroup>
        )}

        {isLecturer && form.lecPwd && lecPwdCheck.valid && (
        <FieldGroup label="Confirm Password" required>
          <input type="password" value={form.lecConfirmPwd} onChange={e=>upd("lecConfirmPwd",e.target.value)} placeholder="Re-enter your password" maxLength={8} />
          {form.lecConfirmPwd && (
            <div style={{ fontSize:11, marginTop:4, color: form.lecConfirmPwd === form.lecPwd ? "var(--green)" : "var(--red)" }}>
              <i className={`fa fa-${form.lecConfirmPwd === form.lecPwd ? "check-circle" : "times-circle"}`}></i>
              {form.lecConfirmPwd === form.lecPwd ? " Passwords match!" : " Passwords do not match."}
            </div>
          )}
        </FieldGroup>
        )}

        {!isLecturer && (
        <FieldGroup
          label="Programme length"
          required
          help="Pick your full degree length. Bachelor's are usually 3 years; Engineering, Law and Medicine run 4–6 years. This sets how many semester predictions the system will track for you."
        >
          <select value={form.courseYears} onChange={e=>{
            const v = e.target.value;
            upd("courseYears", v);
            // If the user has already chosen a year that no longer fits the
            // new programme length (e.g. they had Year 4 selected and just
            // switched the programme down to 3 years), reset the year so they
            // can re-pick within the new range.
            const cy = parseInt(v, 10) || 3;
            const chosenYearNum = parseYearOfStudy(form.year);
            if(form.year && form.year !== "Postgraduate" && chosenYearNum > cy) {
              upd("year", "");
            }
          }}>
            <option value="3">3 years (standard Bachelor's)</option>
            <option value="4">4 years (Engineering, BBA-Hons, etc.)</option>
            <option value="5">5 years (Law, Architecture, some Engineering tracks)</option>
            <option value="6">6 years (Medicine, Dentistry)</option>
          </select>
        </FieldGroup>
        )}

        {!isLecturer && (
        <FieldGroup label="Year of Study" required>
          <select value={form.year} onChange={e=>upd("year",e.target.value)}>
            <option value="">— Select year —</option>
            {(() => {
              const cy = Math.min(6, Math.max(3, parseInt(form.courseYears, 10) || 3));
              const ord = ["1st","2nd","3rd","4th","5th","6th"];
              const opts = [];
              for(let i = 1; i <= cy; i++) {
                opts.push(<option key={i} value={`Year ${i}`}>{ord[i-1]} Year</option>);
              }
              return opts;
            })()}
            <option value="Postgraduate">Postgraduate</option>
          </select>
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Year options shown reflect your programme length. Change the programme length above to see more years.
          </div>
        </FieldGroup>
        )}

        {!isLecturer && (
        <FieldGroup label="Current semester" required>
          <select value={form.semesterInYear} onChange={e=>upd("semesterInYear", +e.target.value)}>
            <option value={1}>Semester 1</option>
            <option value={2}>Semester 2</option>
          </select>
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Your risk trend is built semester-by-semester; you can update this later from your dashboard.
          </div>
        </FieldGroup>
        )}

        {!isLecturer && (
        <FieldGroup label="Date of Birth (used to generate your password)" required>
          <input
            type="date"
            value={form.dob}
            onChange={e => {
              const raw = e.target.value;
              if(!raw) { upd("dob", ""); setError(""); return; }
              const a = calcAge(raw);
              if(a == null || a < MIN_AGE) {
                // Refuse to keep an under-age DOB in the field. The user is
                // bounced back to an empty value with a clear, prominent
                // error message — a 2026 (or any post-2005-ish) DOB simply
                // cannot enrol at the university.
                upd("dob", "");
                upd("confirmPwd", "");
                setError(`Date of birth ${raw} would make the applicant ${a == null ? "?" : a} year${a === 1 ? "" : "s"} old. University applicants must be at least ${MIN_AGE}. Please pick a date on or before ${maxDobDate}.`);
                return;
              }
              if(a > MAX_AGE) {
                upd("dob", "");
                upd("confirmPwd", "");
                setError(`Date of birth ${raw} would make the applicant ${a} years old. Please check the year — maximum age accepted is ${MAX_AGE}.`);
                return;
              }
              upd("dob", raw);
              setError("");
            }}
            style={{
              borderColor: form.dob && ageFromDob != null && (ageFromDob < MIN_AGE || ageFromDob > MAX_AGE) ? "var(--red)" : undefined,
              outline: "none",
            }}
          />
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Browse the whole calendar — but any date of birth that makes the applicant younger than {MIN_AGE} (i.e. after {maxDobDate}) will be rejected.
          </div>
          {form.dob && ageFromDob != null && ageFromDob < MIN_AGE && (
            <div style={{ fontSize:12, marginTop:6, padding:"9px 12px", background:"rgba(239,68,68,.12)", border:"1px solid rgba(239,68,68,.4)", borderRadius:8, display:"flex", alignItems:"center", gap:8, color:"var(--red)", fontWeight:600 }}>
              <i className="fa fa-times-circle" style={{fontSize:14}}></i>
              That date of birth makes the applicant {ageFromDob} year{ageFromDob === 1 ? "" : "s"} old — too young to enrol. Minimum age is {MIN_AGE}.
            </div>
          )}
          {form.dob && ageFromDob != null && ageFromDob > MAX_AGE && (
            <div style={{ fontSize:12, marginTop:6, padding:"9px 12px", background:"rgba(239,68,68,.12)", border:"1px solid rgba(239,68,68,.4)", borderRadius:8, display:"flex", alignItems:"center", gap:8, color:"var(--red)", fontWeight:600 }}>
              <i className="fa fa-times-circle" style={{fontSize:14}}></i>
              That date of birth makes the applicant {ageFromDob} years old — please check the year you entered.
            </div>
          )}
          {form.dob && ageFromDob != null && ageFromDob >= MIN_AGE && ageFromDob <= MAX_AGE && (
            <div style={{ fontSize:11, marginTop:6, padding:"7px 10px", background:"rgba(34,197,94,.08)", border:"1px solid rgba(34,197,94,.25)", borderRadius:7, display:"flex", alignItems:"center", gap:6, color:"var(--green)" }}>
              <i className="fa fa-check-circle"></i>
              Age: {ageFromDob} years — accepted.
            </div>
          )}
          {form.dob && ageFromDob != null && ageFromDob >= MIN_AGE && ageFromDob <= MAX_AGE && (
            <div style={{ fontSize:11, marginTop:6, padding:"7px 10px", background:"rgba(245,158,11,.08)", border:"1px solid rgba(245,158,11,.25)", borderRadius:7, display:"flex", alignItems:"center", gap:6 }}>
              <i className="fa fa-lock" style={{ color:"#f59e0b" }}></i>
              <span style={{ color:"var(--tx2)" }}>Your password will be: </span>
              <span style={{ fontFamily:"var(--mono)", fontWeight:800, color:"#f59e0b", letterSpacing:"0.1em", fontSize:13 }}>{generatedPwd}</span>
            </div>
          )}
        </FieldGroup>
        )}

        {!isLecturer && form.dob && (
        <FieldGroup label="Confirm Password" required>
          <input type="password" value={form.confirmPwd||""} onChange={e=>upd("confirmPwd",e.target.value)} placeholder={`Enter ${generatedPwd} to confirm`} />
          {form.confirmPwd && form.confirmPwd !== generatedPwd && (
            <div style={{ fontSize:11, color:"var(--red)", marginTop:4 }}>
              <i className="fa fa-times-circle" style={{marginRight:4}}></i>Password does not match your date of birth.
            </div>
          )}
          {form.confirmPwd && form.confirmPwd === generatedPwd && (
            <div style={{ fontSize:11, color:"var(--green)", marginTop:4 }}>
              <i className="fa fa-check-circle" style={{marginRight:4}}></i>Password confirmed!
            </div>
          )}
        </FieldGroup>
        )}

        {error && <Alert type="error" style={{ marginBottom:12 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}

        {(() => {
          // Disable the submit button until the DOB makes a realistic age and
          // the confirm-password matches. This ensures a 2026 (or any under-21)
          // DOB can never reach the registration handler at all.
          const dobOk = !isLecturer
            ? (!!form.dob && ageFromDob != null && ageFromDob >= MIN_AGE && ageFromDob <= MAX_AGE)
            : true;
          const confirmOk = !isLecturer ? (!!form.confirmPwd && form.confirmPwd === generatedPwd) : true;
          const blocked = !isLecturer && (!dobOk || !confirmOk);
          return (
            <Btn
              size="lg"
              onClick={submit}
              disabled={blocked}
              title={blocked ? "Enter a valid date of birth (at least 21 years old) and confirm it before continuing." : undefined}
              style={{
                background: isLecturer ? "#8b5cf6" : "#0ea5e9",
                marginBottom:10,
                opacity: blocked ? 0.55 : 1,
                cursor: blocked ? "not-allowed" : "pointer",
              }}
            >
              <i className="fa fa-check-circle"></i> Complete Registration &amp; Sign In
            </Btn>
          );
        })()}
        <Btn size="lg" variant="ghost" onClick={onCancel}>
          ← Back to Login
        </Btn>
      </div>
    </div>
  );
};

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
const LoginScreen = ({ onLogin, users, onRegister }) => {
  const { settings } = useContext(SettingsCtx) || { settings: DEFAULT_SETTINGS };
  const [email, setEmail]   = useState("");
  const [pwd,   setPwd]     = useState("");
  const [error, setError]   = useState("");
  const [loading, setLoading] = useState(false);
  const [pendingReg, setPendingReg] = useState(null);
  const [selectedRole, setSelectedRole] = useState(null);
  const [regMode, setRegMode] = useState(false); // true = new student registration mode
  const ROLE_EMAILS = { student:"", admin:"admin@uni.ac.ug" };

  // Show guided registration screen
  if(pendingReg) {
    return (
      <AutoRegisterScreen
        email={pendingReg.email}
        pwd={pendingReg.pwd}
        role={pendingReg.role || "student"}
        existingEmails={users.map(u => u.email)}
        depts={(() => { try { const v=localStorage.getItem("dai_d"); return v?JSON.parse(v):DEPTS; } catch { return DEPTS; } })()}
        onComplete={details => { onRegister({...details, role: pendingReg.role || "student"}); setPendingReg(null); setRegMode(false); }}
        onCancel={() => { setPendingReg(null); setRegMode(false); }}
      />
    );
  }

  const attemptLogin = (e, p) => {
    if(!e || !p) { setError("Please enter your email and password."); return; }
    setError(""); setLoading(true);
    setTimeout(() => {
      const emailExists = users.find(x => x.email.toLowerCase() === e.toLowerCase());
      if(!emailExists) {
        setError("Account not found. Contact system administration if your account was not activated.");
        setLoading(false);
        return;
      }
      const u = users.find(x => x.email.toLowerCase() === e.toLowerCase() && x.pwd === p);
      if(!u) {
        setError(selectedRole==="student" ? "Incorrect password. Use your date of birth (DDMMYYYY)." : "Incorrect password.");
        setLoading(false);
        return;
      }
      onLogin(u);
    }, 500);
  };

  const startRegister = () => {
    setRegMode(true);
    setEmail("");
    setPwd("");
    setError("");
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20, background:"var(--bg)", position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", top:"-10%", left:"50%", transform:"translateX(-50%)", width:"80%", height:"50%", background:"transparent", pointerEvents:"none" }} />
      <div className="login-card" style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:20, padding:36, width:"100%", maxWidth:420, position:"relative", animation:"fadeUp .4s ease" }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", marginBottom:12 }}>
            <img src="./assets/university-of-kisubi-logo.png" alt="University of Kisubi" style={{ width:"min(210px, 80vw)", height:"auto", maxHeight:74, objectFit:"contain" }} />
          </div>
          <div style={{ lineHeight:1.4 }}>
            <div style={{ fontSize:20, fontWeight:800, letterSpacing:"-0.01em", color:"var(--tx)" }}>DropoutAI</div>
            <div style={{ fontSize:12, color:"var(--tx3)", marginTop:2 }}>Student Dropout Prediction System</div>
          </div>
          <div style={{ ...S.flex(6,"center","center"), marginTop:10 }}>
            {Object.entries(ROLE_THEMES).map(([r,t]) => (
              <button key={r} onClick={() => { setSelectedRole(r); setEmail(ROLE_EMAILS[r]); setPwd(r==="admin"?"admin":""); setError(""); }}
                style={{ ...S.tag(selectedRole===r ? t.primary : t.primary), cursor:"pointer", border:`1px solid ${t.primary}40`,
                  background: selectedRole===r ? t.primary : `${t.primary}20`,
                  color: selectedRole===r ? "#fff" : t.primary,
                  fontFamily:"var(--mono)", fontSize:11, fontWeight:700,
                  display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:100,
                  transition:"all .15s", outline:"none" }}
                onMouseEnter={e => { if(selectedRole!==r){ e.currentTarget.style.background=t.primary; e.currentTarget.style.color="#fff"; }}}
                onMouseLeave={e => { if(selectedRole!==r){ e.currentTarget.style.background=`${t.primary}20`; e.currentTarget.style.color=t.primary; }}}>
                {t.emoji} {t.label}
              </button>
            ))}
          </div>
        </div>

        <FieldGroup label="University Email">
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder={selectedRole==="student" ? "jn.namayanja@unik.ac.ug" : "admin@uni.ac.ug"} />
        </FieldGroup>
        {selectedRole === "student" ? (
          <FieldGroup label="Password">
            <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Your password or Student ID if first login" onKeyDown={e => e.key==="Enter" && attemptLogin(email,pwd)} />
            <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
              <i className="fa fa-info-circle" style={{marginRight:4}}></i>
              If admin created your account: email is <strong>initials.lastname@unik.ac.ug</strong>, password is your <strong>Student ID</strong> (e.g. STU-001).
              If you self-registered: use your university email and date of birth (DDMMYYYY) as password.

        ) : (
          <FieldGroup label="Password">

        {error && <Alert type="error" style={{ marginBottom:12 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}
        <Btn size="lg" onClick={() => {

        }} disabled={loading} style={{ marginBottom:18, background: regMode ? "#0ea5e9" : "#2563eb" }}>
          {loading ? <><Spinner /> Signing in…</> : regMode ? <><i className="fa fa-user-plus"></i> Continue to Register</> : "Sign In →"}
        </Btn>

        {/* New student self-registration */}
        {(selectedRole === "student") && (

            <div style={{ background: selectedRole==="lecturer" ? "rgba(139,92,246,.07)" : "rgba(14,165,233,.07)", border:`1px solid ${selectedRole==="lecturer"?"rgba(139,92,246,.2)":"rgba(14,165,233,.2)"}`, borderRadius:8, padding:"10px 14px", fontSize:12, color:"var(--tx2)", marginBottom:16, lineHeight:1.6, display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>

                Register →

            <div style={{ marginBottom:16 }}>
              <div style={{ background: selectedRole==="lecturer"?"rgba(139,92,246,.07)":"rgba(14,165,233,.07)", border:`1px solid ${selectedRole==="lecturer"?"rgba(139,92,246,.2)":"rgba(14,165,233,.2)"}`, borderRadius:8, padding:"10px 14px", fontSize:12, color: selectedRole==="lecturer"?"#8b5cf6":"#0ea5e9", marginBottom:12, lineHeight:1.6 }}>
                <i className="fa fa-info-circle" style={{marginRight:6}}></i>Click <strong>Sign In</strong> with any email — you'll be guided to register. Your university email and password will be generated automatically.
              </div>
              <button onClick={() => { setRegMode(false); setEmail(""); setPwd(""); setError(""); }}
                style={{ background:"none", border:"none", color:"var(--tx3)", fontSize:12, cursor:"pointer", textDecoration:"underline" }}>

            </div>

      </div>

  );
