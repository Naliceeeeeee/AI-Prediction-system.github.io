              <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6, marginBottom:12 }}>Your name and department are locked. Use <strong>Your academic position</strong> above to set year and semester each term.</div>
              <Btn size="sm" variant="ghost" onClick={() => setPage("my-profile")}>View Profile →</Btn>
            </div>
            <div style={{ ...S.card(20), background:"rgba(139,92,246,.07)", border:"1px solid rgba(139,92,246,.2)" }}>
              <div style={{ fontSize:24, marginBottom:8 }}><i className="fa fa-magic"></i></div>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:4 }}>Predictions</div>
              <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6, marginBottom:12 }}>No predictions yet. The system will run the AI model once your data is verified.</div>
              <Btn size="sm" variant="ghost" onClick={() => setPage("my-predictions")}>View History →</Btn>
            </div>
            <div style={{ ...S.card(20), background:"rgba(16,185,129,.07)", border:"1px solid rgba(16,185,129,.2)" }}>
              <div style={{ fontSize:24, marginBottom:8 }}><i className="fa fa-info-circle"></i></div>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:4 }}>Model Accuracy</div>
              <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6, marginBottom:8 }}>The prediction model has an <strong style={{color:"var(--green)"}}>82.5%</strong> accuracy rate using GPA and financial status.</div>
            </div>
          </div>

          {/* Profile quick-view */}
          <Card>
            <CardHeader title="My Registered Details" action={<Btn size="sm" variant="ghost" onClick={() => setPage("my-profile")}>Full Profile →</Btn>} />
            <div style={S.grid("repeat(3,1fr)", 12)}>
              {[["Name", myData?.name || user.name, "#0ea5e9"], ["Department", myData?.dept || user.dept, "#8b5cf6"], ["Year · Semester", formatStudentPeriodLine(myData, user), "#10b981"]].map(([k,v,c]) => (
                <div key={k} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:14 }}>
                  <div style={{ ...S.label, marginBottom:6 }}>{k}</div>
                  <div style={{ fontSize:14, fontWeight:700, color:c }}>{v || "—"}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* Self-service password reset right on the welcome screen */}
          <PasswordChangeCard accentColor="#0ea5e9" role="student" />
        </div>
      </RoleBasedRoute>
    );
  }

  // displayData: use student record if it has data, otherwise fall back to latest prediction's data
  // When all predictions deleted → falls back to student record (which may have zeros)
  const latestPredData = myPreds.length > 0 ? myPreds[0].student : null;
  const displayData = hasStudentData
    ? myData
    : latestPredData
      ? { ...myData, gpa: latestPredData.gpa, fin: latestPredData.fin, dept: latestPredData.dept || myData?.dept || user.dept, year: myData?.year || user.year, semesterInYear: myData?.semesterInYear ?? user.semesterInYear }
      : myData;

  // pred: use latest prediction result if predictions exist, otherwise compute from displayData
  const pred = myPreds.length > 0
    ? myPreds[0].res
    : (displayData && displayData.gpa > 0)
      ? mlPredict(displayData)
      : null;

  return (
    <RoleBasedRoute allowed={["student"]}>
      <div style={S.col(20)}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-graduation-cap" style={{fontSize:18,marginRight:8}}></i>My Dashboard</h2>
            <p style={S.sub}>Welcome back, {user.name.split(" ")[0]}. Here's your academic overview.</p>
            <div style={{ height:1, background:"#000", marginTop:16 }} />
          </div>
          <div style={{ ...S.flex(8), flexWrap:"wrap" }}>
            <Btn variant="ghost" onClick={() => setPage("my-profile")} title="Open My Profile to reset your password"><i className="fa fa-key"></i> Reset Password</Btn>
            <Btn variant="ghost" onClick={() => setPage("my-profile")}>View Full Profile →</Btn>
          </div>
        </div>

        {academicPositionCard}

        {continuousTrackerCard}

        {/* Persistent success banner so it doesn't vanish with the form */}
        {submitMsg && !editingFactors && (
          <Alert type="success">
            <i className="fa fa-check-circle" style={{marginRight:6}}></i>{submitMsg}
          </Alert>
        )}

        {/* When the student clicks "Edit my factors" — or hasn't completed them yet —
            show the form right here so it doesn't just disappear after save. */}
        {(editingFactors || !hasStudentSubmission) && factorsFormCard}

        {/* Always-visible read-only summary of every factor the student submitted. */}
        {mySubmittedFactorsCard}

        {/* KPI Cards */}
        <div style={S.grid("repeat(4,1fr)",16)}>
          <KPI label="GPA"        value={displayData ? Number(displayData.gpa).toFixed(2) : "—"} color={displayData?.gpa<2?"#ef4444":displayData?.gpa<2.5?"#f59e0b":"#10b981"} icon={<i className="fa fa-book"></i>} sub="Current grade" />
          <KPI label="Financial" value={displayData ? ["Good","Moderate","Poor"][displayData.fin] ?? "—" : "—"} color={displayData?.fin===2?"#ef4444":displayData?.fin===1?"#f59e0b":"#10b981"} icon={<i className="fa fa-money"></i>} sub="Fee stress level" />
          <KPI label="Risk Score" value={pred ? `${(pred.risk*100).toFixed(1)}%` : "—"} color={pred?.prediction===1?"#ef4444":"#10b981"} icon={<i className="fa fa-bar-chart"></i>} sub={pred?.prediction===1?"At Risk":"Not At Risk"} />
          <KPI label="Confidence" value={pred ? `${(pred.confidence*100).toFixed(1)}%` : "—"} color="#8b5cf6" icon={<i className="fa fa-bullseye"></i>} sub="Model certainty" />
        </div>

        {myPreds.length > 0 && (
          <div style={S.col(16)}>
            <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.65, padding:"12px 16px", background:"rgba(59,130,246,.06)", borderRadius:10, border:"1px solid rgba(59,130,246,.2)" }}>
              <i className="fa fa-line-chart" style={{ marginRight:8, color:"var(--blue)" }}></i>
              Longitudinal tracking: your programme has <strong>{totalSemCheckpoints}</strong> semester checkpoints ({courseYears}-year track). Records: <strong>{myPreds.length}</strong> · highest semester slot: <strong>{maxPeriodDone || "—"}</strong>.
              {maxPeriodDone > 0 && maxPeriodDone < totalSemCheckpoints && " After each new semester, staff should run an updated checkpoint so your trend line stays meaningful."}
            </div>
            <PredictionTrendChart history={myPreds} totalSemesters={totalSemCheckpoints} />
          </div>
        )}

        <div style={S.grid("1fr 1fr",20)}>
          <Card>
            <CardHeader title="My Latest Prediction Result" />
            {pred && displayData
              ? <PredictionResultCard result={pred} student={displayData} />
              : <div style={{ textAlign:"center", padding:24, color:"var(--tx3)" }}>No prediction run yet.</div>
            }
            {myPreds.length > 0 && (
              <div style={{ marginTop:12, fontSize:11, color:"var(--tx3)", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <i className="fa fa-clock-o"></i>
                Last run: {new Date(myPreds[0].ts).toLocaleString()} by <strong style={{color:"var(--tx2)"}}>{myPreds[0].by}</strong>
                <Btn size="sm" variant="ghost" onClick={() => setPage("my-predictions")}>Full History ({myPreds.length}) →</Btn>
              </div>
            )}
          </Card>
          <div style={S.col(16)}>
            <Card>
              <CardHeader title="Performance Summary" />
              {displayData ? (
                [
                  ["GPA", (Number(displayData.gpa)-1.5)/2.5*100, "#8b5cf6", () => Number(displayData.gpa).toFixed(2)],
                  ["Financial stress", (Number(displayData.fin)/2)*100, "#ef4444", () => ["Low","Moderate","High"][displayData.fin] ?? "—"],
                ].map(([l,v,c,fmt])=>(
                  <div key={l} style={{ marginBottom:14 }}>
                    <div style={{ ...S.flex(0,"center","space-between"), fontSize:12, color:"var(--tx2)", marginBottom:5 }}>
                      <span>{l}</span>
                      <span style={{ fontFamily:"var(--mono)", color:c, fontWeight:700 }}>{fmt()}</span>
                    </div>
                    <div style={{ height:6, background:"rgba(255,255,255,.05)", borderRadius:3, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${Math.min(Math.max(v,0),100)}%`, background:c, borderRadius:3, transition:"width .8s ease" }} />
                    </div>
                  </div>
                ))
              ) : <div style={{ color:"var(--tx3)", fontSize:12, padding:8 }}>No academic data yet.</div>}
            </Card>
            <Card>
              <CardHeader title="Academic Details" />
              <div style={S.col(8)}>
                {[
                  ["GPA", displayData ? Number(displayData.gpa).toFixed(2) : "—"],
                  ["Financial Status", displayData ? ["Good","Moderate","Poor"][displayData.fin] : "—"],
                  ["Department", displayData?.dept || user.dept || "—"],
                  ["Year · Semester", formatStudentPeriodLine(displayData, user)],
                  ["Medical Form", displayData?.medicalFormFile?.name
                    ? displayData.medicalFormFile.name
                    : (Number(displayData?.hasHealthIssue) === 1 ? "Not uploaded" : "Not required")],
                  ["Semester Results", displayData?.semesterResultFile?.name || "Not uploaded"],
                  ["Model Accuracy","82.5%"]
                ].map(([k,v])=>(
                  <div key={k} style={{ ...S.flex(0,"center","space-between"), padding:"7px 0", borderBottom:"1px solid var(--bdr)", fontSize:13 }}>
                    <span style={{ color:"var(--tx3)" }}>{k}</span>
                    <span style={{ fontWeight:600 }}>{v}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>

        {/* Interventions logged for this student */}
        <Card>
          <CardHeader title="Interventions Logged For Me" />
          {myInterventions.length === 0 ? (
            <div style={{ textAlign:"center", padding:"24px 16px" }}>
              <div style={{ fontSize:32, marginBottom:8, color:"var(--tx3)" }}><i className="fa fa-clipboard"></i></div>
              <div style={{ fontSize:13, color:"var(--tx3)" }}>No interventions logged yet. Admin will record support actions here.</div>
            </div>
          ) : (
            <div style={S.col(10)}>
              {myInterventions.map((iv, i) => (
                <div key={i} style={{ padding:"12px 14px", background:"var(--sur2)", border:"1px solid var(--bdr)", borderLeft:"4px solid #10b981", borderRadius:8, display:"flex", gap:12, alignItems:"flex-start" }}>
                  <div style={{ width:36, height:36, borderRadius:8, background:"rgba(16,185,129,.12)", border:"1px solid rgba(16,185,129,.25)", display:"flex", alignItems:"center", justifyContent:"center", color:"#10b981", flexShrink:0 }}>
                    <i className="fa fa-clipboard"></i>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:"var(--tx)" }}>{iv.type || "Support"}</span>
                      <span style={{ fontSize:10, color:"var(--tx3)", fontFamily:"var(--mono)" }}>{iv.date || "—"}</span>
                    </div>
                    <div style={{ fontSize:12, color:"var(--tx2)", lineHeight:1.6 }}>{iv.note || iv.notes || "—"}</div>
                    <div style={{ fontSize:11, color:"var(--tx3)", marginTop:4 }}>By: {iv.by || "—"}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>

        {/* Self-service password reset right on the dashboard */}
        <PasswordChangeCard accentColor="#0ea5e9" role="student" />
      </div>
    </RoleBasedRoute>
  );
};

// ─── LECTURER DASHBOARD ───────────────────────────────────────────────────────
const LecturerDashboard = ({ page, setPage, students, setStudents, setUsers, predHistory, addPred, setPredHist, interventions, addIntervention, globalSearch="", setGlobalSearch, depts=DEPTS, auditLog=[], addAudit }) => {
  const { user } = useContext(AuthCtx);
  const myStudents = students.filter(s => s.dept === user.dept);
  const [activeStudent, setActiveStudent] = useState(null);
  const [predResult, setPredResult] = useState(null);
  const [predStudent, setPredStudent] = useState(null);
  const [lecDrillFilter, setLecDrillFilter] = useState(null); // null | "all" | "risk" | "accuracy"

  const handlePredict = (s) => { setActiveStudent(s); setPage("make-prediction"); };
  const handlePredResult = (res, stu) => {
    setPredResult(res); setPredStudent(stu);
    addPred({
      res,
      student: { name:stu.name, sid:stu.sid, dept:stu.dept, year:stu.year, gpa:stu.gpa, fin:stu.fin },
      ts: new Date().toISOString(),
      by: "System",
      studentId: activeStudent?.id,
      periodLabel: stu.periodLabel,
      periodIndex: stu.periodIndex,
      totalSemesters: stu.totalSemesters,
      academicYear: stu.academicYear,
    });
    addAudit?.({ action:`Prediction run: ${res.prediction===1?"At Risk":"Safe"} (${(res.risk*100).toFixed(1)}%)`, target:stu.name, by:"System" });
    // Update the student record with the data used in this prediction
    if(activeStudent?.id) {
      const sid = activeStudent.id;
      setStudents(prev => {
        const next = prev.map(s => s.id === sid
          ? { ...s, gpa:+stu.gpa, fin:+stu.fin, year: stu.year, semesterInYear: stu.semesterInYear ?? s.semesterInYear }
          : s
        );
        lsSet("dai_s", next);
        return next;
      });
      setUsers?.(prev => prev.map(u => u.studentId === sid || u.id === sid ? { ...u, year: stu.year, semesterInYear: stu.semesterInYear ?? u.semesterInYear } : u));
    }
  };

  if(page === "students") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <div style={S.col(16)}>
        <div style={S.flex(0,"center","space-between")}>
          <h2 style={S.title}><i className="fa fa-users" style={{fontSize:18,marginRight:8}}></i>My Students</h2>
          <Btn onClick={() => setPage("add-student")} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-user-plus"></i> Add Student</Btn>
        </div>
        <StudentListTable students={myStudents} onView={s => { setActiveStudent(s); setPage("student-detail"); }} onPredict={handlePredict} onEdit={s => { setActiveStudent(s); setPage("edit-student"); }} role="lecturer" externalSearch={globalSearch} />
      </div>
    </RoleBasedRoute>
  );

  if(page === "add-student") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <Card>
        <StudentForm title="Add New Student" depts={depts} onBack={() => setPage("students")} existingStudents={students} onSave={s => {
          const newId = Date.now();
          const newS = { ...s, id:newId, lecturerId:user.id, prev:{ gpa:0, fin:1 } };
          setStudents(prev => { const next=dedupStudents([...prev,newS]); lsSet("dai_s",next); return next; });
          // Auto-create a login account so the student can log in straight away
          if(s.email) {
            const newUser = {
              id: newId, email: s.email.trim().toLowerCase(),
              pwd: s.sid,          // temp password = their Student ID
              role: "student", name: s.name, dept: s.dept, year: s.year,
              semesterInYear: studentSemesterInYear(s),
              color: "#0ea5e9", studentId: newId, sid: s.sid,
              mustChangePwd: true, // force password change on first login
              registeredAt: new Date().toISOString(),
            };
            setUsers(prev => { const next=dedupUsers([...prev,newUser]); lsSet("dai_us",next); return next; });
          }
          addAudit?.({ action:"Student added", target:s.name||"New Student", by:user.name });
          setPage("students");
        }} />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "edit-student" && activeStudent) return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <Card>
        <StudentForm title={`Edit: ${activeStudent.name}`} depts={depts} initial={{ ...activeStudent, firstName:activeStudent.name.split(" ")[0], lastName:activeStudent.name.split(" ").slice(1).join(" ") }} onBack={() => setPage("students")} existingStudents={students} onSave={updated => {
          setStudents(prev => {
            const next = prev.map(s => s.id===activeStudent.id ? {...s,...updated} : s);
            lsSet("dai_s", next);
            return next;
          });
          // Create or update the student's login account
          if(updated.email) {
            setUsers(prev => {
              const existing = prev.find(u => u.studentId === activeStudent.id || u.email === updated.email.trim().toLowerCase());
              let next;
              if(existing) {
                // Update email/sid if changed
                next = prev.map(u => u.id === existing.id
                  ? { ...u, email: updated.email.trim().toLowerCase(), sid: updated.sid, name: updated.name, dept: updated.dept, year: updated.year, semesterInYear: studentSemesterInYear(updated) }
                  : u
                );
              } else {
                // No account yet — create one now
                const newUser = {
                  id: activeStudent.id, email: updated.email.trim().toLowerCase(),
                  pwd: updated.sid, role: "student", name: updated.name,
                  dept: updated.dept, year: updated.year, semesterInYear: studentSemesterInYear(updated),
                  color: "#0ea5e9",
                  studentId: activeStudent.id, sid: updated.sid,
                  mustChangePwd: true, registeredAt: new Date().toISOString(),
                };
                next = dedupUsers([...prev, newUser]);
              }
              lsSet("dai_us", next);
              return next;
            });
          }
          addAudit?.({ action:"Student record updated", target:activeStudent.name, by:user.name });
          setPage("students");
        }} />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "make-prediction") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <div style={S.grid("1fr 1fr",20)}>
        <Card>
          <CardHeader title={activeStudent ? `Predict for: ${activeStudent.name}` : "Make Prediction"} />
          <PredictionForm student={activeStudent} depts={depts} onResult={handlePredResult} onBack={() => setPage("students")} />
        </Card>
        <div>
          {predResult ? (
            <Card>
              <CardHeader title="Prediction Output" />
              <PredictionResultCard result={predResult} student={predStudent} />
            </Card>
          ) : (
            <Card>
              <div style={{ textAlign:"center", padding:"40px 20px", color:"var(--tx3)" }}>
                <div style={{ fontSize:40, marginBottom:12 }}><i className="fa fa-magic"></i></div>
                <p style={{ fontSize:13 }}>Results will appear here after running the prediction.</p>
              </div>
            </Card>
          )}
        </div>
      </div>
    </RoleBasedRoute>
  );

  if(page === "pred-history") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <Card>
        <CardHeader title="Prediction History" action={<span style={{ fontSize:12, color:"var(--tx3)" }}>Your students only</span>} />
        <PredHistoryTable
          history={predHistory.filter(h => myStudents.some(s=>s.id===h.studentId) || h.by===user.name)}
          onDelete={ts => {
            setPredHist(prev => {
              const next = prev.filter(h => h.ts !== ts);
              lsSet("dai_p", next);
              return next;
            });
          }}
        />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "my-profile") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <EditableProfilePage role="lecturer" />
    </RoleBasedRoute>
  );

  if(page === "bulk-predict") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <BulkPredictionPage students={myStudents} addPred={addPred} userName={user.name} setStudents={setStudents} setUsers={setUsers} addAudit={addAudit} />
    </RoleBasedRoute>
  );

  if(page === "interventions") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <InterventionsPage students={myStudents} interventions={interventions} addIntervention={addIntervention} userName={user.name} role="lecturer" />
    </RoleBasedRoute>
  );

  if(page === "calendar") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <CalendarPage />
    </RoleBasedRoute>
  );

  if(page === "student-detail" && activeStudent) {
    // Re-derive from the live students array so newly submitted factors show
    // up the moment the student saves them, without requiring a re-click.
    const liveStudent = myStudents.find(s => s.id === activeStudent.id) || students.find(s => s.id === activeStudent.id) || activeStudent;
    const pred = mlPredict(liveStudent);
    const lecLiveYear = parseYearOfStudy(liveStudent.year);
    const lecLiveSem  = studentSemesterInYear(liveStudent);
    const lecLivePeriodLabel = `Year ${lecLiveYear} · Semester ${lecLiveSem}`;
    const lecStudentHistory  = (predHistory || []).filter(h => h && (h.studentId === liveStudent.id || h.student?.sid === liveStudent.sid));
    return (
      <RoleBasedRoute allowed={["lecturer"]}>
        <div style={S.col(20)}>
          <Btn variant="ghost" size="sm" onClick={() => setPage("students")} style={{ marginBottom:4 }}>← Back to Students</Btn>
          <div className="student-header" style={{ ...S.card(24), background:"var(--sur2)", display:"flex", gap:20, alignItems:"flex-start", boxShadow:"0 4px 16px rgba(0,0,0,.18)", flexWrap:"wrap" }}>
            <div style={{ width:60, height:60, borderRadius:14, background:"var(--primary,#8b5cf6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, fontWeight:800, color:"#fff", flexShrink:0 }}>
              {liveStudent.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
            </div>
            <div style={{ flex:"1 1 280px", minWidth:0 }}>
              <div style={{ fontSize:20, fontWeight:800, marginBottom:4, wordBreak:"break-word" }}>{liveStudent.name}</div>
              <div style={{ fontSize:13, color:"var(--tx3)", marginBottom:6 }}>
                <span style={{ fontFamily:"var(--mono)" }}>{liveStudent.sid || "—"}</span>
                {" · "}{liveStudent.dept || "—"}
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"3px 9px", background:"rgba(139,92,246,.12)", border:"1px solid rgba(139,92,246,.35)", color:"#8b5cf6", borderRadius:999, fontSize:11, fontWeight:700 }}>
                  <i className="fa fa-graduation-cap"></i>{lecLivePeriodLabel}
                </span>
                <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"3px 9px", background:"rgba(148,163,184,.12)", border:"1px solid rgba(148,163,184,.35)", color:"var(--tx2)", borderRadius:999, fontSize:11, fontWeight:700 }}>
                  <i className="fa fa-history"></i>{lecStudentHistory.length} prediction{lecStudentHistory.length===1?"":"s"} on file
                </span>
              </div>
              <div style={{ ...S.flex(6) }}><RiskBadge risk={pred.prediction} score={pred.risk} /><FinBadge fin={liveStudent.fin} /></div>
            </div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8, flex:"0 1 auto" }}>
              <Btn variant="ghost" title="Download PDF Report" onClick={() => printStudentReport(liveStudent, interventions)}><i className="fa fa-file-text-o"></i> PDF Report</Btn>
              <Btn variant="ghost" title="Edit Student" onClick={() => { setActiveStudent(liveStudent); setPage("edit-student"); }}><i className="fa fa-pencil"></i> Edit</Btn>
              <Btn title="Run Prediction" onClick={() => handlePredict(liveStudent)} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-magic"></i> Predict</Btn>
            </div>
          </div>
          {liveStudent.submittedAt && (
            <div style={{ background:"rgba(34,197,94,.08)", border:"1px solid rgba(34,197,94,.25)", borderRadius:10, padding:"10px 14px", fontSize:12, color:"var(--green)", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
              <i className="fa fa-check-circle"></i>
              <span>
                Factors submitted by the student on {new Date(liveStudent.submittedAt).toLocaleString("en-GB", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })} for <strong>{lecLivePeriodLabel}</strong>.
              </span>
            </div>
          )}
          <SemesterComparison student={liveStudent} history={predHistory} />
          <div style={S.grid("1fr 1fr",20)}>
            <Card>
              <CardHeader title="Recorded Indicators" />
              <div style={S.grid("1fr 1fr",10)}>
                {(() => {
                  const cells = [
                    ["GPA", liveStudent.gpa != null ? Number(liveStudent.gpa).toFixed(2) : "—", liveStudent.gpa<2?"var(--red)":liveStudent.gpa<2.5?"var(--amber)":"var(--green)"],
                    ["Financial", ["Good","Moderate","Poor"][liveStudent.fin] ?? "—", ["var(--green)","var(--amber)","var(--red)"][liveStudent.fin] ?? "var(--tx2)"],
                  ];
                  if(liveStudent.age != null && liveStudent.age !== "") {
                    const a = Number(liveStudent.age);
                    cells.push(["Age", `${a} yrs`, a>=60?"var(--red)":a>=45?"var(--amber)":"var(--green)"]);
                  }
                  if(liveStudent.feesLevel != null) cells.push(["Fees", ["Stable","Moderate","Serious"][Number(liveStudent.feesLevel)] ?? "—", ["var(--green)","var(--amber)","var(--red)"][Number(liveStudent.feesLevel)] ?? "var(--tx2)"]);
                  if(liveStudent.familyBackground != null) cells.push(["Family support", ["Strong","Average","Low"][Number(liveStudent.familyBackground)] ?? "—", ["var(--green)","var(--amber)","var(--red)"][Number(liveStudent.familyBackground)] ?? "var(--tx2)"]);
                  if(liveStudent.workingStatus != null) cells.push(["Working", Number(liveStudent.workingStatus)===1?"Yes":"No", Number(liveStudent.workingStatus)===1?"var(--amber)":"var(--green)"]);
                  if(liveStudent.courseChoice != null) cells.push(["Own choice", Number(liveStudent.courseChoice)===1?"Yes":"No", Number(liveStudent.courseChoice)===1?"var(--green)":"var(--red)"]);
                  if(liveStudent.homeResponsibility != null) cells.push(["Home resp.", ["Low","Moderate","High"][Number(liveStudent.homeResponsibility)] ?? "—", ["var(--green)","var(--amber)","var(--red)"][Number(liveStudent.homeResponsibility)] ?? "var(--tx2)"]);
                  if(liveStudent.hasHealthIssue != null) cells.push(["Health issue", Number(liveStudent.hasHealthIssue)===1?"Yes":"No", Number(liveStudent.hasHealthIssue)===1?"var(--red)":"var(--green)"]);
                  if(liveStudent.medicalFormFile) cells.push(["Medical form", "Uploaded", "var(--green)"]);
                  if(liveStudent.semesterResultFile) cells.push(["Sem. result", "Uploaded", "var(--green)"]);
                  return cells.map(([l,v,c])=>(
                    <div key={l} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:9, padding:12 }}>
                      <div style={S.label}>{l}</div>
                      <div style={{ fontFamily:"var(--mono)", fontSize:16, fontWeight:700, color:c, marginTop:5 }}>{v}</div>
                    </div>
                  ));
                })()}
              </div>
            </Card>
            <Card>
              <CardHeader title="Prediction Result" />
              <PredictionResultCard result={pred} student={liveStudent} />
            </Card>
          </div>
          <InterventionPanel student={liveStudent} interventions={interventions} addIntervention={addIntervention} userName={user.name} />
          <div>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:16 }}>
              <div>
                <h3 style={{ fontSize:15, fontWeight:800, marginBottom:2 }}><i className="fa fa-tasks" style={{marginRight:8}}></i>Recommended Actions</h3>
                <p style={{ fontSize:12, color:"var(--tx3)" }}>Auto-generated action plan based on this student's risk profile.</p>
              </div>
            </div>
            <RecommendedActionsPanel student={liveStudent} interventions={interventions} addIntervention={addIntervention} userName={user.name} />
          </div>
        </div>
      </RoleBasedRoute>
    );
  }

  // Default dashboard
  const risk = myStudents.filter(s=>mlPredict(s).prediction===1).length;

  const lecDrillStudents = lecDrillFilter === "all"  ? myStudents
                         : lecDrillFilter === "risk" ? myStudents.filter(s=>mlPredict(s).prediction===1)
                         : [];
  const lecDrillColor = lecDrillFilter === "risk" ? "#ef4444" : lecDrillFilter === "accuracy" ? "#10b981" : "#8b5cf6";
  const lecDrillTitle = lecDrillFilter === "all"      ? "My Students"
                      : lecDrillFilter === "risk"     ? "At-Risk Students"
                      : lecDrillFilter === "accuracy" ? "Model Accuracy Breakdown"
                      : "";

  const ClickKPI = ({ label, value, sub, color, icon, fkey }) => (
    <div
      onClick={() => setLecDrillFilter(f => f === fkey ? null : fkey)}
      style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderLeft:`5px solid ${color}`, borderRadius:14, padding:20,
        position:"relative", overflow:"hidden", cursor:"pointer",
        boxShadow:"0 4px 18px rgba(0,0,0,.18)", transition:"box-shadow .2s" }}
      onMouseEnter={e=>{ e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,.35)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.boxShadow="0 4px 18px rgba(0,0,0,.18)"; }}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:16 }}>
        {icon && <div style={{ width:48, height:48, borderRadius:12, background:`${color}18`, border:`1px solid ${color}25`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:color }}>{icon}</div>}
        <i className="fa fa-pencil" style={{ fontSize:11, color:color, opacity:.7 }}></i>
      </div>
      <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--tx2)", marginBottom:8 }}>{label}</div>
      <div style={{ fontFamily:"var(--mono)", fontSize:28, fontWeight:700, color, lineHeight:1.1 }}>{value}</div>
      {sub && <div style={{ fontSize:12, color:"var(--tx3)", marginTop:4 }}>{sub}</div>}
    </div>
  );

  return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <div style={S.col(20)}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-book" style={{fontSize:18,marginRight:8}}></i>Lecturer Dashboard</h2>
            <p style={S.sub}>Welcome, {user.name}. Managing {myStudents.length} students.</p>
            <div style={{ height:1, background:"#000", marginTop:16 }} />
          </div>
          <div style={S.flex(8)}>
            <Btn variant="ghost" title="Add New Student" onClick={() => setPage("add-student")}><i className="fa fa-plus"></i> Add Student</Btn>
            <Btn title="Make a Prediction" onClick={() => setPage("make-prediction")} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-magic"></i> Make Prediction</Btn>
          </div>
        </div>

        <div style={S.grid("repeat(3,1fr)",16)}>
          <ClickKPI label="My Students"    value={myStudents.length} color="#8b5cf6" icon={<i className="fa fa-users"></i>} sub="Total assigned"                                                                    fkey="all" />
          <ClickKPI label="At Risk"        value={risk}              color="#ef4444" icon={<i className="fa fa-exclamation-triangle"></i>} sub={`${myStudents.length?((risk/myStudents.length)*100).toFixed(0):0}% of my students`} fkey="risk" />
          <ClickKPI label="Model Accuracy" value="82.5%"             color="#10b981" icon={<i className="fa fa-bullseye"></i>} sub="Prediction reliability"                                                             fkey="accuracy" />
        </div>

        {/* ── Drill-Down Panel ── */}
        {lecDrillFilter && (
          <div style={{ background:"var(--sur)", border:`1px solid ${lecDrillColor}40`, borderRadius:14, padding:20, animation:"fadeUp .25s ease" }}>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:16 }}>
              <div style={S.flex(10,"center")}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:lecDrillColor }} />
                <span style={{ fontSize:15, fontWeight:800 }}>{lecDrillTitle}</span>
                {lecDrillFilter !== "accuracy" && <span style={{ ...S.tag(lecDrillColor), fontSize:11 }}>{lecDrillStudents.length} students</span>}
              </div>
              <Btn size="sm" variant="ghost" onClick={() => setLecDrillFilter(null)}><i className="fa fa-times"></i> Close</Btn>
            </div>

            {lecDrillFilter === "accuracy" ? (
              <div style={S.col(16)}>
                <div style={S.grid("repeat(4,1fr)",12)}>
                  {[
                    ["Test Accuracy",  "82.5%", "#f59e0b", "40 test samples"],
                    ["Train Accuracy", "89.4%", "#10b981", "160 train samples"],
                    ["Precision",      "80.0%", "#3b82f6", "Of predicted at-risk"],
                    ["Recall",         "80.0%", "#8b5cf6", "Of actual at-risk"],
                  ].map(([label, value, color, note]) => (
                    <div key={label} style={{ background:"var(--sur2)", border:`1px solid ${color}30`, borderRadius:10, padding:14, textAlign:"center" }}>
                      <div style={{ fontFamily:"var(--mono)", fontSize:24, fontWeight:800, color }}>{value}</div>
                      <div style={{ fontSize:11, fontWeight:700, color:"var(--tx2)", margin:"4px 0 2px" }}>{label}</div>
                      <div style={{ fontSize:10, color:"var(--tx3)" }}>{note}</div>
                    </div>
                  ))}
                </div>
                <div style={S.grid("1fr 1fr",16)}>
                  <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:16 }}>
                    <div style={{ ...S.label, marginBottom:12 }}>Confusion Matrix</div>
                    <div style={S.grid("1fr 1fr",8)}>
                      {[
                        ["True Positive",  "16", "#10b981", "Correctly predicted at-risk"],
                        ["False Negative",  "4", "#ef4444", "Missed at-risk students"],
                        ["False Positive",  "3", "#ef4444", "Wrongly flagged as at-risk"],
                        ["True Negative",  "17", "#10b981", "Correctly predicted safe"],
                      ].map(([label, val, color, note]) => (
                        <div key={label} style={{ background:`${color}10`, border:`1px solid ${color}30`, borderRadius:8, padding:12, textAlign:"center" }}>
                          <div style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:800, color }}>{val}</div>
                          <div style={{ fontSize:10, fontWeight:700, color:"var(--tx2)", marginTop:3 }}>{label}</div>
                          <div style={{ fontSize:9, color:"var(--tx3)", marginTop:2 }}>{note}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:16 }}>
                    <div style={{ ...S.label, marginBottom:12 }}>Feature Coefficients</div>
                    {[
                      ["GPA",         -0.9821, "#10b981"],
                      ["Financial",    0.6134, "#ef4444"],
                    ].map(([name, val, color]) => (
                      <div key={name} style={{ ...S.flex(8,"center"), marginBottom:10 }}>
                        <div style={{ fontSize:12, color:"var(--tx3)", width:90, flexShrink:0 }}>{name}</div>
                        <div style={{ flex:1, height:6, background:"rgba(255,255,255,.05)", borderRadius:3, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${Math.abs(val)*100}%`, background:color, borderRadius:3 }} />
                        </div>
                        <div style={{ fontFamily:"var(--mono)", fontSize:11, fontWeight:700, color:val<0?"var(--green)":"var(--red)", width:52, textAlign:"right" }}>
                          {val>0?"+":""}{val}
                        </div>
                      </div>
                    ))}
                    <div style={{ marginTop:10, fontSize:11, color:"var(--tx3)", lineHeight:1.6, borderTop:"1px solid var(--bdr)", paddingTop:10 }}>
                      Algorithm: <span style={{ color:"var(--tx2)", fontWeight:600 }}>Logistic Regression</span> · AUC-ROC: <span style={{ color:"var(--tx2)", fontWeight:600 }}>~0.87</span> · F1 Score: <span style={{ color:"var(--tx2)", fontWeight:600 }}>80.0%</span>
                    </div>
                  </div>
                </div>
              </div>
            ) : lecDrillStudents.length === 0 ? (
              <Empty icon={<i className="fa fa-check-circle" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No students in this group." />
            ) : (
              <StudentListTable
                students={lecDrillStudents}
                onView={s => { setActiveStudent(s); setPage("student-detail"); }}
                onPredict={handlePredict}
                onEdit={s => { setActiveStudent(s); setPage("edit-student"); }}
                role="lecturer"
              />
            )}

        )}

        <Card>
          <CardHeader title="My Students" action={<Btn size="sm" variant="ghost" onClick={() => setPage("students")}>View All →</Btn>} />
          <StudentListTable students={myStudents.slice(0,6)} onView={s=>{setActiveStudent(s);setPage("student-detail");}} onPredict={handlePredict} onEdit={s=>{setActiveStudent(s);setPage("edit-student");}} role="lecturer" externalSearch={globalSearch} />
        </Card>
      </div>
    </RoleBasedRoute>
  );
};

const DepartmentsPage = ({ students, users, setPage, depts=DEPTS, setDepts, setStudents, addAudit }) => {
  const [search, setSearch] = useState("");
  const [expandedDept, setExpandedDept] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editingDept, setEditingDept] = useState(null); // name of dept being edited
  const [form, setForm] = useState({ name:"", code:"", description:"" });
  const [formError, setFormError] = useState("");
  const [successMsg, setSuccessMsg] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null); // dept name to confirm delete

  const allDepts = Array.from(new Set([...depts, ...students.map(s=>s.dept), ...users.filter(u=>u.role==="admin").map(u=>u.dept)].filter(Boolean)));
  const filtered = allDepts.filter(d => d.toLowerCase().includes(search.toLowerCase()));

  const openAdd = () => {
    setEditingDept(null);
    setForm({ name:"", code:"", description:"" });
    setFormError("");
    setShowForm(true);
  };

  const openEdit = (dept) => {
    setEditingDept(dept);
    setForm({ name:dept, code:"", description:"" });
    setFormError("");
    setShowForm(true);
  };

  const submitDept = () => {
    const name = form.name.trim();
    if(!name) { setFormError("Department name is required."); return; }
    if(editingDept) {
      // Edit — rename department everywhere
      if(name.toLowerCase() !== editingDept.toLowerCase() && allDepts.map(d=>d.toLowerCase()).includes(name.toLowerCase())) {
        setFormError("A department with this name already exists."); return;
      }
      if(setDepts) setDepts(prev => prev.map(d => d===editingDept ? name : d));
      // Update students and users in same dept
      if(setStudents) setStudents(prev => prev.map(s => s.dept===editingDept ? {...s, dept:name} : s));
      addAudit?.({ action:`Department renamed: "${editingDept}" → "${name}"`, target:name, by:"Admin" });
      setSuccessMsg(`Department renamed to "${name}" successfully.`);
    } else {
      // Add new
      if(allDepts.map(d=>d.toLowerCase()).includes(name.toLowerCase())) { setFormError("This department already exists."); return; }
      if(setDepts) setDepts(prev => [...prev, name]);
      addAudit?.({ action:`Department added: "${name}"`, target:name, by:"Admin" });
      setSuccessMsg(`"${name}" department added successfully.`);
    }
    setForm({ name:"", code:"", description:"" });
    setFormError("");
    setShowForm(false);
    setEditingDept(null);
    setTimeout(() => setSuccessMsg(""), 3500);
  };

  const deleteDept = (dept) => {
    const hasStudents = students.some(s => s.dept === dept);
    if(hasStudents) {
      setConfirmDelete(dept);
    } else {
      // Safe to delete directly
      if(setDepts) setDepts(prev => prev.filter(d => d !== dept));
      addAudit?.({ action:`Department deleted: "${dept}"`, target:dept, by:"Admin" });
      setSuccessMsg(`"${dept}" deleted.`);
      setTimeout(() => setSuccessMsg(""), 3000);
    }
  };

  const forceDelete = (dept) => {
    if(setDepts) setDepts(prev => prev.filter(d => d !== dept));
    if(setStudents) setStudents(prev => prev.map(s => s.dept===dept ? {...s, dept:"Unassigned"} : s));
    addAudit?.({ action:`Department force-deleted: "${dept}" (members moved to Unassigned)`, target:dept, by:"Admin" });
    setConfirmDelete(null);
    setSuccessMsg(`"${dept}" deleted. Affected members moved to "Unassigned".`);
    setTimeout(() => setSuccessMsg(""), 4000);
  };

  return (
    <div style={S.col(20)}>

      {/* Add Department Modal */}
      {showForm && (
        <div onClick={() => { setShowForm(false); setFormError(""); }}
          style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(4px)" }}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:18, width:"100%", maxWidth:480, boxShadow:"0 24px 64px rgba(0,0,0,0.6)", animation:"fadeUp .2s ease" }}>

            {/* Modal header */}
            <div style={{ padding:"18px 24px", borderBottom:"1px solid var(--bdr)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:40, height:40, borderRadius:10, background:"rgba(245,158,11,.15)", border:"1px solid rgba(245,158,11,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, color:"#f59e0b" }}>
                  <i className={`fa fa-${editingDept ? "pencil" : "building"}`}></i>
                </div>
                <div>
                  <div style={{ fontSize:15, fontWeight:800, color:"var(--tx)" }}>{editingDept ? `Edit "${editingDept}"` : "Add New Department"}</div>
                  <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{editingDept ? "Rename this department" : "Fill in the details below"}</div>
                </div>
              </div>
              <button onClick={() => { setShowForm(false); setFormError(""); setEditingDept(null); }}
                style={{ width:32, height:32, borderRadius:8, border:"1px solid var(--bdr)", background:"var(--sur2)", cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--tx2)" }}>
                <i className="fa fa-times"></i>
              </button>
            </div>

            {/* Modal body */}
            <div style={{ padding:"20px 24px" }}>
              <FieldGroup label="Department Name" required>
                <input
                  value={form.name}
                  onChange={e => { setForm(f=>({...f, name:e.target.value})); setFormError(""); }}
                  onKeyDown={e => e.key==="Enter" && submitDept()}
                  placeholder="e.g. Computer Science"
                  autoFocus
                />
              </FieldGroup>
              <FieldGroup label="Department Code (optional)">
                <input
                  value={form.code}
                  onChange={e => setForm(f=>({...f, code:e.target.value}))}
                  placeholder="e.g. CS, IT, ENG"
                />
              </FieldGroup>
              <FieldGroup label="Description (optional)">
                <textarea
                  value={form.description}
                  onChange={e => setForm(f=>({...f, description:e.target.value}))}

                  style={{ minHeight:72 }}
                />
              </FieldGroup>
              {formError && (
                <Alert type="error" style={{ marginBottom:12 }}>
                  <i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{formError}

            {/* Modal footer */}
            <div style={{ padding:"14px 24px", borderTop:"1px solid var(--bdr)", display:"flex", gap:10, justifyContent:"flex-end" }}>

                <i className="fa fa-check"></i> {editingDept ? "Save Changes" : "Add Department"}
              </Btn>
            </div>
          </div>
        </div>

      {/* Header */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-building" style={{fontSize:18,marginRight:8}}></i>Departments</h2>
            <p style={S.sub}>Overview of all academic departments and enrolled students.</p>
          </div>
          <Btn onClick={openAdd} title="Add New Department" style={{ background:"var(--primary,#f59e0b)", color:"#000" }}>
            <i className="fa fa-plus"></i> Add Department
          </Btn>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Confirm Delete Modal */}
      {confirmDelete && (
        <div onClick={() => setConfirmDelete(null)}
          style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(4px)" }}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:18, width:"100%", maxWidth:420, boxShadow:"0 24px 64px rgba(0,0,0,0.6)", animation:"fadeUp .2s ease", padding:28 }}>
            <div style={{ width:48, height:48, borderRadius:12, background:"rgba(239,68,68,.15)", border:"1px solid rgba(239,68,68,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, color:"var(--red)", marginBottom:16 }}>
              <i className="fa fa-trash"></i>
            </div>
            <div style={{ fontSize:16, fontWeight:800, color:"var(--tx)", marginBottom:8 }}>Delete "{confirmDelete}"?</div>
            <div style={{ fontSize:13, color:"var(--tx3)", lineHeight:1.7, marginBottom:20 }}>
              This department has students assigned to it.<br/>

            </div>
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
              <Btn variant="ghost" onClick={()=>setConfirmDelete(null)}>Cancel</Btn>
              <Btn variant="danger" onClick={()=>forceDelete(confirmDelete)}>

const AdminDashboard = ({ page, setPage, students, setStudents, users, setUsers, predHistory, addPred, setPredHist, interventions, addIntervention, globalSearch="", setGlobalSearch, depts=[], setDepts, auditLog=[], addAudit }) => {
  const { user } = useContext(AuthCtx);
  const [activeStudent, setActiveStudent] = useState(null);
  const [predResult, setPredResult] = useState(null);
  const [predStudent, setPredStudent] = useState(null);
  const [drillFilter, setDrillFilter] = useState(null);
  const [lecDrill, setLecDrill] = useState(null); // { lecId, filter } for lecturers page

  // ── Cascade-delete: removing a student record must ALSO remove the linked
  //    user account (login), otherwise the deleted person keeps appearing in
  //    every "users" list and their login keeps working. The login row and
  //    the student row share the same `id`, and the user also carries
  //    `studentId` pointing back to it.
  const deleteStudent = (idRaw) => {
    if(idRaw == null) return;
    const id = String(idRaw);
    const removed = students.find(s => String(s.id) === id);
    setStudents(prev => {
      const next = prev.filter(s => String(s.id) !== id);
      lsSet("dai_s", next);
      return next;
    });
    setUsers?.(prev => {
      const next = prev.filter(u =>
        String(u.id) !== id &&
        String(u.studentId ?? "") !== id
      );
      lsSet("dai_us", next);
      return next;
    });
    if(removed) {
      addAudit?.({ action:"Student account deleted (record + login)", target: removed.name || removed.sid || id, by: user.name });
    }
  };

  // ── One-off cleanup: prune "orphaned" student logins — i.e. user rows with
  //    role="student" whose studentId no longer exists in the students list.
  //    Without this, the Users table keeps showing accounts that were deleted
  //    earlier (before cascade-delete was wired up).
  //
  //    Safety: only run when the students list has data. If students happens
  //    to be empty mid-render (e.g. before lsGet has populated state in a
  //    weird timing scenario), bailing out prevents us from wiping every
  //    legitimate student login.
  useEffect(() => {
    if(!users?.length || !setUsers) return;
    if(!students?.length) return;          // refuse to clean when students is empty
    const liveIds = new Set(students.map(s => String(s.id)));
    const orphans = users.filter(u =>
      u.role === "student" &&
      u.studentId != null &&
      !liveIds.has(String(u.studentId))
    );
    if(!orphans.length) return;
    setUsers(prev => {
      const liveIdsNow = new Set(students.map(s => String(s.id)));   // re-derive against latest students inside the updater
      const next = prev.filter(u =>
        !(u.role === "student" && u.studentId != null && !liveIdsNow.has(String(u.studentId)))
      );
      lsSet("dai_us", next);
      return next;
    });
    addAudit?.({
      action: `Cleaned up ${orphans.length} orphaned student login${orphans.length===1?"":"s"}`,
      target: orphans.map(o => o.name || o.email || o.sid).filter(Boolean).join(", ") || "—",
      by: user.name,
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [students.length, users.length]);

  const handlePredict = (s) => { setActiveStudent(s); setPage("make-prediction"); };
  const handlePredResult = (res, stu) => {
    setPredResult(res); setPredStudent(stu);
    addPred({
      res,
      student: { name:stu.name, sid:stu.sid, dept:stu.dept, year:stu.year, gpa:stu.gpa, fin:stu.fin },
      ts: new Date().toISOString(),
      by: "System",
      studentId: activeStudent?.id,
      periodLabel: stu.periodLabel,
      periodIndex: stu.periodIndex,
      totalSemesters: stu.totalSemesters,
      academicYear: stu.academicYear,
    });
    addAudit?.({ action:`Prediction run: ${res.prediction===1?"At Risk":"Safe"} (${(res.risk*100).toFixed(1)}%)`, target:stu.name, by:"System" });
    // Update the student record with the data used in this prediction
    if(activeStudent?.id) {
      const sid = activeStudent.id;
      setStudents(prev => {
        const next = prev.map(s => s.id === sid
          ? { ...s, gpa:+stu.gpa, fin:+stu.fin, year: stu.year, semesterInYear: stu.semesterInYear ?? s.semesterInYear }
          : s
        );
        lsSet("dai_s", next);
        return next;
      });
      setUsers?.(prev => prev.map(u => u.studentId === sid || u.id === sid ? { ...u, year: stu.year, semesterInYear: stu.semesterInYear ?? u.semesterInYear } : u));
    }
  };

  const lecturers = users.filter(u => u.role === "lecturer");

  if(page === "students") return (
    <RoleBasedRoute allowed={["admin"]}>
      <div style={S.col(16)}>
        <div style={S.flex(0,"center","space-between")}>
          <h2 style={S.title}><i className="fa fa-users" style={{fontSize:18,marginRight:8}}></i>All Students</h2>
          <div style={S.flex(8)}>
            <Btn variant="ghost" title="Export to CSV" onClick={() => {
  const dateStr = new Date().toISOString().split("T")[0];
  const rows = [
    ["Student ID","Full Name","Department","Year","GPA","Financial Status","Risk Score %","Prediction","Confidence %"],
    ...students.map(s => {
      const pred = mlPredict(s);
      return [
        s.sid,
        s.name,
        s.dept,
        s.year,
        s.gpa,
        ["Good","Moderate","Poor"][s.fin] || "Unknown",
        (pred.risk*100).toFixed(2),
        pred.prediction===1 ? "At Risk" : "Safe",
        (pred.confidence*100).toFixed(2)
      ];
    })
  ];
  downloadCSV(`students_export_${dateStr}.csv`, rows);
}}><i className="fa fa-download"></i> Export CSV</Btn>
            <Btn title="Add New Student" onClick={() => setPage("add-student")} style={{ background:"var(--primary,#f59e0b)", color:"#000" }}><i className="fa fa-plus"></i> Add Student</Btn>
          </div>
        </div>
        <StudentListTable students={students} onView={s=>{setActiveStudent(s);setPage("student-detail");}} onEdit={s=>{setActiveStudent(s);setPage("edit-student");}} onDelete={deleteStudent} role="admin" externalSearch={globalSearch} />
      </div>
    </RoleBasedRoute>
  );

  if(page === "add-student") return (
    <RoleBasedRoute allowed={["admin"]}>
      <Card>
        <StudentForm title="Add New Student" onBack={() => setPage("students")} depts={depts} existingStudents={students} onSave={s => {
          const newId = Date.now();
          const ns={...s,id:newId,lecturerId:lecturers[0]?.id,prev:{ gpa:0, fin:1 }};
          setStudents(prev => { const next=dedupStudents([...prev,ns]); lsSet("dai_s",next); return next; });
          if(s.email) {
            const newUser = {
              id: newId, email: s.email.trim().toLowerCase(),
              pwd: s.sid, role:"student", name:s.name, dept:s.dept, year:s.year,
              semesterInYear: studentSemesterInYear(s),
              color:"#0ea5e9", studentId:newId, sid:s.sid,
              mustChangePwd:true, registeredAt:new Date().toISOString(),
            };
            setUsers(prev => { const next=dedupUsers([...prev,newUser]); lsSet("dai_us",next); return next; });
          }
          addAudit?.({ action:"Student added", target:s.name||"New Student", by:user.name });
          setPage("students");
        }} />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "edit-student" && activeStudent) return (
    <RoleBasedRoute allowed={["admin"]}>
      <Card>
        <StudentForm title={`Edit: ${activeStudent.name}`} depts={depts} initial={{ ...activeStudent, firstName:activeStudent.name.split(" ")[0], lastName:activeStudent.name.split(" ").slice(1).join(" ") }} onBack={() => setPage("students")} existingStudents={students} onSave={updated => {
          setStudents(prev=>{ const next=prev.map(s=>s.id===activeStudent.id?{...s,...updated}:s); lsSet("dai_s",next); return next; });
          if(updated.email) {
            setUsers(prev => {
              const existing = prev.find(u => u.studentId === activeStudent.id || u.email === updated.email.trim().toLowerCase());
              let next;
              if(existing) {
                next = prev.map(u => u.id === existing.id
                  ? { ...u, email: updated.email.trim().toLowerCase(), sid: updated.sid, name: updated.name, dept: updated.dept, year: updated.year, semesterInYear: studentSemesterInYear(updated) }
                  : u);
              } else {
                const newUser = { id: activeStudent.id, email: updated.email.trim().toLowerCase(),
                  pwd: updated.sid, role:"student", name:updated.name, dept:updated.dept, year:updated.year,
                  semesterInYear: studentSemesterInYear(updated),
                  color:"#0ea5e9", studentId:activeStudent.id, sid:updated.sid,
                  mustChangePwd:true, registeredAt:new Date().toISOString() };
                next = dedupUsers([...prev, newUser]);
              }
              lsSet("dai_us", next); return next;
            });
          }
          addAudit?.({ action:"Student record updated", target:activeStudent.name, by:user.name }); setPage("students");
        }} />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "make-prediction" || page === "bulk-predict") return (
    <RoleBasedRoute allowed={["admin"]}>
      <Card>
        <CardHeader title="Predictions are student-driven" />
        <div style={{ padding:"24px 8px", maxWidth:720 }}>
          <div style={{ ...S.flex(12,"flex-start"), marginBottom:18 }}>
            <div style={{ width:48, height:48, borderRadius:12, background:"rgba(245,158,11,.12)", color:"var(--primary,#f59e0b)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>
              <i className="fa fa-info-circle"></i>
            </div>
            <div>
              <h3 style={{ margin:0, fontSize:18, fontWeight:800 }}>Admins do not run dropout predictions</h3>
              <p style={{ margin:"6px 0 0", fontSize:13, color:"var(--tx3)", lineHeight:1.6 }}>
                Dropout risk is calculated from personal factors only the student knows — age, fees status, family
                support, working status, course choice, home responsibility, health issues, and uploaded semester
                results. Running a prediction without those details would produce an incomplete result.
              </p>
            </div>
          </div>
          <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:12, padding:16, fontSize:13, color:"var(--tx2)", lineHeight:1.7 }}>
            <strong style={{ color:"var(--tx)" }}>What admins can do instead:</strong>
            <ul style={{ margin:"8px 0 0 18px", padding:0 }}>
              <li>Open <em>All Students Overview</em> to see every factor each student has submitted.</li>
              <li>Visit <em>History</em> to review predictions students have already run on themselves.</li>
              <li>Use <em>Interventions</em> to act on students flagged as at-risk by the system.</li>
            </ul>
          </div>
          <div style={{ ...S.flex(8), marginTop:20, flexWrap:"wrap" }}>
            <Btn onClick={() => setPage("dashboard")} style={{ background:"var(--primary,#f59e0b)", color:"#000" }}><i className="fa fa-tachometer"></i> Back to Dashboard</Btn>
            <Btn variant="ghost" onClick={() => setPage("students")}><i className="fa fa-users"></i> View Students</Btn>
            <Btn variant="ghost" onClick={() => setPage("pred-history")}><i className="fa fa-history"></i> Prediction History</Btn>
          </div>
        </div>
      </Card>
    </RoleBasedRoute>
  );

  if(page === "pred-history") return (
    <RoleBasedRoute allowed={["admin"]}>
      <Card>
        <CardHeader title="All Predictions" action={<Btn size="sm" variant="ghost" title="Export Predictions" onClick={()=>{
  const dateStr = new Date().toISOString().split("T")[0];
  const rows = [
    ["Date","Time","Period","Student Name","Student ID","Department","Year","GPA","Financial Status","Prediction","Risk Score %","Confidence %","Run By"],
    ...predHistory.filter(h=>h.student && h.res).map(h=>{
      const d = new Date(h.ts);
      return [
        d.toLocaleDateString("en-GB"),
        d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),
        h.periodLabel || "",
        h.student.name || "",
        h.student.sid  || "",
        h.student.dept || "",
        h.student.year || "",
        h.student.gpa  != null ? h.student.gpa  : "",
        ["Good","Moderate","Poor"][h.student.fin] || "Unknown",
        h.res.prediction===1 ? "At Risk" : "Safe",
        (h.res.risk*100).toFixed(2),
        (h.res.confidence*100).toFixed(2),
        h.by || ""
      ];
    })
  ];
  downloadCSV(`predictions_export_${dateStr}.csv`, rows);
}}><i className="fa fa-download"></i> Export</Btn>} />
        <PredHistoryTable history={predHistory} onDelete={ts => { setPredHist(prev => { const next=prev.filter(h=>h.ts!==ts); lsSet("dai_p",next); return next; }); }} />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "analytics") return (
    <RoleBasedRoute allowed={["admin"]}>
      <div style={S.col(16)}>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-line-chart" style={{fontSize:18,marginRight:8}}></i>Analytics Dashboard</h2>
        <p style={{ ...S.sub, marginBottom:16 }}>System-wide statistics and data insights</p>
        <div style={{ height:1, background:"#000", marginTop:16 }} />
        <AnalyticsDashboard students={students} users={users} interventions={interventions} depts={depts} />
      </div>
    </RoleBasedRoute>
  );

  if(page === "model-metrics") return (
    <RoleBasedRoute allowed={["admin"]}>
      <div style={S.col(16)}>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-cog" style={{fontSize:18,marginRight:8}}></i>Model Metrics</h2>
        <p style={{ ...S.sub, marginBottom:16 }}>Logistic Regression model performance diagnostics</p>
        <div style={{ height:1, background:"#000", marginTop:16 }} />
        <ModelMetricsPage students={students} predHistory={predHistory} />
      </div>
    </RoleBasedRoute>
  );

  if(page === "lecturers") {
    const toggleDrill = (lecId, filter) => {
      setLecDrill(prev =>
        prev && prev.lecId === lecId && prev.filter === filter ? null : { lecId, filter }
      );
    };

    return (
      <RoleBasedRoute allowed={["admin"]}>
        <div style={S.col(16)}>
          {/* Header */}
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div style={S.flex(0,"flex-start","space-between")}>
              <div>
                <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-graduation-cap" style={{fontSize:18,marginRight:8}}></i>Lecturers</h2>
                <p style={S.sub}>{lecturers.length} lecturer{lecturers.length!==1?"s":""} registered across all departments.</p>
              </div>
            </div>
            <div style={{ height:1, background:"#000", width:"100%" }} />
          </div>

          {lecturers.length === 0 ? (
            <Empty icon={<i className="fa fa-graduation-cap" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No lecturers registered yet. Lecturers can register from the login page." />
          ) : (
            <div style={S.grid("repeat(3,1fr)",16)}>
              {lecturers.map(l => {
                // Match by lecturerId first, then fall back to dept match
                const assigned = students.filter(s =>
                  (s.lecturerId != null && String(s.lecturerId) === String(l.id)) ||
                  (s.dept && l.dept && s.dept === l.dept)
                );
                // Deduplicate by student id
                const assignedUniq = assigned.filter((s, i, arr) => arr.findIndex(x => x.id === s.id) === i);
                const atRisk = assignedUniq.filter(s => s.gpa > 0 && mlPredict(s).prediction===1).length;
                const isOpenAll  = lecDrill && lecDrill.lecId === l.id && lecDrill.filter === "all";
                const isOpenRisk = lecDrill && lecDrill.lecId === l.id && lecDrill.filter === "risk";
                const initials = l.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
                return (
                  <Card key={l.id}>
                    <div style={{ ...S.flex(12,"center"), marginBottom:14 }}>
                      {l.profilePic
                        ? <img src={l.profilePic} alt={l.name} style={{ width:48, height:48, borderRadius:"50%", objectFit:"cover", border:"2px solid #8b5cf6", flexShrink:0 }} />
                        : <div style={{ width:48, height:48, borderRadius:"50%", background:"#8b5cf6", display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, fontWeight:800, color:"#fff", flexShrink:0 }}>{initials}</div>
                      }
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:14, fontWeight:700, color:"var(--tx)" }}>{l.name}</div>
                        <div style={{ fontSize:11, color:"var(--tx3)", marginTop:1 }}>{l.dept}</div>
                        <div style={{ fontSize:10, color:"var(--tx3)", fontFamily:"var(--mono)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{l.email}</div>
                      </div>
                    </div>
                    <div style={S.grid("1fr 1fr",8)}>
                      <div onClick={() => toggleDrill(l.id, "all")}
                        style={{ ...S.card2(12), textAlign:"center", cursor:"pointer", transition:"all .15s", border: isOpenAll?"1px solid #8b5cf6":"1px solid var(--bdr)", background: isOpenAll?"rgba(139,92,246,.1)":"var(--sur2)" }}
                        onMouseEnter={e=>{ e.currentTarget.style.borderColor="#8b5cf6"; e.currentTarget.style.transform="translateY(-1px)"; }}
                        onMouseLeave={e=>{ e.currentTarget.style.borderColor=isOpenAll?"#8b5cf6":"var(--bdr)"; e.currentTarget.style.transform=""; }}>
                        <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:700, color:"#8b5cf6" }}>{assignedUniq.length}</div>
                        <div style={S.label}>Students</div>
                        <div style={{ fontSize:9, color:"#8b5cf6", fontFamily:"var(--mono)", marginTop:2, opacity:.7 }}>click to view</div>
                      </div>
                      <div onClick={() => toggleDrill(l.id, "risk")}
                        style={{ ...S.card2(12), textAlign:"center", cursor:"pointer", transition:"all .15s", border: isOpenRisk?"1px solid var(--red)":"1px solid var(--bdr)", background: isOpenRisk?"rgba(239,68,68,.08)":"var(--sur2)" }}
                        onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--red)"; e.currentTarget.style.transform="translateY(-1px)"; }}
                        onMouseLeave={e=>{ e.currentTarget.style.borderColor=isOpenRisk?"var(--red)":"var(--bdr)"; e.currentTarget.style.transform=""; }}>
                        <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:700, color:"var(--red)" }}>{atRisk}</div>
                        <div style={S.label}>At Risk</div>
                        <div style={{ fontSize:9, color:"var(--red)", fontFamily:"var(--mono)", marginTop:2, opacity:.7 }}>click to view</div>
                      </div>
                    </div>
                  </Card>
                );
              })}
            </div>
          )}

          {/* Drill-down panel */}
          {lecDrill && (() => {
            const lec = lecturers.find(l => l.id === lecDrill.lecId);
            if(!lec) return null;
            const assigned = students.filter(s =>
              (s.lecturerId != null && String(s.lecturerId) === String(lec.id)) ||
              (s.dept && lec.dept && s.dept === lec.dept)
            );
            const assignedUniq = assigned.filter((s, i, arr) => arr.findIndex(x => x.id === s.id) === i);
            const drillStudents = lecDrill.filter === "risk"
              ? assignedUniq.filter(s => s.gpa > 0 && mlPredict(s).prediction===1)
              : assignedUniq;
            const drillColor = lecDrill.filter === "risk" ? "#ef4444" : "#8b5cf6";
            return (
              <div style={{ background:"var(--sur)", border:`1px solid ${drillColor}40`, borderRadius:14, padding:20, animation:"fadeUp .25s ease" }}>
                <div style={{ ...S.flex(0,"center","space-between"), marginBottom:16 }}>
                  <div style={S.flex(10,"center")}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:drillColor }} />
                    <span style={{ fontSize:15, fontWeight:800 }}>{lecDrill.filter==="risk"?`At-Risk Students — ${lec.name}`:`All Students — ${lec.name}`}</span>
                    <span style={{ ...S.tag(drillColor), fontSize:11 }}>{drillStudents.length} students</span>
                  </div>
                  <Btn size="sm" variant="ghost" onClick={() => setLecDrill(null)}><i className="fa fa-times"></i> Close</Btn>
                </div>
                {drillStudents.length === 0
                  ? <Empty icon={<i className="fa fa-check-circle" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No students in this group." />
                  : <StudentListTable students={drillStudents} onView={s=>{setActiveStudent(s);setPage("student-detail");}} onEdit={s=>{setActiveStudent(s);setPage("edit-student");}} onDelete={deleteStudent} role="admin" />
                }
              </div>
            );
          })()}
        </div>
      </RoleBasedRoute>
    );
  }

  if(page === "departments") return (
    <RoleBasedRoute allowed={["admin"]}>
      <DepartmentsPage students={students} users={users} setPage={setPage} depts={depts} setDepts={setDepts} setStudents={setStudents} addAudit={addAudit} />
    </RoleBasedRoute>
  );

  if(page === "user-mgmt") return (
    <RoleBasedRoute allowed={["admin"]}>
      <div style={S.col(16)}>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-user" style={{fontSize:18,marginRight:8}}></i>User Management</h2>
        <div style={{ height:1, background:"#000", marginTop:16 }} />
        <UserMgmtPage
          users={users}
          onAddUser={u => setUsers(prev => { const next = [...prev, u]; lsSet("dai_us", next); return next; })}
          onUpdateUser={(id, updates) => {
            setUsers(prev => { const next = prev.map(u => u.id === id ? { ...u, ...updates } : u); lsSet("dai_us", next); return next; });
          }}
          onDeleteUser={(target) => {
            // Manual user delete: if the user is linked to a student record,
            // remove the student record too so the two stay in sync.
            if(target.role === "student" && target.studentId != null) {
              deleteStudent(target.studentId);
              return;
            }
            setUsers(prev => {
              const next = prev.filter(u => u.id !== target.id);
              lsSet("dai_us", next);
              return next;
            });
            addAudit?.({ action:"User deleted", target: target.name || target.email, by: user.name });
          }}
          depts={depts}
          addAudit={addAudit}
        />
      </div>
    </RoleBasedRoute>
  );

  if(page === "my-profile") return (
    <RoleBasedRoute allowed={["admin"]}>
      <EditableProfilePage role="admin" />
    </RoleBasedRoute>
  );

  if(page === "settings") return (
    <RoleBasedRoute allowed={["admin"]}>
      <div style={S.col(16)}>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-sliders" style={{fontSize:18,marginRight:8}}></i>System Settings</h2>
        <div style={{ height:1, background:"#000", marginTop:16 }} />
        <SettingsPage />
      </div>
    </RoleBasedRoute>
  );

  if(page === "calendar") return (
    <RoleBasedRoute allowed={["admin"]}>
      <CalendarPage />
    </RoleBasedRoute>
  );

  if(page === "interventions") return (
    <RoleBasedRoute allowed={["admin"]}>
      <InterventionsPage students={students} interventions={interventions} addIntervention={addIntervention} userName={user.name} role="admin" />
    </RoleBasedRoute>
  );

  if(page === "student-detail" && activeStudent) {
    // Always read the LATEST copy from the global students array. Without
    // this the page would render the stale snapshot captured when the admin
    // first clicked the eye icon, so newly submitted factors would not show
    // up until the admin navigated away and back.
    const liveStudent = students.find(s => s.id === activeStudent.id) || activeStudent;
    const pred = mlPredict(liveStudent);
    const adminLiveYear = parseYearOfStudy(liveStudent.year);
    const adminLiveSem  = studentSemesterInYear(liveStudent);
    const adminLivePeriodLabel = `Year ${adminLiveYear} · Semester ${adminLiveSem}`;
    const adminStudentHistory  = (predHistory || []).filter(h => h && (h.studentId === liveStudent.id || h.student?.sid === liveStudent.sid));
    return (
      <RoleBasedRoute allowed={["admin"]}>
        <div style={S.col(20)}>
          <Btn variant="ghost" size="sm" onClick={() => setPage("students")} style={{ marginBottom:4 }}>← Back</Btn>
          <div className="student-header" style={{ ...S.card(24), background:"var(--sur2)", display:"flex", gap:20, alignItems:"flex-start", boxShadow:"0 4px 16px rgba(0,0,0,.18)", flexWrap:"wrap" }}>
            <div style={{ width:60, height:60, borderRadius:14, background:"var(--primary,#f59e0b)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, fontWeight:800, color:"#000", flexShrink:0 }}>
              {liveStudent.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
            </div>
            <div style={{ flex:"1 1 280px", minWidth:0 }}>
              <div style={{ fontSize:20, fontWeight:800, marginBottom:4, wordBreak:"break-word" }}>{liveStudent.name}</div>
              <div style={{ fontSize:13, color:"var(--tx3)", marginBottom:6 }}>
                <span style={{ fontFamily:"var(--mono)" }}>{liveStudent.sid || "—"}</span>
                {" · "}{liveStudent.dept || "—"}
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"3px 9px", background:"rgba(245,158,11,.12)", border:"1px solid rgba(245,158,11,.35)", color:"#f59e0b", borderRadius:999, fontSize:11, fontWeight:700 }}>
                  <i className="fa fa-graduation-cap"></i>{adminLivePeriodLabel}
                </span>
                <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"3px 9px", background:"rgba(148,163,184,.12)", border:"1px solid rgba(148,163,184,.35)", color:"var(--tx2)", borderRadius:999, fontSize:11, fontWeight:700 }}>
                  <i className="fa fa-history"></i>{adminStudentHistory.length} prediction{adminStudentHistory.length===1?"":"s"} on file
                </span>
              </div>
              <div style={{ ...S.flex(6) }}><RiskBadge risk={pred.prediction} score={pred.risk} /><FinBadge fin={liveStudent.fin} /></div>
            </div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8, flex:"0 1 auto" }}>
              <Btn variant="ghost" title="Download PDF Report" onClick={() => printStudentReport(liveStudent, interventions)}><i className="fa fa-file-text-o"></i> PDF Report</Btn>
              <Btn variant="ghost" title="Edit Student" onClick={() => { setActiveStudent(liveStudent); setPage("edit-student"); }}><i className="fa fa-pencil"></i> Edit</Btn>
              <Btn variant="danger" title="Delete Student" onClick={() => { deleteStudent(liveStudent.id); setPage("students"); }}><i className="fa fa-trash"></i> Delete</Btn>
            </div>
          </div>
          {liveStudent.submittedAt && (
            <div style={{ background:"rgba(34,197,94,.08)", border:"1px solid rgba(34,197,94,.25)", borderRadius:10, padding:"10px 14px", fontSize:12, color:"var(--green)", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
              <i className="fa fa-check-circle"></i>
              <span>
                Factors submitted by the student on {new Date(liveStudent.submittedAt).toLocaleString("en-GB", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })} for <strong>{adminLivePeriodLabel}</strong>.
              </span>
            </div>
          )}
          <SemesterComparison student={liveStudent} history={predHistory} />
          <div style={S.grid("1fr 1fr",20)}>
            <Card>
              <CardHeader title="Recorded Indicators" />
              <div style={S.grid("1fr 1fr",10)}>
                {(() => {
                  const cells = [
                    ["GPA", liveStudent.gpa != null ? Number(liveStudent.gpa).toFixed(2) : "—", liveStudent.gpa<2?"var(--red)":liveStudent.gpa<2.5?"var(--amber)":"var(--green)"],
                    ["Financial", ["Good","Moderate","Poor"][liveStudent.fin] ?? "—", ["var(--green)","var(--amber)","var(--red)"][liveStudent.fin] ?? "var(--tx2)"],
                    ["Department", liveStudent.dept || "—", "var(--tx2)"],
                  ];
                  if(liveStudent.age != null && liveStudent.age !== "") {
                    const a = Number(liveStudent.age);
                    cells.push(["Age", `${a} yrs`, a>=60?"var(--red)":a>=45?"var(--amber)":"var(--green)"]);
                  }
                  if(liveStudent.feesLevel != null) cells.push(["Fees", ["Stable","Moderate","Serious"][Number(liveStudent.feesLevel)] ?? "—", ["var(--green)","var(--amber)","var(--red)"][Number(liveStudent.feesLevel)] ?? "var(--tx2)"]);
                  if(liveStudent.familyBackground != null) cells.push(["Family support", ["Strong","Average","Low"][Number(liveStudent.familyBackground)] ?? "—", ["var(--green)","var(--amber)","var(--red)"][Number(liveStudent.familyBackground)] ?? "var(--tx2)"]);
                  if(liveStudent.workingStatus != null) cells.push(["Working", Number(liveStudent.workingStatus)===1?"Yes":"No", Number(liveStudent.workingStatus)===1?"var(--amber)":"var(--green)"]);
                  if(liveStudent.courseChoice != null) cells.push(["Own choice", Number(liveStudent.courseChoice)===1?"Yes":"No", Number(liveStudent.courseChoice)===1?"var(--green)":"var(--red)"]);
                  if(liveStudent.homeResponsibility != null) cells.push(["Home resp.", ["Low","Moderate","High"][Number(liveStudent.homeResponsibility)] ?? "—", ["var(--green)","var(--amber)","var(--red)"][Number(liveStudent.homeResponsibility)] ?? "var(--tx2)"]);
                  if(liveStudent.hasHealthIssue != null) cells.push(["Health issue", Number(liveStudent.hasHealthIssue)===1?"Yes":"No", Number(liveStudent.hasHealthIssue)===1?"var(--red)":"var(--green)"]);
                  if(liveStudent.medicalFormFile) cells.push(["Medical form", "Uploaded", "var(--green)"]);
                  if(liveStudent.semesterResultFile) cells.push(["Sem. result", "Uploaded", "var(--green)"]);
                  return cells.map(([l,v,c])=>(
                    <div key={l} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:9, padding:12 }}>
                      <div style={S.label}>{l}</div>
                      <div style={{ fontFamily:typeof v==="number"?"var(--mono)":"var(--sans)", fontSize:16, fontWeight:700, color:c, marginTop:5 }}>{v}</div>
                    </div>
                  ));
                })()}
              </div>
            </Card>
