// ─── FORCE CHANGE PASSWORD MODAL ─────────────────────────────────────────────
const ForceChangePwdModal = ({ user, onSave }) => {
  const [pwd,    setPwd]    = useState("");
  const [confirm,setConfirm]= useState("");
  const [show1,  setShow1]  = useState(false);
  const [show2,  setShow2]  = useState(false);
  const [error,  setError]  = useState("");
  const [saved,  setSaved]  = useState(false);

  const validate = (p) => {
    if(p.length < 6)                  return "Password must be at least 6 characters.";
    if(!/[A-Za-z]/.test(p))           return "Must include at least one letter.";
    if(!/[0-9]/.test(p))              return "Must include at least one number.";
    return "";
  };

  const submit = () => {
    setError("");
    const err = validate(pwd);
    if(err)            { setError(err); return; }
    if(pwd !== confirm) { setError("Passwords do not match."); return; }
    setSaved(true);
    setTimeout(() => onSave(pwd), 900);
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:999, background:"rgba(0,0,0,0.75)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:20, backdropFilter:"blur(6px)" }}>
      <div style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:20,
        width:"100%", maxWidth:440, padding:32, boxShadow:"0 24px 64px rgba(0,0,0,0.6)",
        animation:"fadeUp .35s ease" }}>

        {/* Header */}
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ width:64, height:64, borderRadius:16, background:"rgba(14,165,233,.15)",
            border:"2px solid rgba(14,165,233,.4)", display:"flex", alignItems:"center",
            justifyContent:"center", fontSize:28, margin:"0 auto 14px" }}>
            🔐
          </div>
          <div style={{ fontSize:20, fontWeight:800, marginBottom:6 }}>Set Your Password</div>
          <div style={{ fontSize:13, color:"var(--tx3)", lineHeight:1.6 }}>
            Welcome, <strong style={{color:"var(--tx)"}}>{user.name.split(" ")[0]}</strong>! Your account was created by admin.<br/>
            Please set a personal password to secure your account.
          </div>
        </div>

        {/* Temp password info */}
        <div style={{ background:"rgba(14,165,233,.07)", border:"1px solid rgba(14,165,233,.2)",
          borderRadius:10, padding:"10px 14px", fontSize:12, color:"#0ea5e9", marginBottom:20 }}>
          <i className="fa fa-info-circle" style={{marginRight:6}}></i>
          Your login email is your university email. Your temporary password was your <strong>Student ID ({user.sid})</strong>. Choose something only you know.
        </div>

        {/* New password */}
        <FieldGroup label="New Password" required>
          <div style={{ position:"relative" }}>
            <input type={show1?"text":"password"} value={pwd} onChange={e=>setPwd(e.target.value)}
              placeholder="At least 6 chars, with letters and numbers"
              onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus />
            <button onClick={()=>setShow1(v=>!v)}
              style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                background:"none", border:"none", cursor:"pointer", color:"var(--tx3)", fontSize:14 }}>
              <i className={`fa fa-eye${show1?"-slash":""}`}></i>
            </button>
          </div>
        </FieldGroup>

        {/* Confirm password */}
        <FieldGroup label="Confirm Password" required>
          <div style={{ position:"relative" }}>
            <input type={show2?"text":"password"} value={confirm} onChange={e=>setConfirm(e.target.value)}
              placeholder="Re-enter your new password"
              onKeyDown={e=>e.key==="Enter"&&submit()} />
            <button onClick={()=>setShow2(v=>!v)}
              style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                background:"none", border:"none", cursor:"pointer", color:"var(--tx3)", fontSize:14 }}>
              <i className={`fa fa-eye${show2?"-slash":""}`}></i>
            </button>
          </div>
          {/* Live match indicator */}
          {confirm.length > 0 && (
            <div style={{ fontSize:11, marginTop:4, color: pwd===confirm?"var(--green)":"var(--red)" }}>
              <i className={`fa fa-${pwd===confirm?"check":"times"}-circle`} style={{marginRight:4}}></i>
              {pwd===confirm?"Passwords match":"Passwords do not match"}
            </div>
          )}
        </FieldGroup>

        {/* Password strength */}
        {pwd.length > 0 && (
          <div style={{ marginBottom:14 }}>
            {["6+ characters","Contains letters","Contains numbers"].map((req,i) => {
              const met = i===0?pwd.length>=6 : i===1?/[A-Za-z]/.test(pwd) : /[0-9]/.test(pwd);
              return (
                <div key={i} style={{ fontSize:11, color:met?"var(--green)":"var(--tx3)", marginBottom:3 }}>
                  <i className={`fa fa-${met?"check":"circle-o"}`} style={{marginRight:6}}></i>{req}
                </div>
              );
            })}
          </div>
        )}

        {error && <Alert type="error" style={{marginBottom:14}}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}

        {saved ? (
          <div style={{ textAlign:"center", padding:"16px 0", color:"var(--green)", fontWeight:700, fontSize:15 }}>
            <i className="fa fa-check-circle" style={{marginRight:8,fontSize:20}}></i>Password saved! Taking you to your dashboard…
          </div>
        ) : (
          <Btn size="lg" onClick={submit} style={{ background:"#0ea5e9", width:"100%" }}>
            <i className="fa fa-lock" style={{marginRight:8}}></i>Set Password & Go to Dashboard
          </Btn>
        )}
      </div>
    </div>
  );
};

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user,          setUser]          = useState(null); // always start at login
  const [page,          setPage]          = useState("dashboard");
  const [history,       setHistory]       = useState([]);
  const [students,      setStudents]      = useState(()=>dedupStudents(lsGet("dai_s",makeStudents())));
  const [users,         setUsers]         = useState(() => {
    const stored = lsGet("dai_us", []);
    // Always merge with USERS_DB and keep only admin/student accounts
    const merged = dedupUsers([...USERS_DB, ...stored]).filter(u => u.role === "admin" || u.role === "student");
    // Auto-create missing accounts for any students that have email but no user account
    const studentList = lsGet("dai_s", makeStudents());
    const autoAccounts = studentList
      .filter(s => s.email && !merged.some(u => u.studentId === s.id || u.email === s.email.toLowerCase()))
      .map(s => ({
        id: s.id, email: s.email.trim().toLowerCase(),
        pwd: s.sid, role: "student", name: s.name,
        dept: s.dept, year: s.year, semesterInYear: studentSemesterInYear(s), color: "#0ea5e9",
        studentId: s.id, sid: s.sid,
        mustChangePwd: true, registeredAt: new Date().toISOString(),
      }));
    if(autoAccounts.length > 0) {
      const final = dedupUsers([...merged, ...autoAccounts]);
      lsSet("dai_us", final);
      return final;
    }
    return merged;
  });
  const [predHist,      setPredHist]      = useState(()=>lsGet("dai_p", makePredHistory()));
  const [dark,          setDark]          = useState(()=>lsGet("dai_dk",false));
  const [interventions, setInterventions] = useState(()=>lsGet("dai_iv",[]));
  const [globalSearch,  setGlobalSearch]  = useState("");
  const [auditLog,      setAuditLog]      = useState(()=>lsGet("dai_al", makeAuditLog()));
  const addAudit = useCallback((entry) => {
    setAuditLog(prev => {
      const next = [{ ...entry, ts: new Date().toISOString() }, ...prev].slice(0,500);
      lsSet("dai_al", next);
      return next;
    });
  }, []);
  const [depts,         setDepts]         = useState(()=>lsGet("dai_d",[...DEPTS]));
  const [settings,      setSettings]      = useState(()=>lsGet("dai_cfg", {...DEFAULT_SETTINGS, algorithm:"Logistic Regression", featureSet:"Fees, Family Background, Work Status, Course Choice, Age, Home Responsibility, Health + Medical Form, Semester Results"}));

  // Apply threshold on load
  React.useEffect(()=>{ THRESHOLD_REF.value = (settings.riskThreshold||50)/100; },[settings.riskThreshold]);

  const updateSettings = (updates) => {
    setSettings(prev => { const n={...prev,...updates}; lsSet("dai_cfg",n); return n; });
    addAudit({ action:"System settings updated", target: Object.keys(updates).join(", "), by: user?.name || "Admin" });
  };

  // Persist on every change
  useEffect(()=>lsSet("dai_u",user),[user]);
  useEffect(()=>lsSet("dai_s",students),[students]);
  useEffect(()=>lsSet("dai_us",users),[users]);
  useEffect(()=>lsSet("dai_p",predHist),[predHist]);
  useEffect(()=>lsSet("dai_dk",dark),[dark]);
  useEffect(()=>lsSet("dai_iv",interventions),[interventions]);
  useEffect(()=>lsSet("dai_d",depts),[depts]);
  useEffect(()=>lsSet("dai_cfg",settings),[settings]);

  // ── Live sync: reload students+users when ANOTHER tab writes to localStorage,
  //    AND broadcast on a BroadcastChannel so other open tabs (admin viewing a
  //    student detail page, lecturer dashboard, etc.) update the instant a
  //    student submits their factors. The `storage` event only fires in OTHER
  //    tabs, never in the writing tab, so this can't clobber state in the tab
  //    the user is actively typing in. (We removed the old 5-second polling
  //    that caused freshly saved predictions to silently disappear.)
  useEffect(() => {
    const sync = () => {
      try {
        const s = localStorage.getItem("dai_s");
        const u = localStorage.getItem("dai_us");
        if(s) {
          const fresh = dedupStudents(JSON.parse(s));
          setStudents(prev => {
            // Never shrink: if the fresh list dropped records (e.g. a quota
            // failure stripped them) keep what we have in memory.
            if(fresh.length < prev.length) return prev;
            // Preserve any in-memory file blobs (.data) — localStorage only
            // stores file metadata to stay under quota.
            return fresh.map(fs => {
              const inMem = prev.find(p => p.id === fs.id);
              if(!inMem) return fs;
              const merged = { ...fs };
              if(inMem.medicalFormFile?.data && !fs.medicalFormFile?.data) {
                merged.medicalFormFile = { ...(fs.medicalFormFile || {}), data: inMem.medicalFormFile.data };
              }
              if(inMem.semesterResultFile?.data && !fs.semesterResultFile?.data) {
                merged.semesterResultFile = { ...(fs.semesterResultFile || {}), data: inMem.semesterResultFile.data };
              }
              return merged;
            });
          });
        }
        if(u) {
          const fresh = dedupUsers(JSON.parse(u));
          setUsers(prev => fresh.length < prev.length ? prev : fresh);
        }
      } catch {}
    };

    // 1) Cross-tab via localStorage `storage` event (fires in OTHER tabs).
    window.addEventListener("storage", sync);

    // 2) Same-browser BroadcastChannel — fires near-instantly in every other
    //    tab on the same origin. This makes admin/lecturer views refresh
    //    within milliseconds of a student submission.
    let bc = null;
    try {
      bc = new BroadcastChannel("dropoutai-sync");
      bc.onmessage = (ev) => {
        if(ev?.data === "students-updated" || ev?.data === "users-updated") sync();
      };
    } catch {}

    return () => {
      window.removeEventListener("storage", sync);
      try { bc && bc.close(); } catch {}
    };
  }, []);

  // Broadcast students/users changes so other tabs pick them up instantly.
  // Fingerprints prevent a feedback loop: if another tab's broadcast caused us
  // to merge identical data, the fingerprint stays the same and we stay quiet.
  const lastStudentsFpRef = React.useRef("");
  const lastUsersFpRef    = React.useRef("");
  useEffect(() => {
    const fp = students.length + "|" + students.map(s =>
      `${s.id}:${s.submittedAt || ""}:${s.gpa || ""}:${s.fin ?? ""}:${s.age ?? ""}:${s.feesLevel ?? ""}:${s.familyBackground ?? ""}:${s.workingStatus ?? ""}:${s.courseChoice ?? ""}:${s.homeResponsibility ?? ""}:${s.hasHealthIssue ?? ""}`
    ).join(",");
    if(fp === lastStudentsFpRef.current) return;
    lastStudentsFpRef.current = fp;
    try {
      const bc = new BroadcastChannel("dropoutai-sync");
      bc.postMessage("students-updated");
      bc.close();
    } catch {}
  }, [students]);
  useEffect(() => {
    const fp = users.length + "|" + users.map(u => `${u.id}:${u.email || ""}`).join(",");
    if(fp === lastUsersFpRef.current) return;
    lastUsersFpRef.current = fp;
    try {
      const bc = new BroadcastChannel("dropoutai-sync");
      bc.postMessage("users-updated");
      bc.close();
    } catch {}
  }, [users]);

  // Apply dark/light class to <html>
  useEffect(() => {
    document.documentElement.classList.toggle("light", !dark);
    if (dark) {
      document.documentElement.style.setProperty("--tx",  "#ffffff");
      document.documentElement.style.setProperty("--tx2", "#c8d8f0");
      document.documentElement.style.setProperty("--tx3", "#7baad8");
    } else {
      document.documentElement.style.removeProperty("--tx");
      document.documentElement.style.removeProperty("--tx2");
      document.documentElement.style.removeProperty("--tx3");
    }
  }, [dark]);

  const toggleTheme = useCallback(() => setDark(d => !d), []);

  const addPred = useCallback(entry => {
    setPredHist(prev => {
      const next = [entry, ...prev];
      lsSet("dai_p", next);
      return next;
    });
  }, []);

  const addIntervention = useCallback(entry => {
    setInterventions(prev => {
      const next = [{ ...entry, id: Date.now() }, ...prev];
      lsSet("dai_iv", next);
      return next;
    });
    addAudit({ action:`Intervention logged: "${entry.type}"`, target:entry.student?.name || entry.studentName || "Student", by:entry.by || "Unknown" });
  }, [addAudit]);

  const logout = useCallback(() => {
    addAudit({ action:"Logout", target:user?.name, by:user?.name });
    lsSet("dai_u",null); setUser(null); setPage("dashboard"); setHistory([]);
  }, [user, addAudit]);

  // Apply primary color CSS var based on role
  useEffect(() => {
    if(!user) return;
    const theme = ROLE_THEMES[user.role];
    document.documentElement.style.setProperty("--primary", theme.primary);
    document.documentElement.style.setProperty("--primary-glow", theme.glow);
  }, [user]);

  const updateUser = useCallback((updates) => {
    setUser(prev => ({ ...prev, ...updates }));
    setUsers(prev => prev.map(u => u.id === user?.id ? { ...u, ...updates } : u));
  }, [user]);

  const authVal = useMemo(() => ({ user, logout, updateUser }), [user, logout, updateUser]);
  const themeVal = useMemo(() => ({ dark, toggle: toggleTheme }), [dark, toggleTheme]);

  // ── Handle resize: close mobile drawer & reset sidebar width ──────────────
  useEffect(() => {
    const handleResize = () => {
      if(window.innerWidth > 768) {
        setMobileSidebarOpen(false);
        const w = sidebarCollapsed ? "var(--sidebar-collapsed-w)" : "var(--sidebar-w)";
        document.documentElement.style.setProperty("--active-sidebar-w", w);
      } else {
        document.documentElement.style.setProperty("--active-sidebar-w", "0px");
      }
    };
    window.addEventListener("resize", handleResize);
    handleResize(); // run on mount
    return () => window.removeEventListener("resize", handleResize);
  }, [sidebarCollapsed]);

  // ── Sidebar collapse state ────────────────────────────────────────────────
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const toggleSidebar = useCallback(() => {
    // On mobile, toggle the overlay drawer; on desktop toggle collapse
    if(window.innerWidth <= 768) {
      setMobileSidebarOpen(v => !v);
    } else {
      setSidebarCollapsed(v => !v);
    }
  }, []);
  const closeMobileSidebar = useCallback(() => setMobileSidebarOpen(false), []);
  useEffect(() => {
    if(window.innerWidth > 768) {
      const w = sidebarCollapsed ? "var(--sidebar-collapsed-w)" : "var(--sidebar-w)";
      document.documentElement.style.setProperty("--active-sidebar-w", w);
    } else {
      document.documentElement.style.setProperty("--active-sidebar-w", "0px");
    }
  }, [sidebarCollapsed]);

  // ── Lock body scroll while the mobile drawer is open so users don't feel
  //    the page sliding underneath, and unlock it as soon as it closes.
  useEffect(() => {
    if(typeof document === "undefined") return;
    if(mobileSidebarOpen) {
      document.body.classList.add("drawer-open");
    } else {
      document.body.classList.remove("drawer-open");
    }
    return () => document.body.classList.remove("drawer-open");
  }, [mobileSidebarOpen]);

  // ── Auto-close the drawer when the viewport grows past the mobile breakpoint
  //    (e.g. user rotates a tablet from portrait → landscape, or resizes a
  //    browser window). Prevents a stuck overlay on desktop.
  useEffect(() => {
    if(typeof window === "undefined") return;
    const onResize = () => {
      if(window.innerWidth > 768 && mobileSidebarOpen) setMobileSidebarOpen(false);
    };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [mobileSidebarOpen]);

  // ── Alerts state ─────────────────────────────────────────────────────────
  const [readSet,    setReadSet]    = useState(new Set()); // set of alert ids that have been read
  const [alertView,  setAlertView]  = useState(null);      // { id, icon, color, title, students[] }

  const buildAlerts = useCallback((usr, studs, ivs, preds, settings, studs2=[]) => {
    if(!usr) return [];

    // ── Student notifications ──
    if(usr.role === "student") {
      const list = [];
      const myPreds = preds.filter(p => p.studentId === usr.studentId);
      if(myPreds.length > 0) {
        const latest = myPreds[0];
        const isRisk = latest.res.prediction === 1;
        list.push({
          id: `pred-${latest.ts}`,
          icon: <i className={`fa fa-${isRisk?"exclamation-triangle":"check-circle"}`} style={{color: isRisk?"#ef4444":"#10b981"}}></i>,
          color: isRisk ? "#ef4444" : "#10b981",
          title: `Prediction result: ${isRisk ? "At Risk" : "Safe"}`,
          body: `Risk score: ${(latest.res.risk*100).toFixed(1)}% · Run by ${latest.by}`,
          students: [], ts: latest.ts
        });
      }
      // Interventions logged by admin (or staff) for this student — show in notification bell
      const myInterventionAlerts = (ivs || []).filter(i =>
        i.studentId === usr.studentId ||
        i.studentId === usr.id ||
        (usr.sid != null && String(i.studentId) === String(usr.sid)) ||
        (i.studentName && usr.name && i.studentName.toLowerCase().trim() === usr.name.toLowerCase().trim())
      );
      const sortedIv = [...myInterventionAlerts].sort((a, b) => (b.id || 0) - (a.id || 0));
      sortedIv.slice(0, 25).forEach(iv => {
        const note = iv.note || iv.notes || "";
        const preview = note.length > 130 ? `${note.slice(0, 130)}…` : note;
        list.push({
          id: `intervention-${iv.id}`,
          icon: <i className="fa fa-clipboard" style={{ color: "#10b981" }}></i>,
          color: "#10b981",
          title: `New intervention: ${iv.type || "Support"}`,
          body: preview ? `${preview}${iv.by ? ` · By ${iv.by}` : ""}` : `An administrator logged support for you.${iv.by ? ` · By ${iv.by}` : ""}`,
          students: [],
          ts: iv.id ? new Date(iv.id).toISOString() : undefined
        });
      });
      const myStudent = studs.find(s => s.id === usr.studentId);
      if(myStudent && myStudent.gpa > 0 && myStudent.gpa < 2.0) {
        list.push({ id:"low-gpa", icon:<i className="fa fa-book" style={{color:"#ef4444"}}></i>, color:"#ef4444", title:"Low GPA alert", body:`Your GPA is ${myStudent.gpa.toFixed(2)} — below the 2.0 passing threshold.`, students:[] });
      }
      if(list.length === 0) {
        list.push({ id:"welcome", icon:<i className="fa fa-check-circle" style={{color:"#10b981"}}></i>, color:"#10b981", title:"Account active", body:"Welcome to DropoutAI! Your dashboard will update once admin verifies your submitted records.", students:[] });
      }
      return list;
    }

    // ── Admin notifications ──
    const pool = studs;
    const atRisk  = pool.filter(s => s.gpa > 0 && mlPredict(s).prediction===1);
    const lowGPA  = pool.filter(s => s.gpa > 0 && s.gpa < 2.0);
    const poorFin = pool.filter(s => s.fin === 2);
    const newStudents = pool.filter(s => s.gpa === 0);
    const noIntervention = pool.filter(s => s.gpa > 0 && mlPredict(s).prediction===1 && !ivs.some(iv => iv.studentId === s.id));

    const list = [];
    const recentRegistrations = (studs2 || [])
      .filter(u => !!u?.registeredAt)
      .sort((a,b) => new Date(b.registeredAt).getTime() - new Date(a.registeredAt).getTime())
      .filter(u => (Date.now() - new Date(u.registeredAt).getTime()) <= 7 * 24 * 60 * 60 * 1000);
    if(recentRegistrations.length > 0) {
      const latestTs = recentRegistrations[0]?.registeredAt || Date.now();
      const sample = recentRegistrations.slice(0,3).map(u => u.name).join(", ");
      list.push({
        id:`new-registrations-${latestTs}-${recentRegistrations.length}`,
        icon:<i className="fa fa-bell" style={{color:"#0ea5e9"}}></i>,
        color:"#0ea5e9",
        title:`${recentRegistrations.length} new registration${recentRegistrations.length>1?"s":""}`,
        body:`Recently joined: ${sample}${recentRegistrations.length>3?` +${recentRegistrations.length-3} more`:""}.`,
        students:[]
      });
    }
    if(newStudents.length > 0) list.push({ id:`new-students-${newStudents.length}-${newStudents[0]?.id||"x"}`, icon:<i className="fa fa-user-plus" style={{color:"#0ea5e9"}}></i>, color:"#0ea5e9", title:`${newStudents.length} new student${newStudents.length>1?"s":""} registered`, body:"Awaiting academic data entry — enter their records to enable predictions.", students:newStudents });
    if(atRisk.length)  list.push({ id:"risk",  icon:<i className="fa fa-exclamation-triangle" style={{color:"#ef4444"}}></i>, color:"#ef4444", title:`${atRisk.length} student${atRisk.length>1?"s":""} at risk of dropout`, body:"Flagged by dropout prediction model — immediate action recommended.", students:atRisk });
    if(noIntervention.length) list.push({ id:"no-iv", icon:<i className="fa fa-clipboard" style={{color:"#8b5cf6"}}></i>, color:"#8b5cf6", title:`${noIntervention.length} at-risk student${noIntervention.length>1?"s":""} with no intervention`, body:"Log interventions to support these students.", students:noIntervention });
    if(lowGPA.length)  list.push({ id:"gpa",   icon:<i className="fa fa-book" style={{color:"#3b82f6"}}></i>, color:"#3b82f6", title:`${lowGPA.length} student${lowGPA.length>1?"s":""} with GPA below 2.0`, body:"Critically low academic performance.", students:lowGPA });
    if(poorFin.length) list.push({ id:"fin",   icon:<i className="fa fa-money" style={{color:"#8b5cf6"}}></i>, color:"#8b5cf6", title:`${poorFin.length} student${poorFin.length>1?"s":""} in poor financial status`, body:"Urgent financial aid referral recommended.", students:poorFin });
    if(list.length === 0) list.push({ id:"all-good", icon:<i className="fa fa-check-circle" style={{color:"#10b981"}}></i>, color:"#10b981", title:"All clear!", body:"No critical alerts at this time. Keep monitoring your students.", students:[] });
    return list;
  }, []);

  const alerts = useMemo(() => buildAlerts(user, students, interventions, predHist, settings, users), [buildAlerts, user, students, interventions, predHist, settings, users]);
  const unreadCount = useMemo(() => alerts.filter(a => !readSet.has(a.id)).length, [alerts, readSet]);

  // Reset readSet when alerts change (new alerts appear)
  const prevAlertIds = React.useRef(new Set());
  useEffect(() => {
    const currentIds = new Set(alerts.map(a => a.id));
    const brandNew = alerts.filter(a => !prevAlertIds.current.has(a.id));
    if(brandNew.length > 0) {
      setReadSet(prev => {
        const next = new Set(prev);
        brandNew.forEach(a => next.delete(a.id)); // mark new alerts as unread
        return next;
      });
    }
    prevAlertIds.current = currentIds;
  }, [alerts]);

  const markAlertRead = useCallback(id => setReadSet(s => new Set([...s, id])), []);
  const markAllRead   = useCallback(() => setReadSet(new Set(alerts.map(a=>a.id))), [alerts]);

  const handleAlertClick = useCallback(alert => {
    markAlertRead(alert.id);
    if(alert.students && alert.students.length > 0) setAlertView(alert);
  }, [markAlertRead]);

  // Navigate forward — push current page onto history stack first
  const goToPage = useCallback(p => {
    setPage(prev => {
      if(prev !== p) setHistory(h => [...h, prev]);
      return p;
    });
    window.scrollTo(0, 0);
  }, []);

  // Go back to the previous page in the stack
  const goBack = useCallback(() => {
    setHistory(h => {
      if(h.length === 0) return h;
      const prev = h[h.length - 1];
      setPage(prev);
      window.scrollTo(0, 0);
      return h.slice(0, -1);
    });
  }, []);

  if(!user) return (
    <ThemeCtx.Provider value={themeVal}>
      <style>{globalCSS}</style>
      {/* Floating theme toggle on login screen */}
      <button onClick={toggleTheme} title={dark?"Switch to Light Mode":"Switch to Dark Mode"}
        style={{ position:"fixed", top:16, right:16, zIndex:999, width:38, height:38, borderRadius:10,
          border:"1px solid var(--bdr)", background:"var(--sur)", cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
          boxShadow:"0 2px 12px rgba(0,0,0,0.3)", transition:"all .2s" }}>
        {dark ? <i className="fa fa-sun-o"></i> : <i className="fa fa-moon-o"></i>}
      </button>
      <LoginScreen
          onLogin={u => { setUser(u); setHistory([]); addAudit({ action:"Login", target:u.name, by:u.name }); }}
          users={users}
          onRegister={details => {
            const sid = Date.now();
            {
              // Guard: reject if same name already registered as a student
              const nameTaken = students.some(s => s.name.trim().toLowerCase() === details.name.trim().toLowerCase());
              if(nameTaken) {
                // Don't silently duplicate — this case should not arise if email check passes,
                // but clean up the students array anyway and abort duplicate insertion
                console.warn("[DropoutAI] Duplicate student name blocked:", details.name);
                return;
              }
              // Use consistent ID — studentId links user to student record
              const studentId  = sid; // numeric ID shared by both records
              const studentSid = details.studentId || ("STU-" + String(sid).slice(-5)); // display SID

              const semesterInYearReg = details.semesterInYear === 2 ? 2 : 1;
              // Capture programme length from registration. Falls back to 3
              // if missing (older registration payloads). Clamped to 3–6 to
              // match the validation rules in AutoRegisterScreen.
              const courseYearsReg = Math.min(6, Math.max(3, parseInt(details.courseYears, 10) || 3));
              const newStudent = {
                id:         studentId,
                sid:        studentSid,
                name:       details.name,
                dept:       details.dept,
                year:       details.year,
                semesterInYear: semesterInYearReg,
                gpa:        0,
                fin:        1,
                courseYears: courseYearsReg,
                // Carry age + DOB through from registration so the factors form
                // can pre-fill the field and the admin sees the student's age
                // immediately, without waiting for them to re-enter it.
                dob:        details.dob || undefined,
                age:        details.age != null ? details.age : undefined,
                prev:       { gpa:0, fin:1 },
              };

              const newUser = {
                id:           sid,
                email:        details.email,
                pwd:          details.pwd,   // DOB password — never overwrite
                role:         "student",
                name:         details.name,
                dept:         details.dept,
                year:         details.year,
                semesterInYear: semesterInYearReg,
                courseYears:  courseYearsReg,
                color:        "#0ea5e9",
                registeredAt: new Date().toISOString(),
                studentId:    studentId,     // numeric — matches newStudent.id
                sid:          studentSid,    // display SID
              };

              setStudents(prev => {
                const next = dedupStudents([...prev, newStudent]);
                lsSet("dai_s", next);   // save immediately
                return next;
              });
              setUsers(prev => {
                const next = dedupUsers([...prev, newUser]);
                lsSet("dai_us", next);  // save immediately
                return next;
              });
              lsSet("dai_u", newUser);  // save session immediately
              setUser(newUser);
              setHistory([]);
              addAudit({ action:"Student registered", target:details.name, by:details.name });

            }
          }}
        />
    </ThemeCtx.Provider>
  );

  const DashboardComponent = {
    student:  StudentDashboard,
    admin:    AdminDashboard,
  }[user.role] || AdminDashboard;

  const defaultPage = user.role === "student" ? "my-dashboard" : "dashboard";
  const activePage  = page || defaultPage;
  const canGoBack   = history.length > 0;

  return (
    <AuditCtx.Provider value={{ log:auditLog, addAudit }}>
    <SettingsCtx.Provider value={{ settings, updateSettings }}>
    <ThemeCtx.Provider value={themeVal}>
    <AuthCtx.Provider value={authVal}>
      <style>{globalCSS}</style>
      {/* Force password change on first login (admin-provisioned students) */}
      {user && user.mustChangePwd && (
        <ForceChangePwdModal
          user={user}
          onSave={(newPwd) => {
            updateUser({ pwd: newPwd, mustChangePwd: false });
            setUsers(prev => {
              const next = prev.map(u => u.id === user.id ? {...u, pwd:newPwd, mustChangePwd:false} : u);
              lsSet("dai_us", next);
              return next;
            });
            addAudit({ action:"Password changed", target:user.name, by:user.name });
          }}
        />
      )}
      <div className="app-shell">
        {/* Mobile sidebar overlay */}
        <div className={`sidebar-overlay${mobileSidebarOpen ? " visible" : ""}`} onClick={closeMobileSidebar} />
        <Navbar currentPage={activePage} setPage={goToPage} collapsed={sidebarCollapsed} onToggleCollapse={toggleSidebar} canGoBack={canGoBack} goBack={goBack} mobileOpen={mobileSidebarOpen} onMobileClose={closeMobileSidebar} />
        <TopBar alerts={alerts} readSet={readSet} unreadCount={unreadCount} onAlertClick={handleAlertClick} onMarkAllRead={markAllRead} globalSearch={globalSearch} onGlobalSearch={(val) => { setGlobalSearch(val); if(val.trim()) goToPage("students"); }} onMobileToggle={toggleSidebar} />
        <main className="main-area" style={{ padding:"24px 24px 0", paddingTop:"calc(56px + 24px)", minHeight:"100vh", boxSizing:"border-box", display:"flex", flexDirection:"column" }}>
          <div style={{ maxWidth:1200, width:"100%", flex:1 }}>
          <DashboardComponent
            page={activePage}
            setPage={goToPage}
            students={students}
            setStudents={setStudents}
            users={users}
            setUsers={setUsers}
            predHistory={predHist}
            addPred={addPred}
            setPredHist={setPredHist}
            interventions={interventions}
            addIntervention={addIntervention}
            globalSearch={globalSearch}
            setGlobalSearch={setGlobalSearch}
            depts={Array.from(new Set([...depts, ...students.map(s=>s.dept)].filter(Boolean)))}
            setDepts={setDepts}
            settings={settings}
            auditLog={auditLog}
            addAudit={addAudit}
          />
          </div>
          <div style={{ margin:"0 -24px", width:"calc(100% + 48px)" }}>
            <PageFooter />
          </div>
        </main>
      </div>{/* end app-shell */}

      {/* ── Alert Detail Modal ── */}
      {alertView && (
        <div onClick={() => setAlertView(null)}
          style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.65)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(4px)" }}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:16, width:"100%", maxWidth:660, maxHeight:"80vh", display:"flex", flexDirection:"column", boxShadow:"0 24px 64px rgba(0,0,0,0.7)", animation:"fadeUp .2s ease" }}>
            {/* Header */}
            <div style={{ padding:"16px 20px", borderBottom:"1px solid var(--bdr)", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
              <div style={{ width:40, height:40, borderRadius:10, background:`${alertView.color}20`, border:`1px solid ${alertView.color}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{alertView.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:800, color:"var(--tx)" }}>{alertView.title}</div>
                <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{alertView.students.length} student{alertView.students.length!==1?"s":""} affected</div>
              </div>
              <button onClick={() => setAlertView(null)}
                style={{ width:32, height:32, borderRadius:8, border:"1px solid var(--bdr)", background:"var(--sur2)", cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--tx2)", flexShrink:0 }}><i className="fa fa-times"></i></button>
            </div>
            {/* Student table */}
            <div style={{ overflowY:"auto", flex:1 }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                <thead>
                  <tr style={{ background:"var(--sur2)" }}>
                    {["#","Name","SID","Dept","GPA","Financial","Risk"].map(h => (
                      <th key={h} style={{ padding:"9px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".09em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap", position:"sticky", top:0, background:"var(--sur2)" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {alertView.students.map((s, i) => {
                    const pred = mlPredict(s);
                    return (
                      <tr key={s.id} style={{ borderBottom:"1px solid var(--bdr)" }}
                        onMouseEnter={e => e.currentTarget.style.background="rgba(59,130,246,.05)"}
                        onMouseLeave={e => e.currentTarget.style.background=""}>
                        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{i+1}</td>
                        <td style={{ padding:"10px 14px", fontWeight:700 }}>{s.name}</td>
                        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{s.sid}</td>
                        <td style={{ padding:"10px 14px", fontSize:12, color:"var(--tx3)" }}>{s.dept}</td>
                        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontWeight:700, color: s.gpa<2?"var(--red)":s.gpa<2.5?"var(--amber)":"var(--green)" }}>{s.gpa.toFixed(2)}</td>
                        <td style={{ padding:"10px 14px" }}><FinBadge fin={s.fin} /></td>
                        <td style={{ padding:"10px 14px" }}><RiskBadge risk={pred.prediction} score={pred.risk} /></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* Footer */}
            <div style={{ padding:"12px 20px", borderTop:"1px solid var(--bdr)", display:"flex", justifyContent:"flex-end", flexShrink:0 }}>
              <button onClick={() => setAlertView(null)}
                style={{ padding:"8px 22px", borderRadius:8, border:"none", background:"var(--primary,#3b82f6)", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer" }}>
                Close
              </button>
            </div>
          </div>
        </div>
      )}

    </AuthCtx.Provider>
    </ThemeCtx.Provider>
    </SettingsCtx.Provider>
    </AuditCtx.Provider>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>


</body>
</html>
