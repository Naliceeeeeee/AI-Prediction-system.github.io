          <Btn size="sm" variant="ghost" onClick={prevMonth}>‹ Prev</Btn>
          <div style={{ fontSize:18, fontWeight:800, letterSpacing:"-0.02em" }}>
            {MONTHS[curMonth]} <span style={{ color:"var(--tx3)" }}>{curYear}</span>
          </div>
          <Btn size="sm" variant="ghost" onClick={nextMonth}>Next ›</Btn>
        </div>
      )}

      {/* ── MONTH VIEW ── */}
      {view === "month" && (
        <div style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:14, overflow:"hidden" }}>
          {/* Day headers */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", background:"var(--sur2)", borderBottom:"1px solid var(--bdr)" }}>
            {DAYS.map(d=>(
              <div key={d} style={{ padding:"10px 0", textAlign:"center", fontSize:11, fontWeight:700, fontFamily:"var(--mono)", color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.08em" }}>{d}</div>
            ))}
          </div>
          {/* Day cells */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
            {cells.map((d,i)=>{
              const dayEvts = d ? eventsForDate(d) : [];
              const dateStr = d ? `${curYear}-${String(curMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}` : "";
              return (
                <div key={i}
                  onClick={()=>d && openAdd(dateStr)}
                  style={{ minHeight:90, padding:6, border:"1px solid var(--bdr)", cursor:d?"pointer":"default",
                    background: isToday(d) ? "rgba(59,130,246,.08)" : d ? "transparent" : "var(--bg2)",
                    transition:"background .12s",
                    borderLeft: i%7===0 ? "none" : undefined,
                  }}
                  onMouseEnter={e=>{ if(d) e.currentTarget.style.background=isToday(d)?"rgba(59,130,246,.14)":"var(--sur2)"; }}
                  onMouseLeave={e=>{ if(d) e.currentTarget.style.background=isToday(d)?"rgba(59,130,246,.08)":"transparent"; }}>
                  {d && (
                    <>
                      <div style={{ fontSize:12, fontWeight:700, fontFamily:"var(--mono)", marginBottom:3,
                        color: isToday(d) ? "var(--primary,#3b82f6)" : "var(--tx2)",
                        width:22, height:22, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
                        background: isToday(d) ? "var(--primary,#3b82f6)" : "none",
                        color: isToday(d) ? "#fff" : "var(--tx2)",
                      }}>{d}</div>
                      <div style={S.col(2)}>
                        {dayEvts.slice(0,3).map(ev=>(
                          <div key={ev.id}
                            onClick={e=>{e.stopPropagation();setSelEvent(ev);setModal("view");}}
                            style={{ background:`${ev.color}22`, border:`1px solid ${ev.color}55`, borderRadius:4, padding:"2px 5px",
                              fontSize:10, fontWeight:600, color:ev.color, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                              cursor:"pointer", transition:"filter .1s" }}
                            onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.15)";e.stopPropagation();}}
                            onMouseLeave={e=>{e.currentTarget.style.filter="";}}
                          >{ev.title}</div>
                        ))}
                        {dayEvts.length>3 && <div style={{ fontSize:9, color:"var(--tx3)", fontFamily:"var(--mono)", paddingLeft:2 }}>+{dayEvts.length-3} more</div>}
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── WEEK VIEW ── */}
      {view === "week" && (()=>{
        // Find Monday of the week containing today (or first of month)
        const baseDate = new Date(curYear, curMonth, today.getMonth()===curMonth && today.getFullYear()===curYear ? today.getDate() : 1);
        const dayOfWeek = baseDate.getDay();
        const monday = new Date(baseDate); monday.setDate(baseDate.getDate() - (dayOfWeek===0?6:dayOfWeek-1));
        const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
        return (
          <div style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:14, overflow:"hidden" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", background:"var(--sur2)", borderBottom:"1px solid var(--bdr)" }}>
              {weekDays.map((d,i)=>{
                const isTod = d.toDateString()===today.toDateString();
                return (
                  <div key={i} style={{ padding:"10px 6px", textAlign:"center", borderRight:i<6?"1px solid var(--bdr)":"none" }}>
                    <div style={{ fontSize:10, fontFamily:"var(--mono)", color:"var(--tx3)", textTransform:"uppercase", marginBottom:4 }}>{DAYS[d.getDay()]}</div>
                    <div style={{ width:28, height:28, borderRadius:"50%", margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:13, fontWeight:700, background:isTod?"var(--primary,#3b82f6)":"none", color:isTod?"#fff":"var(--tx)" }}>
                      {d.getDate()}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", minHeight:200 }}>
              {weekDays.map((d,i)=>{
                const ds = d.toISOString().slice(0,10);
                const dayEvts = events.filter(e=>e.date===ds&&(!filterType||e.type===filterType));
                return (
                  <div key={i} onClick={()=>openAdd(ds)}
                    style={{ minHeight:200, padding:6, borderRight:i<6?"1px solid var(--bdr)":"none", cursor:"pointer", transition:"background .12s" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                    onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <div style={S.col(4)}>
                      {dayEvts.map(ev=>(
                        <div key={ev.id}
                          onClick={e=>{e.stopPropagation();setSelEvent(ev);setModal("view");}}
                          style={{ background:`${ev.color}22`, border:`1px solid ${ev.color}55`, borderRadius:6, padding:"4px 7px",
                            fontSize:11, fontWeight:600, color:ev.color, cursor:"pointer" }}
                          onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.15)";e.stopPropagation();}}
                          onMouseLeave={e=>e.currentTarget.style.filter=""}>
                          {!ev.allDay && <div style={{ fontSize:9, fontFamily:"var(--mono)", opacity:.7 }}>{ev.time}</div>}
                          {ev.title}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── AGENDA VIEW ── */}
      {view === "agenda" && (
        <div style={S.col(10)}>
          {agendaEvents.length === 0 && <Empty icon={<i className="fa fa-calendar" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No upcoming events." />}
          {agendaEvents.map((ev,i)=>{
            const prev = agendaEvents[i-1];
            const showDate = !prev || prev.date !== ev.date;
            return (
              <div key={ev.id}>
                {showDate && (
                  <div style={{ fontSize:11, fontFamily:"var(--mono)", fontWeight:700, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.1em",
                    padding:"14px 0 6px", borderBottom:"1px solid var(--bdr)", marginBottom:4 }}>
                    {new Date(ev.date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
                  </div>
                )}
                <div onClick={()=>{setSelEvent(ev);setModal("view");}}
                  style={{ ...S.flex(14,"center"), background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:10, padding:"12px 16px", cursor:"pointer", transition:"all .15s",
                    borderLeft:`4px solid ${ev.color}` }}
                  onMouseEnter={e=>{e.currentTarget.style.background="var(--sur2)";e.currentTarget.style.transform="translateX(3px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="var(--sur)";e.currentTarget.style.transform="";}}>
                  <div style={{ width:10, height:10, borderRadius:"50%", background:ev.color, flexShrink:0 }} />
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:700 }}>{ev.title}</div>
                    {ev.desc && <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{ev.desc}</div>}
                  </div>
                  <div style={S.flex(8,"center")}>
                    {!ev.allDay && ev.time && <span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>⏰ {ev.time}</span>}
                    <Badge color={CALENDAR_COLORS[EVENT_TYPES.indexOf(ev.type)%CALENDAR_COLORS.length]}>{ev.type}</Badge>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── MINI LEGEND ── */}
      <div style={{ ...S.flex(8,"center","flex-end"), flexWrap:"wrap" }}>
        {EVENT_TYPES.map((t,i)=>(
          <div key={t} onClick={()=>setFilterType(filterType===t?"":t)} style={{ ...S.flex(5,"center"), cursor:"pointer", opacity:filterType&&filterType!==t?.4:1, transition:"opacity .15s" }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:CALENDAR_COLORS[i%CALENDAR_COLORS.length], flexShrink:0 }}/>
            <span style={{ fontSize:11, color:"var(--tx3)", fontFamily:"var(--mono)" }}>{t}</span>
          </div>
        ))}
      </div>

      {/* ── EVENT VIEW MODAL ── */}
      {modal === "view" && selEvent && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
          onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:16, padding:28, width:"100%", maxWidth:420, animation:"fadeUp .2s ease" }}>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:18 }}>
              <div style={{ ...S.flex(10,"center") }}>
                <div style={{ width:12, height:12, borderRadius:"50%", background:selEvent.color }} />
                <Badge color={CALENDAR_COLORS[EVENT_TYPES.indexOf(selEvent.type)%CALENDAR_COLORS.length]}>{selEvent.type}</Badge>
              </div>
              <button onClick={()=>setModal(null)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:18, color:"var(--tx3)", padding:"2px 6px" }}>✕</button>
            </div>
            <div style={{ fontSize:20, fontWeight:800, marginBottom:6 }}>{selEvent.title}</div>
            <div style={{ ...S.flex(8,"center"), marginBottom:12 }}>
              <span style={{ fontSize:12, color:"var(--tx3)" }}><i className="fa fa-calendar" style={{marginRight:4}}></i> {new Date(selEvent.date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"long",year:"numeric"})}</span>
              {!selEvent.allDay && selEvent.time && <span style={{ fontSize:12, color:"var(--tx3)", fontFamily:"var(--mono)" }}>⏰ {selEvent.time}</span>}
            </div>
            {selEvent.desc && <div style={{ fontSize:13, color:"var(--tx2)", lineHeight:1.7, marginBottom:20, background:"var(--sur2)", borderRadius:8, padding:12 }}>{selEvent.desc}</div>}
            <div style={S.flex(8)}>
              <Btn variant="ghost" size="sm" onClick={()=>{ setForm({...selEvent}); setModal("edit"); }}><i className="fa fa-pencil"></i> Edit</Btn>
              <Btn variant="danger" size="sm" onClick={()=>deleteEvent(selEvent.id)}><i className="fa fa-trash"></i> Delete</Btn>
              <Btn variant="ghost" size="sm" onClick={()=>setModal(null)} style={{ marginLeft:"auto" }}>Close</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ── ADD / EDIT MODAL ── */}
      {(modal === "add" || modal === "edit") && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
          onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:16, padding:28, width:"100%", maxWidth:460, animation:"fadeUp .2s ease" }}>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:20 }}>
              <div style={{ fontSize:16, fontWeight:800 }}>{modal==="edit"?"Edit Event":"New Event"}</div>
              <button onClick={()=>setModal(null)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:18, color:"var(--tx3)" }}>✕</button>
            </div>
            <FieldGroup label="Event Title" required>
              <input value={form.title} onChange={e=>upd("title",e.target.value)} placeholder="e.g. Midterm Exam" autoFocus />
            </FieldGroup>
            <div style={S.grid("1fr 1fr",12)}>
              <FieldGroup label="Date" required>
                <input type="date" value={form.date} onChange={e=>upd("date",e.target.value)} />
              </FieldGroup>
              <FieldGroup label="Event Type">
                <select value={form.type} onChange={e=>{ upd("type",e.target.value); upd("color",CALENDAR_COLORS[EVENT_TYPES.indexOf(e.target.value)%CALENDAR_COLORS.length]); }}>
                  {EVENT_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </FieldGroup>
            </div>
            <FieldGroup label="All Day?">
              <div style={S.flex(16,"center")}>
                {[true,false].map(v=>(
                  <label key={v} style={{ ...S.flex(6,"center"), cursor:"pointer", fontSize:13 }}>
                    <input type="radio" name="allDay" checked={form.allDay===v} onChange={()=>upd("allDay",v)} style={{ width:"auto", margin:0 }} />
                    {v?"All Day":"Specific Time"}
                  </label>
                ))}
              </div>
            </FieldGroup>
            {!form.allDay && (
              <FieldGroup label="Time">
                <input type="time" value={form.time} onChange={e=>upd("time",e.target.value)} />
              </FieldGroup>
            )}
            <FieldGroup label="Color">
              <div style={S.flex(8,"center")}>
                {CALENDAR_COLORS.map(c=>(
                  <div key={c} onClick={()=>upd("color",c)}
                    style={{ width:22, height:22, borderRadius:"50%", background:c, cursor:"pointer",
                      border: form.color===c ? "3px solid var(--tx)" : "3px solid transparent", transition:"border .1s" }} />
                ))}
              </div>
            </FieldGroup>
            <FieldGroup label="Description">
              <textarea value={form.desc} onChange={e=>upd("desc",e.target.value)} placeholder="Optional details…" style={{ minHeight:60 }} />
            </FieldGroup>
            <div style={S.flex(8)}>
              <Btn size="md" onClick={saveEvent} disabled={!form.title.trim()||!form.date}
                style={{ background:"var(--primary,#3b82f6)", flex:1, justifyContent:"center" }}>
                {modal==="edit"?<><i className="fa fa-floppy-o"></i> Save Changes</>:<><i className="fa fa-plus"></i> Add Event</>}
              </Btn>
              <Btn size="md" variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── PDF REPORT ───────────────────────────────────────────────────────────────
const printStudentReport = (student, interventions) => {
  const pred = mlPredict(student);
  const isRisk = pred.prediction === 1;
  const recs = buildRecs(isRisk, student);
  const impacts = mlImpacts(student);
  const myInterventions = interventions.filter(i => i.studentId === student.id);
  const finLabel = ["Good","Moderate","Poor"][student.fin];
  const dateStr = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>DropoutAI Report — ${student.name}</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; color:#0f172a; background:#fff; padding:32px; font-size:13px; }
    .header { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid #2563eb; padding-bottom:16px; margin-bottom:24px; }
    .brand { font-size:22px; font-weight:800; color:#2563eb; }
    .brand span { color:#0d9488; }
    .meta { text-align:right; font-size:11px; color:#64748b; }
    .section { margin-bottom:24px; }
    .section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#64748b; border-bottom:1px solid #e2e8f0; padding-bottom:6px; margin-bottom:12px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid4 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .kpi { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:12px; text-align:center; }
    .kpi-val { font-size:22px; font-weight:800; }
    .kpi-lbl { font-size:10px; color:#64748b; margin-top:3px; text-transform:uppercase; letter-spacing:.06em; }
    .risk-box { border-radius:10px; padding:16px; margin-bottom:16px; text-align:center; }
    .risk-box.at-risk { background:#fef2f2; border:2px solid #fca5a5; }
    .risk-box.safe { background:#f0fdf4; border:2px solid #86efac; }
    .risk-emoji { font-size:32px; }
    .risk-label { font-size:18px; font-weight:800; margin:6px 0; }
    .risk-label.at-risk { color:#dc2626; }
    .risk-label.safe { color:#16a34a; }
    .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .bar-label { font-size:11px; color:#64748b; width:90px; flex-shrink:0; }
    .bar-track { flex:1; height:7px; background:#e2e8f0; border-radius:4px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:4px; }
    .rec { display:flex; gap:8px; padding:8px 10px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:6px; margin-bottom:6px; font-size:12px; line-height:1.5; }
    .intervention { padding:10px 12px; background:#f8fafc; border-left:3px solid #2563eb; border-radius:0 6px 6px 0; margin-bottom:8px; }
    .int-meta { font-size:10px; color:#64748b; margin-bottom:3px; }
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:100px; font-size:10px; font-weight:700; }
    .footer { border-top:1px solid #e2e8f0; padding-top:12px; margin-top:24px; font-size:10px; color:#94a3b8; text-align:center; }
    @media print { body { padding:20px; } }
  </style></head><body>
  <div class="header">
    <div><div class="brand">Dropout<span>AI</span></div><div style="font-size:12px;color:#64748b;margin-top:2px">Student Dropout Prediction System</div></div>
    <div class="meta"><div style="font-weight:700;font-size:13px">${student.name}</div><div>${student.sid} · ${student.dept}</div><div>${student.year}</div><div style="margin-top:4px">Generated: ${dateStr}</div></div>
  </div>

  <div class="section">
    <div class="section-title">Prediction Result</div>
    <div class="risk-box ${isRisk?'at-risk':'safe'}">
      <div class="risk-emoji">${isRisk?'⚠️':'✅'}</div>
      <div class="risk-label ${isRisk?'at-risk':'safe'}">${isRisk?'At Risk of Dropout':'Not At Risk'}</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px">Risk Score: <strong>${(pred.risk*100).toFixed(1)}%</strong> · Confidence: <strong>${(pred.confidence*100).toFixed(1)}%</strong> · Model Accuracy: <strong>82.5%</strong></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recorded Indicators</div>
    <div class="grid4">
      <div class="kpi"><div class="kpi-val" style="color:${student.gpa<2?'#dc2626':student.gpa<2.5?'#d97706':'#16a34a'}">${student.gpa.toFixed(2)}</div><div class="kpi-lbl">GPA</div></div>
      <div class="kpi"><div class="kpi-val" style="color:${['#16a34a','#d97706','#dc2626'][student.fin]}">${finLabel}</div><div class="kpi-lbl">Financial</div></div>
      ${student.age!=null && student.age!=="" ? `<div class="kpi"><div class="kpi-val" style="color:${Number(student.age)>=60?'#dc2626':Number(student.age)>=45?'#d97706':'#16a34a'}">${student.age}</div><div class="kpi-lbl">Age (yrs)</div></div>` : ""}
      ${student.feesLevel!=null ? `<div class="kpi"><div class="kpi-val" style="color:${['#16a34a','#d97706','#dc2626'][Number(student.feesLevel)] || '#64748b'};font-size:14px">${["Stable","Moderate","Serious"][Number(student.feesLevel)] || "—"}</div><div class="kpi-lbl">Fees</div></div>` : ""}
      ${student.familyBackground!=null ? `<div class="kpi"><div class="kpi-val" style="font-size:14px">${["Strong","Average","Low"][Number(student.familyBackground)] || "—"}</div><div class="kpi-lbl">Family support</div></div>` : ""}
      ${student.workingStatus!=null ? `<div class="kpi"><div class="kpi-val" style="font-size:14px">${Number(student.workingStatus)===1?"Yes":"No"}</div><div class="kpi-lbl">Working</div></div>` : ""}
      ${student.courseChoice!=null ? `<div class="kpi"><div class="kpi-val" style="font-size:14px">${Number(student.courseChoice)===1?"Yes":"No"}</div><div class="kpi-lbl">Own course choice</div></div>` : ""}
      ${student.homeResponsibility!=null ? `<div class="kpi"><div class="kpi-val" style="font-size:14px">${["Low","Moderate","High"][Number(student.homeResponsibility)] || "—"}</div><div class="kpi-lbl">Home responsibility</div></div>` : ""}
      ${student.hasHealthIssue!=null ? `<div class="kpi"><div class="kpi-val" style="font-size:14px">${Number(student.hasHealthIssue)===1?"Yes":"No"}</div><div class="kpi-lbl">Health issues</div></div>` : ""}
    </div>
  </div>

  <div class="section">
    <div class="section-title">Factor Influence (every factor — submitted &amp; not submitted)</div>
    ${impacts.map(it=>{
      const missing = !!it.notSubmitted;
      const naFlag  = !!it.notApplicable;
      const dim     = missing || naFlag;
      const barW    = dim ? 2 : Math.max(2, it.impact*100);
      const barC    = naFlag ? "#94a3b8" : missing ? "#cbd5e1" : it.color;
      const rowOpacity = dim ? 0.55 : 1;
      const labelExtra = it.displayValue != null
        ? ` <span style="color:#94a3b8${dim?';font-style:italic':''}">(${it.displayValue})</span>`
        : "";
      const pctText = naFlag ? "n/a" : missing ? "—" : `${(it.impact*100).toFixed(0)}%`;
      return `
      <div class="bar-row" style="opacity:${rowOpacity}">
        <div class="bar-label">${it.label}${labelExtra}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${barW.toFixed(0)}%;background:${barC}"></div></div>
        <div style="font-size:11px;width:40px;text-align:right;color:#64748b">${pctText}</div>
      </div>`;
    }).join("")}
  </div>

  <div class="section">
    <div class="section-title">Recommendations</div>
    ${recs.map(r=>`<div class="rec"><span>•</span><span>${r}</span></div>`).join("")}
  </div>

  ${myInterventions.length>0?`
  <div class="section">
    <div class="section-title">Intervention Log (${myInterventions.length})</div>
    ${myInterventions.map(iv=>`
      <div class="intervention">
        <div class="int-meta">${iv.type} · ${iv.by} · ${new Date(iv.date).toLocaleDateString("en-GB")}</div>
        <div>${iv.note}</div>
      </div>`).join("")}
  </div>`:""}

  <div class="footer">DropoutAI — University of Kampala · Academic Year 2025/2026 · Logistic Regression Model · Report generated ${dateStr}</div>
  </body></html>`;

  const w = window.open("","_blank","width=800,height=900");
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 400);
};

// ─── BULK PREDICTION PAGE ─────────────────────────────────────────────────────
const BulkPredictionPage = ({ students, addPred, userName, setStudents, setUsers, addAudit }) => {
  const { settings } = useContext(SettingsCtx) || { settings: DEFAULT_SETTINGS };
  const [ran, setRan] = useState(false);
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState([]);
  const [filterMode, setFilterMode] = useState("all"); // "all" | "risk" | "safe"
  const cy = Math.min(6, Math.max(1, parseInt(settings?.defaultCourseYears ?? 3, 10) || 3));
  const [bulkYear, setBulkYear] = useState(1);
  const [bulkSem, setBulkSem] = useState(1);
  const [bulkAy, setBulkAy] = useState(settings?.academicYear || "2025/2026");
  React.useEffect(() => {
    if (settings?.academicYear) setBulkAy(settings.academicYear);
  }, [settings?.academicYear]);

  // Only run on students who have real data entered
  const eligibleStudents = students.filter(s => s.gpa > 0);
  const skippedStudents  = students.filter(s => s.gpa === 0);

  const runAll = () => {
    if(eligibleStudents.length === 0) return;
    setLoading(true);
    setTimeout(() => {
      const meta = buildPeriodMeta({
        yearOfStudy: bulkYear,
        semesterInYear: bulkSem,
        academicYearLabel: bulkAy,
        courseYears: cy,
      });
      const res = eligibleStudents.map(s => {
        const pred = mlPredict(s);
        addPred({
          res: pred,
          student: { name:s.name, sid:s.sid, dept:s.dept, year:s.year, gpa:s.gpa, fin:s.fin },
          ts: new Date().toISOString(),
          by: "System",
          studentId: s.id,
          ...meta,
        });
        return { ...s, _pred: pred };
      });
      const atRiskCount = res.filter(r=>r._pred.prediction===1).length;
      addAudit?.({ action:`Bulk prediction run: ${res.length} students analysed, ${atRiskCount} at risk`, target:`${res.length} students`, by:"System" });
      // Sync student records with the data used
      const syncYear = `Year ${bulkYear}`;
      const syncSem = bulkSem === 2 ? 2 : 1;
      setStudents(prev => {
        const next = prev.map(s => {
          const updated = res.find(r => r.id === s.id);
          return updated ? { ...s, gpa:+updated.gpa, fin:+updated.fin, year: syncYear, semesterInYear: syncSem } : s;
        });
        lsSet("dai_s", next);
        return next;
      });
      if (typeof setUsers === "function") {
        setUsers(prev => {
          const ids = new Set(res.map(r => r.id));
          const next = prev.map(u => ids.has(u.studentId) || ids.has(u.id) ? { ...u, year: syncYear, semesterInYear: syncSem } : u);
          lsSet("dai_us", next);
          return next;
        });
      }
      setResults(res);
      setRan(true);
      setLoading(false);
    }, 900);
  };

  const exportCSV = () => {
    const dateStr = new Date().toISOString().split("T")[0];
    const rows = [
      ["Name","Student ID","Department","Year","GPA","Financial Status","Risk Score %","Prediction","Confidence %"],
      ...results.map(s => [
        s.name,
        s.sid,
        s.dept,
        s.year,
        s.gpa,
        ["Good","Moderate","Poor"][s.fin] || "Unknown",
        (s._pred.risk*100).toFixed(2),
        s._pred.prediction===1 ? "At Risk" : "Safe",
        (s._pred.confidence*100).toFixed(2)
      ])
    ];
    downloadCSV(`bulk_prediction_${dateStr}.csv`, rows);
  };

  const atRisk = results.filter(s=>s._pred.prediction===1);
  const safe   = results.filter(s=>s._pred.prediction===0);
  const displayResults = filterMode==="risk" ? atRisk : filterMode==="safe" ? safe : results;

  return (
    <div style={S.col(20)}>
      <div>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-magic" style={{fontSize:18,marginRight:8}}></i>Bulk Prediction</h2>
        <p style={S.sub}>Run the dropout risk model on all students at once and get a full summary.</p>
        <div style={{ height:1, background:"#000", marginTop:16 }} />
      </div>

      {!ran ? (
        <Card>
          <div style={{ padding:"24px 24px 0", maxWidth:560, margin:"0 auto" }}>
            <div style={{ ...S.label, marginBottom:8 }}>Academic period for this bulk run</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:12, marginBottom:8 }}>
              <FieldGroup label={`Year (1–${cy})`}>
                <select value={bulkYear} onChange={e => setBulkYear(+e.target.value)} style={{ width:"100%" }}>
                  {Array.from({ length: cy }, (_, i) => i + 1).map(y => <option key={y} value={y}>Year {y}</option>)}
                </select>
              </FieldGroup>
              <FieldGroup label="Semester">
                <select value={bulkSem} onChange={e => setBulkSem(+e.target.value)} style={{ width:"100%" }}>
                  <option value={1}>Semester 1</option>
                  <option value={2}>Semester 2</option>
                </select>
              </FieldGroup>
              <FieldGroup label="Session label">
                <input value={bulkAy} onChange={e => setBulkAy(e.target.value)} placeholder="2025/2026" style={{ width:"100%" }} />
              </FieldGroup>
            </div>
            <div style={{ fontSize:11, color:"var(--tx3)", marginBottom:16 }}>Each student’s prediction history will tag this semester. Run again next semester with updated period settings.</div>
          </div>
          <div style={{ textAlign:"center", padding:"20px 20px 40px" }}>
            <div style={{ fontSize:56, marginBottom:16 }}><i className="fa fa-magic"></i></div>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>
              Ready to analyse <span style={{ color:"var(--primary,#3b82f6)" }}>{eligibleStudents.length}</span> students
            </div>
            <div style={{ fontSize:13, color:"var(--tx3)", marginBottom:16, maxWidth:420, margin:"0 auto 16px" }}>
              This will run the Logistic Regression model on every student’s GPA and financial status.
            </div>
            {skippedStudents.length > 0 && (
              <div style={{ background:"rgba(245,158,11,.08)", border:"1px solid rgba(245,158,11,.25)", borderRadius:8, padding:"10px 16px", fontSize:12, color:"var(--amber)", marginBottom:20, display:"inline-block" }}>
                <i className="fa fa-info-circle" style={{marginRight:6}}></i>
                <strong>{skippedStudents.length} student{skippedStudents.length>1?"s":""}</strong> with no GPA on record will be skipped:&nbsp;
                {skippedStudents.slice(0,3).map(s=>s.name).join(", ")}{skippedStudents.length>3?`… +${skippedStudents.length-3} more`:""}
              </div>
            )}
            {eligibleStudents.length === 0 ? (
              <div style={{ color:"var(--tx3)", fontSize:14, padding:20 }}>
                <i className="fa fa-exclamation-circle" style={{marginRight:8, color:"var(--amber)"}}></i>
                No students have a GPA on record yet. Add or submit student data before running bulk prediction.
              </div>
            ) : (
              <Btn size="lg" onClick={runAll} disabled={loading} style={{ background:"var(--primary,#3b82f6)", display:"inline-flex" }}>
                {loading
                  ? <><div style={{ width:16,height:16,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .6s linear infinite",marginRight:8 }}/>Analysing…</>
                  : <><i className="fa fa-bolt"></i> Run Prediction on All {eligibleStudents.length} Students</>
                }
              </Btn>
            )}
          </div>
        </Card>
      ) : (
        <div style={S.col(20)}>
          {/* Summary KPIs */}
          <div style={S.grid("repeat(4,1fr)",16)}>
            {[
              ["Students Analysed", results.length,   "#3b82f6", "graduation-cap", "all"],
              ["At Risk",           atRisk.length,    "#ef4444", "exclamation-triangle", "risk"],
              ["Safe",              safe.length,       "#10b981", "check-circle", "safe"],
              ["Risk Rate",        `${results.length?((atRisk.length/results.length)*100).toFixed(1):0}%`, "#f59e0b", "bar-chart", null],
            ].map(([label,value,color,icon,filter])=>(
              <div key={label}
                onClick={() => filter && setFilterMode(filter)}
                style={{ background:"var(--sur)", border:`1px solid ${filter && filterMode===filter ? color : "var(--bdr)"}`, borderLeft:`5px solid ${color}`, borderRadius:14, padding:20, boxShadow: filter && filterMode===filter ? `0 4px 24px ${color}40` : "0 4px 18px rgba(0,0,0,.18)", cursor: filter?"pointer":"default", transition:"all .2s", transform: filter && filterMode===filter ? "translateY(-2px)" : "" }}
                onMouseEnter={e => { if(filter) { e.currentTarget.style.boxShadow=`0 8px 28px ${color}40`; e.currentTarget.style.transform="translateY(-2px)"; }}}
                onMouseLeave={e => { if(filter) { e.currentTarget.style.boxShadow=filterMode===filter?`0 4px 24px ${color}40`:"0 4px 18px rgba(0,0,0,.18)"; e.currentTarget.style.transform=filterMode===filter?"translateY(-2px)":""; }}}>
                <div style={{ width:44, height:44, borderRadius:10, background:`${color}20`, border:`1px solid ${color}30`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, color:color, marginBottom:12 }}><i className={`fa fa-${icon}`}></i></div>
                <div style={S.label}>{label}</div>
                <div style={{ fontFamily:"var(--mono)", fontSize:30, fontWeight:700, color, lineHeight:1.1, margin:"8px 0 4px" }}>{value}</div>
                {filter && <div style={{ fontSize:10, color: filterMode===filter ? color : "var(--tx3)", marginTop:4, fontWeight:600 }}>{filterMode===filter ? "● Filtering" : "Click to filter"}</div>}
              </div>
            ))}
          </div>

          {skippedStudents.length > 0 && (
            <div style={{ background:"rgba(245,158,11,.07)", border:"1px solid rgba(245,158,11,.2)", borderRadius:8, padding:"10px 16px", fontSize:12, color:"var(--amber)" }}>
              <i className="fa fa-info-circle" style={{marginRight:6}}></i>
              <strong>{skippedStudents.length} student{skippedStudents.length>1?"s":""}</strong> skipped (no GPA on record): {skippedStudents.map(s=>s.name).join(", ")}
            </div>
          )}

          {/* Top at-risk */}
          {atRisk.length > 0 && (
            <Card>
              <CardHeader title={`Highest Risk Students (${atRisk.length})`} />
              <div style={S.col(0)}>
                {atRisk.sort((a,b)=>b._pred.risk-a._pred.risk).slice(0,5).map((s,i)=>(
                  <div key={s.id} style={{ ...S.flex(0,"center","space-between"), padding:"10px 0", borderBottom:"1px solid var(--bdr)" }}>
                    <div style={S.flex(10,"center")}>
                      <div style={{ width:24, height:24, borderRadius:"50%", background:"rgba(239,68,68,.15)", border:"1px solid rgba(239,68,68,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:"var(--red)", flexShrink:0 }}>{i+1}</div>
                      <div>
                        <div style={{ fontSize:13, fontWeight:700 }}>{s.name}</div>
                        <div style={{ fontSize:11, color:"var(--tx3)" }}>{s.dept} · GPA: {s.gpa}</div>
                      </div>
                    </div>
                    <div style={{ fontFamily:"var(--mono)", fontSize:14, fontWeight:800, color:"var(--red)" }}>{(s._pred.risk*100).toFixed(1)}%</div>
                  </div>
                ))}
              </div>
            </Card>
          )}

          {/* Full results table */}
          <Card>
            <CardHeader title={`Full Results (${displayResults.length})`} action={
              <div style={S.flex(8)}>
                <select value={filterMode} onChange={e=>setFilterMode(e.target.value)} style={{ width:"auto", fontSize:12 }}>
                  <option value="all">All ({results.length})</option>
                  <option value="risk">At Risk ({atRisk.length})</option>
                  <option value="safe">Safe ({safe.length})</option>
                </select>
                <Btn size="sm" variant="ghost" title="Export CSV" onClick={exportCSV}><i className="fa fa-download"></i> Export</Btn>
                <Btn size="sm" variant="ghost" title="Re-run" onClick={runAll}><i className="fa fa-refresh"></i> Re-run</Btn>
              </div>
            } />
            <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:10 }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead>
                  <tr style={{ background:"var(--sur2)" }}>
                    {["#","Name","Dept","GPA","Fin.","Risk Score","Status"].map(h=>(
                      <th key={h} style={{ padding:"9px 12px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".09em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {displayResults.sort((a,b)=>b._pred.risk-a._pred.risk).map((s,i)=>(
                    <tr key={s.id} style={{ borderBottom:"1px solid var(--bdr)", background: s._pred.prediction===1?"rgba(239,68,68,.03)":"" }}>
                      <td style={{ padding:"9px 12px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{i+1}</td>
                      <td style={{ padding:"9px 12px", fontWeight:600 }}>{s.name}</td>
                      <td style={{ padding:"9px 12px", fontSize:11, color:"var(--tx3)" }}>{s.dept}</td>
                      <td style={{ padding:"9px 12px", fontFamily:"var(--mono)", color:s.gpa<2?"var(--red)":s.gpa<2.5?"var(--amber)":"inherit" }}>{s.gpa}</td>
                      <td style={{ padding:"9px 12px" }}><FinBadge fin={s.fin} /></td>
                      <td style={{ padding:"9px 12px", fontFamily:"var(--mono)", fontWeight:700, color:s._pred.prediction===1?"var(--red)":"var(--green)" }}>{(s._pred.risk*100).toFixed(1)}%</td>
                      <td style={{ padding:"9px 12px" }}><RiskBadge risk={s._pred.prediction} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {displayResults.length===0 && <Empty icon={<i className="fa fa-magic" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No results match the current filter." />}
            </div>
          </Card>
        </div>
      )}
    </div>
  );
};

// ─── SEMESTER COMPARISON ─────────────────────────────────────────────────────
const SemesterComparison = ({ student, history = [] }) => {
  // Prefer the actual prediction history for this student — that way the
  // comparison is "previous SUBMITTED semester" vs "current submitted
  // semester", which is what admins and students expect to see. Fall back to
  // the legacy student.prev field only when no history is available.
  const myHistory = (history || [])
    .filter(h => h && h.student && (h.studentId === student?.id || h.student?.sid === student?.sid))
    .slice()
    .sort((a, b) => (b.periodIndex || 0) - (a.periodIndex || 0));

  // No real previous semester to compare against — bail out early so the
  // admin/lecturer view doesn't show a misleading "Sem 1 → Sem 2" panel for
  // a student who is only in their first semester.
  if(!student) return null;
  const hasMultiplePeriods = myHistory.length >= 2;
  // The registration helper seeds every new student with prev = { gpa:0, fin:1 }
  // so we MUST require an actual previous GPA before treating it as "real
  // previous-semester data". Otherwise a Year 1 Sem 1 student would falsely
  // trigger a comparison panel filled with placeholder zeros.
  const hasLegacyPrev      = student.prev && Number(student.prev.gpa) > 0 && Number(student.gpa) > 0;
  if(!hasMultiplePeriods && !hasLegacyPrev) {
    return (
      <Card>
        <CardHeader title="Semester Comparison" action={
          <span style={{ fontSize:11, color:"var(--tx3)" }}><i className="fa fa-info-circle" style={{marginRight:4}}></i>First-semester student</span>
        } />
        <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.7 }}>
          This student has only one recorded semester so far. The semester-to-semester risk comparison will appear here once a second semester is submitted under the <strong>same account</strong>.
        </div>
      </Card>
    );
  }

  // Pick the current + previous data sources.
  let currLabel = "Current";
  let prevLabel = "Previous";
  let currData  = student;
  let prevData  = student.prev;

  if(hasMultiplePeriods) {
    const [curr, prev] = myHistory;
    currLabel = curr.periodLabel || `Period ${curr.periodIndex || ""}`;
    prevLabel = prev.periodLabel || `Period ${prev.periodIndex || ""}`;
    currData  = { ...student, gpa: curr.student?.gpa ?? student.gpa, fin: curr.student?.fin ?? student.fin };
    prevData  = { gpa: prev.student?.gpa, fin: prev.student?.fin };
  } else if(hasLegacyPrev) {
    // Build human labels from the student's actual current period instead of
    // assuming "Sem 1 → Sem 2". A Year 1 Sem 1 student will never reach this
    // branch (hasLegacyPrev requires gpa > 0 and student.prev with data).
    const yearNum   = parseYearOfStudy(student.year);
    const semNum    = studentSemesterInYear(student);
    currLabel = `Year ${yearNum} · Sem ${semNum}`;
    prevLabel = semNum === 2
      ? `Year ${yearNum} · Sem 1`
      : `Year ${Math.max(1, yearNum - 1)} · Sem 2`;
  }

  const prev = prevData;

  const predCurr = mlPredict(currData);
  // Carry over non-academic factors (age, fees, family, etc.) but use the previous semester's GPA/financial
  const predPrev = mlPredict({ ...currData, gpa: prev.gpa, fin: prev.fin });
  const riskDelta = (predCurr.risk - predPrev.risk) * 100;
  const riskImproved = predPrev.prediction === 1 && predCurr.prediction === 0;
  const riskWorsened = predPrev.prediction === 0 && predCurr.prediction === 1;
  const bannerColor  = riskImproved ? "#10b981" : riskWorsened ? "#ef4444" : "#f59e0b";
  const finLabel     = ["Good","Moderate","Poor"];

  const metrics = [
    { key:"gpa", label:"GPA",       curr: Number(currData.gpa || 0), prev: Number(prev.gpa || 0), fmt: v=>v.toFixed(2), higherBetter:true  },
    { key:"fin", label:"Financial", curr: Number(currData.fin || 0), prev: Number(prev.fin || 0), fmt: v=>finLabel[v] || "—", higherBetter:false, isLabel:true },
  ];

  return (
    <div style={{ background:"var(--sur)", border:`2px solid ${bannerColor}40`, borderRadius:14, overflow:"hidden" }}>

      {/* ── Top banner strip ── */}
      <div style={{ background:`${bannerColor}12`, borderBottom:`1px solid ${bannerColor}30`, padding:"14px 20px", display:"flex", alignItems:"center", gap:14 }}>
        <div style={{ width:44, height:44, borderRadius:12, background:`${bannerColor}20`, border:`2px solid ${bannerColor}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>
          {riskImproved ? <i className="fa fa-arrow-up" style={{color:"var(--green)"}}></i> : riskWorsened ? <i className="fa fa-arrow-down" style={{color:"var(--red)"}}></i> : <i className="fa fa-arrow-right" style={{color:"var(--tx3)"}}></i>}
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, fontWeight:800, color:bannerColor, marginBottom:2 }}>
            {riskImproved ? "Semester Trend: Improving ✓" : riskWorsened ? "Semester Trend: Declining ✗" : "Semester Trend: Stable"}
          </div>
          <div style={{ fontSize:12, color:"var(--tx3)" }}>
            Risk score changed from{" "}
            <strong style={{ fontFamily:"var(--mono)", color:"var(--tx2)" }}>{(predPrev.risk*100).toFixed(1)}%</strong>
            {" "}→{" "}
            <strong style={{ fontFamily:"var(--mono)", color: riskDelta > 3 ? "var(--red)" : riskDelta < -3 ? "var(--green)" : "var(--tx)" }}>{(predCurr.risk*100).toFixed(1)}%</strong>
            <span style={{ marginLeft:8, fontWeight:700, color: riskDelta > 0 ? "var(--red)" : "var(--green)" }}>
              ({riskDelta > 0 ? "+" : ""}{riskDelta.toFixed(1)}%)
            </span>
          </div>
        </div>
        {/* Sem badges */}
        <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:10, color:"var(--tx3)", marginBottom:4, fontWeight:600, whiteSpace:"nowrap" }}>{prevLabel.toUpperCase()}</div>
            <RiskBadge risk={predPrev.prediction} score={predPrev.risk} />
          </div>
          <div style={{ fontSize:18, color:"var(--tx3)" }}>→</div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:10, color:"var(--tx3)", marginBottom:4, fontWeight:600, whiteSpace:"nowrap" }}>{currLabel.toUpperCase()}</div>
            <RiskBadge risk={predCurr.prediction} score={predCurr.risk} />
          </div>
        </div>
      </div>

      {/* ── Metric comparison grid ── */}
      <div style={{ padding:"16px 20px" }}>
        <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".1em", color:"var(--tx3)", marginBottom:12, fontFamily:"var(--mono)" }}>
          {prevLabel} → {currLabel} (Current)
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12 }}>
          {metrics.map(({ key, label, curr:c, prev:p, fmt, higherBetter, isLabel }) => {
            const delta    = c - p;
            const noChange = isLabel ? c === p : Math.abs(delta) < 0.05;
            const improved = isLabel ? c < p : (higherBetter ? delta > 0 : delta < 0);
            const trendColor = noChange ? "var(--tx3)" : improved ? "var(--green)" : "var(--red)";
            const trendIcon  = noChange ? "—" : delta > 0 ? "▲" : "▼";
            const trendText  = noChange ? "no change" : `${improved ? "+" : ""}${isLabel ? (c<p?"improved":"declined") : (higherBetter ? (delta>0?"+":"")+delta.toFixed(1) : (delta>0?"+":"")+delta.toFixed(1))}`;

            return (
              <div key={key} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:11, padding:"12px 14px", boxShadow:"0 4px 18px rgba(0,0,0,.18)" }}>
                <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".07em", color:"var(--tx3)", marginBottom:8 }}>{label}</div>
                {/* Previous semester */}
                <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:4 }}>
                  <span style={{ fontSize:11, color:"var(--tx3)", whiteSpace:"nowrap" }}>{prevLabel}</span>
                  <span style={{ fontFamily:"var(--mono)", fontSize:15, fontWeight:700, color:"var(--tx3)" }}>{fmt(p)}</span>
                </div>
                {/* Arrow */}
                <div style={{ fontSize:10, color:"var(--tx3)", marginBottom:4 }}>↓</div>
                {/* Current semester */}
                <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:8 }}>
                  <span style={{ fontSize:11, color:"var(--tx2)", fontWeight:700, whiteSpace:"nowrap" }}>{currLabel}</span>
                  <span style={{ fontFamily:"var(--mono)", fontSize:18, fontWeight:800, color: isLabel ? ["var(--green)","var(--amber)","var(--red)"][c] : trendColor }}>{fmt(c)}</span>
                </div>
                {/* Trend chip */}
                <div style={{ display:"inline-flex", alignItems:"center", gap:4, background:`${trendColor}15`, border:`1px solid ${trendColor}30`, borderRadius:6, padding:"2px 7px" }}>
                  <span style={{ fontSize:9, color:trendColor, fontWeight:800 }}>{trendIcon}</span>
                  <span style={{ fontSize:9, color:trendColor, fontWeight:700, fontFamily:"var(--mono)" }}>{trendText}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ─── INTERVENTION PANEL ───────────────────────────────────────────────────────
const InterventionPanel = ({ student, interventions, addIntervention, userName }) => {
  const myInterventions = interventions.filter(i => i.studentId === student.id);
  const [form, setForm] = useState({ type:"Counselling", note:"", date: new Date().toISOString().slice(0,10) });
  const [open, setOpen] = useState(false);
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = () => {
    if(!form.note.trim()) return;
    addIntervention({ studentId:student.id, studentName:student.name, by:userName, ...form });
    setForm({ type:"Counselling", note:"", date:new Date().toISOString().slice(0,10) });
    setOpen(false);
  };

  return (
    <Card>
      <CardHeader title={`Interventions (${myInterventions.length})`} action={
        <Btn size="sm" onClick={()=>setOpen(v=>!v)} style={{ background:"var(--primary,#3b82f6)" }}>
          {open ? <><i className="fa fa-times"></i> Cancel</> : <><i className="fa fa-plus-circle"></i> Log Intervention</>}
        </Btn>
      } />

      {open && (
        <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:14, marginBottom:14, animation:"fadeUp .2s ease" }}>
          <div style={S.grid("1fr 1fr",12)}>
            <FieldGroup label="Type">
              <select value={form.type} onChange={e=>upd("type",e.target.value)}>
                {INTERVENTION_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </FieldGroup>
            <FieldGroup label="Date">
              <input type="date" value={form.date} onChange={e=>upd("date",e.target.value)} />
            </FieldGroup>
          </div>
          <FieldGroup label="Notes" required>
            <textarea value={form.note} onChange={e=>upd("note",e.target.value)} placeholder="Describe the intervention taken…" style={{ minHeight:70 }} />
          </FieldGroup>
          <Btn onClick={submit} disabled={!form.note.trim()} style={{ background:"var(--primary,#3b82f6)" }}><i className="fa fa-floppy-o"></i> Save Intervention</Btn>
        </div>
      )}

      {myInterventions.length === 0
        ? <Empty icon={<i className="fa fa-clipboard" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No interventions logged yet. Click '+ Log Intervention' to add one." />
        : <div style={S.col(8)}>
            {myInterventions.map(iv=>(
              <div key={iv.id} style={{ padding:"10px 14px", background:"var(--sur2)", borderLeft:`3px solid var(--primary,#3b82f6)`, borderRadius:"0 8px 8px 0", border:"1px solid var(--bdr)", borderLeftWidth:3 }}>
                <div style={{ ...S.flex(0,"center","space-between"), marginBottom:4 }}>
                  <span style={{ ...S.tag("var(--primary,#3b82f6)"), fontSize:10 }}>{iv.type}</span>
                  <span style={{ fontSize:10, color:"var(--tx3)", fontFamily:"var(--mono)" }}>{new Date(iv.date).toLocaleDateString("en-GB")} · {iv.by}</span>
                </div>
                <div style={{ fontSize:12, color:"var(--tx2)", lineHeight:1.6 }}>{iv.note}</div>
              </div>
            ))}
          </div>
      }
    </Card>
  );
};

// ─── INTERVENTIONS PAGE ───────────────────────────────────────────────────────
const InterventionsPage = ({ students, interventions, addIntervention, userName, role }) => {
  const [search,     setSearch]     = useState("");
  const [typeFilter, setTypeFilter] = useState("");
  const [selStudent, setSelStudent] = useState(null);
  const [kpiDrill,   setKpiDrill]   = useState(null); // null | "total" | "supported" | "atrisk" | "week"
  const [form, setForm] = useState({ type:"Counselling", note:"", date: new Date().toISOString().slice(0,10) });
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = () => {
    if(!selStudent || !form.note.trim()) return;
    addIntervention({ studentId:selStudent.id, studentName:selStudent.name, by:userName, ...form });
    setForm({ type:"Counselling", note:"", date:new Date().toISOString().slice(0,10) });
    setSelStudent(null);
  };

  const enriched = interventions.map(iv => ({
    ...iv,
    student: students.find(s => s.id === iv.studentId),
  }));

  const filtered = enriched.filter(iv => {
    const name = iv.student?.name || iv.studentName || "";
    const matchSearch = !search || name.toLowerCase().includes(search.toLowerCase()) || iv.note.toLowerCase().includes(search.toLowerCase());
    const matchType   = !typeFilter || iv.type === typeFilter;
    return matchSearch && matchType;
  });

  const byStudent = students.map(s => ({
    student: s,
    count: interventions.filter(i => i.studentId === s.id).length,
    last:  interventions.filter(i => i.studentId === s.id)[0],
    pred:  mlPredict(s),
  })).filter(x => x.count > 0 || mlPredict(x.student).prediction === 1);

  const atRiskNoIntervention = byStudent.filter(x => x.pred.prediction === 1 && x.count === 0);

  // ── KPI drill data ──────────────────────────────────────────────────────────
  const thisWeekIvs = enriched.filter(iv => {
    const d = new Date(iv.date); const now = new Date();
    return (now - d) < 7*24*60*60*1000;
  });
  const supportedIds = new Set(interventions.map(i => i.studentId));
  const supportedStudents = students.filter(s => supportedIds.has(s.id));

  const kpiConfig = {
    total:     { label:"Total Interventions",       color:"var(--primary,#8b5cf6)", icon:"clipboard", count:interventions.length },
    supported: { label:"Students Supported",        color:"#10b981",                icon:"users", count:supportedStudents.length },
    atrisk:    { label:"At-Risk, No Intervention",  color:"#ef4444",                icon:"exclamation-triangle", count:atRiskNoIntervention.length },
    week:      { label:"This Week",                 color:"#f59e0b",                icon:"calendar", count:thisWeekIvs.length },
  };

  // Drill-down panel content
  const DrillPanel = () => {
    if(!kpiDrill) return null;
    const cfg = kpiConfig[kpiDrill];

    const renderStudentRow = (s, extra) => {
      const pred = mlPredict(s);
      return (
        <tr key={s.id} style={{ borderBottom:"1px solid var(--bdr)" }}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(59,130,246,.05)"}
          onMouseLeave={e=>e.currentTarget.style.background=""}>
          <td style={{ padding:"10px 14px", fontWeight:700 }}>{s.name}</td>
          <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{s.sid}</td>
          <td style={{ padding:"10px 14px", fontSize:12, color:"var(--tx3)" }}>{s.dept}</td>
          <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontWeight:700, color:s.gpa<2?"var(--red)":s.gpa<2.5?"var(--amber)":"var(--green)" }}>{s.gpa.toFixed(2)}</td>
          <td style={{ padding:"10px 14px" }}><RiskBadge risk={pred.prediction} score={pred.risk} /></td>
          {extra && <td style={{ padding:"10px 14px" }}>{extra(s)}</td>}
        </tr>
      );
    };

    const renderIvRow = (iv, i) => (
      <tr key={iv.id} style={{ borderBottom:"1px solid var(--bdr)" }}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(59,130,246,.05)"}
        onMouseLeave={e=>e.currentTarget.style.background=""}>
        <td style={{ padding:"10px 14px", fontWeight:700 }}>{iv.student?.name || iv.studentName}</td>
        <td style={{ padding:"10px 14px" }}><span style={{ ...S.tag(cfg.color), fontSize:10 }}>{iv.type}</span></td>
        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{new Date(iv.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</td>
        <td style={{ padding:"10px 14px", fontSize:12, color:"var(--tx2)", maxWidth:260 }}>{iv.note}</td>
        <td style={{ padding:"10px 14px", fontSize:11, color:"var(--tx3)" }}>{iv.by}</td>
      </tr>

    return (
      <div style={{ background:"var(--sur)", border:`1px solid ${cfg.color}40`, borderRadius:14, overflow:"hidden", animation:"fadeUp .2s ease" }}>

          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:cfg.color }} />
            <span style={{ fontSize:14, fontWeight:800 }}>{cfg.icon} {cfg.label}</span>
            <span style={{ ...S.tag(cfg.color), fontSize:11 }}>{cfg.count} {kpiDrill==="total"||kpiDrill==="week" ? "records" : "students"}</span>
          </div>
          <Btn size="sm" variant="ghost" onClick={() => setKpiDrill(null)}><i className="fa fa-times"></i> Close</Btn>
        </div>

        {/* Table */}
        <div style={{ overflowX:"auto", maxHeight:360, overflowY:"auto" }}>
          {kpiDrill === "total" && (
            interventions.length === 0
              ? <div style={{ padding:"28px", textAlign:"center", color:"var(--tx3)" }}>No interventions logged yet.</div>
              : <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead><tr style={{ background:"var(--sur2)" }}>
                    {["Student","Type","Date","Notes","By"].map(h=><th key={h} style={{ padding:"8px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".08em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>)}
                  </tr></thead>
                  <tbody>{enriched.map(renderIvRow)}</tbody>
                </table>
          )}
          {kpiDrill === "supported" && (
            supportedStudents.length === 0
              ? <div style={{ padding:"28px", textAlign:"center", color:"var(--tx3)" }}>No students supported yet.</div>
              : <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead><tr style={{ background:"var(--sur2)" }}>
                    {["Name","SID","Dept","GPA","Risk","Interventions"].map(h=><th key={h} style={{ padding:"8px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".08em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>)}

                  <tbody>{supportedStudents.map(s => renderStudentRow(s, s2 => (

                    </span>
                  )))}</tbody>
                </table>
          )}
          {kpiDrill === "atrisk" && (
            atRiskNoIntervention.length === 0
              ? <div style={{ padding:"28px", textAlign:"center", color:"var(--tx3)" }}>✅ All at-risk students have been given an intervention.</div>
              : <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead><tr style={{ background:"var(--sur2)" }}>
                    {["Name","SID","Dept","GPA","Risk","Action"].map(h=><th key={h} style={{ padding:"8px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".08em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>)}
                  </tr></thead>

              ? <div style={{ padding:"28px", textAlign:"center", color:"var(--tx3)" }}>No interventions logged this week.</div>

                  <thead><tr style={{ background:"var(--sur2)" }}>
                    {["Student","Type","Date","Notes","By"].map(h=><th key={h} style={{ padding:"8px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".08em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>)}
                  </tr></thead>
                  <tbody>{thisWeekIvs.map(renderIvRow)}</tbody>
                </table>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={S.col(20)}>
      {/* Header */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-clipboard" style={{fontSize:18,marginRight:8}}></i>Intervention Tracker</h2>
            <p style={S.sub}>Log and track academic interventions for at-risk students.</p>
          </div>
          <Btn title="Log a New Intervention" onClick={() => setSelStudent("new")} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-plus-circle"></i> Log New Intervention</Btn>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Clickable KPI boxes */}
      <div style={S.grid("repeat(4,1fr)",14)}>
        {(["total","supported","atrisk","week"]).map(key => {
          const { label, color, icon, count } = kpiConfig[key];
          const active = kpiDrill === key;
          return (
            <div key={key}
              onClick={() => setKpiDrill(k => k===key ? null : key)}
              style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderLeft:`5px solid ${color}`, borderRadius:16, padding:20, position:"relative", overflow:"hidden", cursor:"pointer",
                boxShadow: active ? `0 4px 18px rgba(0,0,0,.22)` : "0 4px 18px rgba(0,0,0,.12)",
                transition:"box-shadow .2s" }}
              onMouseEnter={e => { e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,.25)"; }}
              onMouseLeave={e => { e.currentTarget.style.boxShadow=active?"0 4px 18px rgba(0,0,0,.22)":"0 4px 18px rgba(0,0,0,.12)"; }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:16 }}>
                <div style={{ width:48, height:48, borderRadius:12, background:`${color}18`, border:`1px solid ${color}25`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:color }}>
                  <i className={`fa fa-${icon}`}></i>
                </div>
                <i className="fa fa-pencil" style={{ fontSize:11, color:color, opacity:.7 }}></i>
              </div>
              <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--tx2)", marginBottom:8 }}>{label}</div>

            </div>
          );
        })}
      </div>

      {/* Drill-down panel */}
      <DrillPanel />
      {atRiskNoIntervention.length > 0 && (
        <div style={{ background:"rgba(239,68,68,.06)", border:"1px solid rgba(239,68,68,.25)", borderRadius:10, padding:"12px 16px", display:"flex", gap:12, alignItems:"center" }}>

          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"var(--red)", marginBottom:2 }}>{atRiskNoIntervention.length} at-risk student{atRiskNoIntervention.length!==1?"s have":" has"} not received any intervention yet</div>
            <div style={{ fontSize:12, color:"var(--tx3)" }}>{atRiskNoIntervention.slice(0,4).map(x=>x.student.name.split(" ")[0]).join(", ")}{atRiskNoIntervention.length>4?` and ${atRiskNoIntervention.length-4} more`:""}</div>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {atRiskNoIntervention.slice(0,3).map(x => (
              <button key={x.student.id} onClick={() => { setSelStudent(x.student); }}

                + Log for {x.student.name.split(" ")[0]}
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={S.grid("1fr 1.6fr", 20)}>
        {/* Left: student summary */}
        <Card>
          <CardHeader title="By Student" />
          {byStudent.length === 0
            ? <Empty icon={<i className="fa fa-clipboard" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No at-risk students or interventions yet." />
            : <div style={{ maxHeight:440, overflowY:"auto" }}>
                {byStudent.sort((a,b) => b.pred.risk - a.pred.risk).map(({ student:s, count, last, pred }) => (
                  <div key={s.id}
                    onClick={() => setSelStudent(s)}
                    style={{ ...S.flex(0,"center","space-between"), padding:"11px 14px", borderBottom:"1px solid var(--bdr)", cursor:"pointer", transition:"background .12s" }}

                    onMouseLeave={e => e.currentTarget.style.background=""}>
                    <div style={S.flex(10,"center")}>
                      <div style={{ width:34, height:34, borderRadius:9, background: pred.prediction===1?"rgba(239,68,68,.15)":"rgba(16,185,129,.1)", border:`1px solid ${pred.prediction===1?"rgba(239,68,68,.3)":"rgba(16,185,129,.25)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color: pred.prediction===1?"var(--red)":"var(--green)", flexShrink:0 }}>
                        {s.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
                      </div>
                      <div>
                        <div style={{ fontSize:13, fontWeight:700 }}>{s.name}</div>
                        <div style={{ fontSize:11, color:"var(--tx3)" }}>{count} intervention{count!==1?"s":""}{last ? ` · last ${new Date(last.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}` : ""}</div>

                    </div>

                        + Log

                    </div>
                  </div>
                ))}
              </div>
          }
        </Card>

        {/* Right: all intervention log */}
        <Card>
          <CardHeader title={`All Interventions (${filtered.length})`} action={
            <div style={S.flex(8,"center")}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{ width:130, fontSize:12 }} />
              <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{ width:"auto", fontSize:12 }}>
                <option value="">All Types</option>
                {INTERVENTION_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
          } />
          {filtered.length === 0
            ? <Empty icon={<i className="fa fa-clipboard" style={{fontSize:36,color:"var(--tx3)"}}></i>} text={interventions.length===0 ? "No interventions logged yet. Click '+ Log New Intervention' to get started." : "No results match your search."} />
            : <div style={{ maxHeight:440, overflowY:"auto" }}>
                {filtered.map(iv => (
                  <div key={iv.id} style={{ padding:"12px 14px", borderBottom:"1px solid var(--bdr)" }}>

                      <div style={S.flex(8,"center")}>
                        <span style={{ ...S.tag("var(--primary,#8b5cf6)"), fontSize:10 }}>{iv.type}</span>

                    </div>
                    <div style={{ fontSize:12, color:"var(--tx2)", lineHeight:1.6, paddingLeft:2 }}>{iv.note}</div>
                  </div>
                ))}
              </div>
          }
        </Card>
      </div>

      {/* ── Quick-Log Modal ── */}
      {selStudent && (
        <div onClick={() => setSelStudent(null)}
          style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(3px)" }}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:14, width:"100%", maxWidth:480, boxShadow:"0 20px 60px rgba(0,0,0,0.6)", animation:"fadeUp .2s ease" }}>
            <div style={{ padding:"16px 20px", borderBottom:"1px solid var(--bdr)", display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:20 }}><i className="fa fa-clipboard"></i></span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:800 }}>Log Intervention</div>
                {selStudent !== "new" && <div style={{ fontSize:12, color:"var(--tx3)", marginTop:2 }}>For: <strong style={{color:"var(--tx)"}}>{selStudent.name}</strong></div>}
              </div>
              <button onClick={() => setSelStudent(null)} style={{ width:30, height:30, borderRadius:7, border:"1px solid var(--bdr)", background:"var(--sur2)", cursor:"pointer", fontSize:14, color:"var(--tx2)" }}>✕</button>
            </div>
            <div style={{ padding:"16px 20px" }}>
              {selStudent === "new" && (
                <FieldGroup label="Student" required>
                  <select onChange={e => setSelStudent(students.find(s=>s.id===+e.target.value)||"new")} defaultValue="">
                    <option value="" disabled>Select a student…</option>
                    {students.map(s => <option key={s.id} value={s.id}>{s.name} ({s.sid})</option>)}
                  </select>
                </FieldGroup>
              )}
              <div style={S.grid("1fr 1fr",12)}>
                <FieldGroup label="Type">
                  <select value={form.type} onChange={e=>upd("type",e.target.value)}>
                    {INTERVENTION_TYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </FieldGroup>
                <FieldGroup label="Date">
                  <input type="date" value={form.date} onChange={e=>upd("date",e.target.value)} />
                </FieldGroup>
              </div>
              <FieldGroup label="Notes" required>
                <textarea value={form.note} onChange={e=>upd("note",e.target.value)} placeholder="Describe the intervention taken…" style={{ minHeight:80 }} />
              </FieldGroup>
              <div style={S.flex(8)}>
                <Btn onClick={submit} disabled={selStudent==="new" || !form.note.trim()} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-floppy-o"></i> Save Intervention</Btn>
                <Btn variant="ghost" onClick={() => setSelStudent(null)}>Cancel</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

  { name:"Pink",       primary:"#ec4899", glow:"rgba(236,72,153,.18)",  dark:{ bg:"#0f0508", bg2:"#1a0810", sur:"#280a18", sur2:"#351020", sur3:"#441828", bdr:"#601540", bdr2:"#7a1a52", tx:"#ffe8f4", tx2:"#d87bac", tx3:"#9e3d70" }, light:{ bg:"#fff4f9", bg2:"#ffe0f0", sur:"#ffffff", sur2:"#fff0f7", sur3:"#ffd8ee", bdr:"#f0b3d4", bdr2:"#e88fc0", tx:"#280a18", tx2:"#8a1e58", tx3:"#b84a82" } },
  { name:"Purple",     primary:"#a855f7", glow:"rgba(168,85,247,.18)",  dark:{ bg:"#07030f", bg2:"#0f051a", sur:"#180a28", sur2:"#200d35", sur3:"#281044", bdr:"#401560", bdr2:"#521a7a", tx:"#f0e8ff", tx2:"#b07bd8", tx3:"#7a3d9e" }, light:{ bg:"#f7f0ff", bg2:"#ecdcff", sur:"#ffffff", sur2:"#f3e8ff", sur3:"#e8d4ff", bdr:"#d4b0f0", bdr2:"#c090e8", tx:"#15082a", tx2:"#5a1e8a", tx3:"#824ab8" } },
];

const applyColorTheme = (themeName, isDark) => {
  const ct = COLOR_THEMES.find(t => t.name === themeName) || COLOR_THEMES[0];
  const root = document.documentElement;
  root.style.setProperty("--primary", ct.primary);
  root.style.setProperty("--primary-glow", ct.glow);
  // Subtle tinted background for the main dashboard area only
  const tint = isDark
    ? `color-mix(in srgb, ${ct.primary} 6%, #03080f)`
    : `color-mix(in srgb, ${ct.primary} 8%, #f5f8ff)`;
  root.style.setProperty("--theme-bg", tint);
  // Force white text in dark mode
  if (isDark) {
    root.style.setProperty("--tx",  "#ffffff");
    root.style.setProperty("--tx2", "#c8d8f0");
    root.style.setProperty("--tx3", "#7baad8");
  } else {
    root.style.removeProperty("--tx");
    root.style.removeProperty("--tx2");
    root.style.removeProperty("--tx3");
  }
};
