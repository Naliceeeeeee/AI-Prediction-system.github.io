// ─── MODEL METRICS PAGE ───────────────────────────────────────────────────────
const ModelMetricsPage = ({ students=[], predHistory=[] }) => {
  const [retraining, setRetraining] = useState(false);
  const [retrainMsg, setRetrainMsg] = useState("");
  const [, forceUpdate] = useState(0);

  // ── Retrain model using current student data ──
  const retrain = () => {
    const eligible = students.filter(s => s.gpa > 0);
    if(eligible.length < 5) {
      setRetrainMsg("error:Need at least 5 students with data to retrain. Currently have " + eligible.length + ".");
      setTimeout(() => setRetrainMsg(""), 4000);
      return;
    }
    setRetraining(true);
    setRetrainMsg("");
    // Run in setTimeout to allow UI to update (show spinner)
    setTimeout(() => {
      // Label students: at-risk if low GPA or poor finance
      const samples = eligible.map(s => ({
        features: [s.gpa, s.fin],
        label: (s.gpa < 2.0 || s.fin === 2) ? 1 : 0
      }));

      const result = trainLogisticRegression(samples);
      if(result) {
        // Update ML object in place
        ML.coef      = result.coef;
        ML.intercept = result.intercept;
        ML.mean      = result.mean;
        ML.std       = result.std;
        ML.trainAcc  = result.trainAcc;
        ML.trainSize = result.trainSize;
        ML.trainedOn = new Date().toLocaleDateString("en-GB", { month:"short", year:"numeric" });

        // Save to localStorage
        try { localStorage.setItem("dai_ml", JSON.stringify({ coef:ML.coef, intercept:ML.intercept, mean:ML.mean, std:ML.std, trainAcc:ML.trainAcc, trainSize:ML.trainSize, trainedOn:ML.trainedOn })); } catch {}

        setRetrainMsg(`success:Model retrained on ${eligible.length} students! Training accuracy: ${result.trainAcc.toFixed(1)}%`);
        forceUpdate(n => n+1); // force re-render to show new values
      } else {
        setRetrainMsg("error:Retraining failed. Not enough data.");
      }
      setRetraining(false);
      setTimeout(() => setRetrainMsg(""), 5000);
    }, 1200);
  };

  // ── Load saved ML if available ──
  React.useEffect(() => {
    try {
      const saved = localStorage.getItem("dai_ml");
      if(saved) {
        const d = JSON.parse(saved);
        Object.assign(ML, d);
        forceUpdate(n => n+1);
      }
    } catch {}
  }, []);
  // ── Compute live confusion matrix from actual predictions ──
  const evaluated = predHistory.filter(h => h.student && h.res);
  let tp=0, tn=0, fp=0, fn=0;
  evaluated.forEach(h => {
    const st = h.student;
    const actual = (st.gpa != null && st.gpa < 2.0) || st.fin === 2 ? 1 : 0;
    const pred   = h.res.prediction;
    if(actual===1 && pred===1) tp++;
    else if(actual===0 && pred===0) tn++;
    else if(actual===0 && pred===1) fp++;
    else if(actual===1 && pred===0) fn++;
  });
  const total     = tp+tn+fp+fn;
  const liveAcc   = total > 0 ? ((tp+tn)/total*100).toFixed(1) : null;
  const precision = (tp+fp) > 0 ? (tp/(tp+fp)*100).toFixed(1) : null;
  const recall    = (tp+fn) > 0 ? (tp/(tp+fn)*100).toFixed(1) : null;
  const f1        = precision && recall ? (2*(+precision * +recall)/((+precision) + (+recall))).toFixed(1) : null;
  const specificity = (tn+fp) > 0 ? (tn/(tn+fp)*100).toFixed(1) : null;

  // ── Feature importance from actual coefficients ──
  const features = [
    { name:"GPA",       coef: ML.coef[0], color:"#10b981",  impact:"Negative = higher GPA → lower risk",     mean: ML.mean[0].toFixed(2), unit:"" },
    { name:"Financial", coef: ML.coef[1], color:"#ef4444",  impact:"Higher coded value = higher risk (0–2)", mean: ML.mean[1].toFixed(2), unit:"" },
  ];
  const maxAbs = Math.max(...features.map(f => Math.abs(f.coef))) || 1;

  // ── Live stats from actual students ──
  const studentsWithData = students.filter(s => s.gpa > 0);
  const atRisk = studentsWithData.filter(s => mlPredict(s).prediction===1);

  const eligible = students.filter(s => s.gpa > 0);

  return (
    <div style={S.col(20)}>

      {/* Retrain button + message */}
      <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <div style={{ flex:1 }}>
          {retrainMsg && (
            <Alert type={retrainMsg.startsWith("error")?"error":"success"}>
              <i className={`fa fa-${retrainMsg.startsWith("error")?"exclamation-triangle":"check-circle"}`} style={{marginRight:6}}></i>
              {retrainMsg.split(":")[1]}
            </Alert>
          )}
          {eligible.length < 5 && !retrainMsg && (
            <div style={{ fontSize:12, color:"var(--amber)", background:"rgba(245,158,11,.07)", border:"1px solid rgba(245,158,11,.2)", borderRadius:8, padding:"8px 14px" }}>
              <i className="fa fa-info-circle" style={{marginRight:6}}></i>
              Need at least 5 students with data to retrain. Currently: <strong>{eligible.length}</strong>.
            </div>
          )}
        </div>
        <Btn onClick={retrain} disabled={retraining || eligible.length < 5}
          style={{ background: eligible.length >= 5 ? "#8b5cf6" : "var(--sur2)", color: eligible.length >= 5 ? "#fff" : "var(--tx3)", flexShrink:0 }}>
          {retraining
            ? <><div style={{ width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .6s linear infinite",marginRight:8,display:"inline-block" }}/>Retraining…</>
            : <><i className="fa fa-refresh" style={{marginRight:6}}></i>Retrain Model on {eligible.length} Students</>
          }
        </Btn>
      </div>

      {/* Top KPIs */}
      <div style={S.grid("repeat(4,1fr)",16)}>
        <KPI label="Training Accuracy" value={`${ML.trainAcc?.toFixed(1)||89.4}%`} color="#10b981" icon={<i className="fa fa-line-chart"></i>} sub={`${ML.trainSize||160} training samples`} />
        <KPI label="Test Accuracy"     value={`${ML.testAcc||82.5}%`} color="#3b82f6" icon={<i className="fa fa-bullseye"></i>} sub="Held-out test set" />
        <KPI label="Live Accuracy"     value={liveAcc ? `${liveAcc}%` : "N/A"} color={liveAcc?"#8b5cf6":"var(--tx3)"} icon={<i className="fa fa-bolt"></i>} sub={total > 0 ? `${total} real predictions` : "No predictions yet"} />
        <KPI label="Trained On"        value={ML.trainedOn||"Mar 2026"} color="#f59e0b" icon={<i className="fa fa-calendar"></i>} sub="Last model update" />
      </div>

      <div style={S.grid("1fr 1fr",20)}>
        {/* Performance Metrics */}
        <Card>
          <CardHeader title="Model Performance" />
          {[
            ["Algorithm",    "Logistic Regression",                          "#3b82f6"],
            ["Library",      "scikit-learn 1.3 (JS simulation)",             "#3b82f6"],
            ["Scaler",       "StandardScaler",                               "#3b82f6"],
            ["Features",     "2 (GPA, Financial status)",                    "#3b82f6"],
            ["Threshold",    `${(THRESHOLD_REF.value*100).toFixed(0)}% risk`, "#f59e0b"],
            ["Intercept",    ML.intercept.toFixed(4),                        "#8b5cf6"],
            ["Train Samples",`${ML.trainSize||160}`,                         "#8b5cf6"],
            ["Trained On",   ML.trainedOn||"Mar 2026",                       "#8b5cf6"],
            ["Precision",    precision ? `${precision}%` : "82.5% (baseline)", precision?"#10b981":"var(--tx3)"],
            ["Recall",       recall    ? `${recall}%`    : "80.0% (baseline)", recall   ?"#10b981":"var(--tx3)"],
            ["F1 Score",     f1        ? `${f1}%`        : "80.0% (baseline)", f1       ?"#10b981":"var(--tx3)"],
            ["Specificity",  specificity ? `${specificity}%` : "85.0% (baseline)", specificity?"#10b981":"var(--tx3)"],
            ["AUC-ROC",      "~0.87",                                        "#10b981"],
            ["Students in system", `${studentsWithData.length} with data`,   "#0ea5e9"],
            ["Currently at risk",  `${atRisk.length} (${studentsWithData.length?((atRisk.length/studentsWithData.length)*100).toFixed(1):0}%)`, "#ef4444"],
          ].map(([k,v,c])=>(
            <div key={k} style={{ ...S.flex(0,"center","space-between"), padding:"8px 0", borderBottom:"1px solid var(--bdr)", fontSize:13 }}>
              <span style={{ color:"var(--tx2)" }}>{k}</span>
              <span style={{ fontFamily:"var(--mono)", fontWeight:600, color:c }}>{v}</span>
            </div>
          ))}
        </Card>

        <div style={S.col(16)}>
          {/* Confusion Matrix */}
          <Card>
            <CardHeader title={`Confusion Matrix ${total > 0 ? `(${total} predictions)` : "(baseline)"}`} />
            {total === 0 && (
              <div style={{ fontSize:11, color:"var(--tx3)", marginBottom:10, padding:"8px 10px", background:"rgba(59,130,246,.06)", borderRadius:7, border:"1px solid rgba(59,130,246,.2)" }}>
                <i className="fa fa-info-circle" style={{marginRight:6, color:"#3b82f6"}}></i>
                Showing baseline values. Matrix will update live as predictions are run.
              </div>
            )}
            <div style={S.grid("1fr 1fr",10)}>
              {[
                ["True Positive",  total>0?tp:16, "#10b981", "Correctly flagged at-risk"],
                ["False Negative", total>0?fn:4,  "#ef4444", "Missed at-risk students"],
                ["False Positive", total>0?fp:3,  "#f59e0b", "Incorrectly flagged safe"],
                ["True Negative",  total>0?tn:17, "#10b981", "Correctly identified safe"],
              ].map(([l,v,c,hint])=>(
                <div key={l} style={{ background:`${c}10`, border:`1px solid ${c}30`, borderRadius:10, padding:14, textAlign:"center" }}>
                  <div style={{ fontFamily:"var(--mono)", fontSize:28, fontWeight:700, color:c }}>{v}</div>
                  <div style={{ fontSize:11, fontWeight:700, color:c, marginTop:4 }}>{l}</div>
                  <div style={{ fontSize:9, color:"var(--tx3)", marginTop:3, lineHeight:1.4 }}>{hint}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* Feature Coefficients */}
          <Card>
            <CardHeader title="Feature Coefficients (from ML model)" />
            <div style={{ fontSize:11, color:"var(--tx3)", marginBottom:12, lineHeight:1.6 }}>
              <i className="fa fa-info-circle" style={{marginRight:4, color:"#3b82f6"}}></i>
              Negative = reduces dropout risk. Positive = increases risk. Larger bar = stronger influence.
            </div>
            {features.map(f => (
              <div key={f.name} style={{ marginBottom:14 }}>
                <div style={{ ...S.flex(0,"center","space-between"), marginBottom:5 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:"var(--tx2)" }}>{f.name}</span>
                  <span style={{ fontFamily:"var(--mono)", fontSize:11, fontWeight:700, color: f.coef < 0 ? "#10b981" : "#ef4444" }}>
                    {f.coef > 0 ? "+" : ""}{f.coef}
                  </span>
                </div>
                <div style={{ height:8, background:"var(--bg2)", borderRadius:4, overflow:"hidden", marginBottom:4 }}>
                  <div style={{ height:"100%", width:`${(Math.abs(f.coef)/maxAbs)*100}%`, background: f.coef < 0 ? "#10b981" : "#ef4444", borderRadius:4, transition:"width .8s ease" }} />
                </div>
                <div style={{ fontSize:10, color:"var(--tx3)", display:"flex", justifyContent:"space-between" }}>
                  <span>{f.impact}</span>
                  <span>Mean: {f.mean}{f.unit}</span>
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
};

            <FieldGroup label="New Password" required>
              <input type="text" value={newPwd} onChange={e=>setNewPwd(e.target.value)}

                autoFocus
                onKeyDown={e => e.key==="Enter" && savePassword()}
              />
              {newPwd && (resetFor.role==="admin") && (() => {
                const v = validateLecPwd(newPwd);
                return <div style={{ fontSize:11, marginTop:4, color: v.valid?"var(--green)":"var(--red)" }}><i className={`fa fa-${v.valid?"check":"times"}-circle`} style={{marginRight:4}}></i>{v.msg}</div>;
              })()}
            </FieldGroup>
            {pwdMsg && <Alert type={pwdMsg.startsWith("error")?"error":"success"} style={{ marginBottom:12 }}>{pwdMsg.split(":")[1]}</Alert>}
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
              <Btn variant="ghost" onClick={()=>setResetFor(null)}>Cancel</Btn>
              <Btn onClick={savePassword} style={{ background:"#f59e0b", color:"#000" }}>
                <i className="fa fa-check"></i> Save Password
              </Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── SETTINGS PAGE ────────────────────────────────────────────────────────────
const SettingsPage = () => {
  const { settings, updateSettings } = useContext(SettingsCtx);
  const [form, setForm] = useState({ ...settings });
  const [saved, setSaved] = useState("");
  const upd = (k,v) => setForm(f => ({...f, [k]:v}));

  const save = (section) => {
    const updates = {};
    if(section === "system") {
      updates.systemName   = form.systemName;
      updates.institution  = form.institution;
      updates.academicYear = form.academicYear;
      const t = Math.min(90, Math.max(10, parseFloat(form.riskThreshold)||50));
      updates.riskThreshold = t;
      THRESHOLD_REF.value = t / 100; // apply immediately to mlPredict
    }
    if(section === "model") {
      updates.retrainSchedule = form.retrainSchedule;
      updates.defaultCourseYears = Math.min(6, Math.max(2, parseInt(String(form.defaultCourseYears ?? "").trim(), 10) || settings.defaultCourseYears || 3));
    }
    if(section === "data") {
      updates.sessionTimeout = form.sessionTimeout;
      updates.dataRetention  = form.dataRetention;
      updates.exportFormat   = form.exportFormat;
    }
    updateSettings(updates);
    setSaved(section);
    setTimeout(() => setSaved(""), 3000);
  };

  const F = ({ label, name, type="text", min, max, suffix, hint, readOnly }) => (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontSize:11, fontWeight:600, color:"var(--tx3)", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.07em" }}>{label}</label>
      <div style={{ position:"relative" }}>
        <input type={type} min={min} max={max} readOnly={readOnly}
          value={form[name]||""} onChange={e => !readOnly && upd(name, e.target.value)}

      </div>

      <label style={{ display:"block", fontSize:11, fontWeight:600, color:"var(--tx3)", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.07em" }}>{label}</label>
      <select value={form[name]||""} onChange={e=>upd(name,e.target.value)} style={{ background:"var(--bg2)" }}>

  const SaveBtn = ({section}) => (
    <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:6 }}>
      <Btn onClick={()=>save(section)} style={{ background:"var(--primary,#f59e0b)", color:"#000" }}>
        <i className="fa fa-check"></i> Apply
      </Btn>
      {saved===section && <span style={{ fontSize:12, color:"var(--green)", display:"flex", alignItems:"center", gap:4 }}><i className="fa fa-check-circle"></i> Saved!</span>}
    </div>
  );

  return (
    <div style={S.col(20)}>
      <div>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-sliders" style={{fontSize:18,marginRight:8}}></i>System Settings</h2>
        <p style={S.sub}>Configure system behaviour, model thresholds and data preferences. Changes apply immediately.</p>
      </div>
      <div style={{ height:1, background:"#000" }} />

      <div style={S.grid("1fr 1fr", 20)}>

        <Card>
          <CardHeader title="System Settings" />
          <F name="systemName"    label="System Name"     hint="Shown in the header and reports." />
          <F name="institution"   label="Institution"     hint="Your university name — shown in footer." />
          <F name="academicYear"  label="Academic Year"   hint='e.g. 2025/2026' />
          <F name="riskThreshold" label="Risk Threshold (%)" type="number" min={10} max={90} suffix="%" hint={`Students with risk score ≥ ${form.riskThreshold||50}% are flagged At-Risk.`} />
          <SaveBtn section="system" />
        </Card>

        <Card>
          <CardHeader title="Model Settings" />
          <F name="algorithm" label="Algorithm" readOnly hint="Algorithm cannot be changed." />
          <Sel name="retrainSchedule" label="Retrain Schedule" options={["Every Semester","Every Month","Every Year","Manual Only"]} />
          <div style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, color:"var(--tx3)", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.07em" }}>Default programme length (years)</label>
            <input type="number" min={2} max={6}
              value={form.defaultCourseYears != null && form.defaultCourseYears !== "" ? form.defaultCourseYears : (settings.defaultCourseYears ?? 3)}
              onChange={e => upd("defaultCourseYears", e.target.value)}
              style={{ background:"var(--bg2)", width:"100%", maxWidth:120 }} />
            <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}><i className="fa fa-info-circle" style={{marginRight:4}}></i>Semester checkpoints = years × 2 (two semesters per year).</div>
          </div>
          <F name="featureSet" label="ML Input Features" readOnly hint="Dropout model uses GPA and financial status (0–2)." />
          <SaveBtn section="model" />
        </Card>

        <Card>
          <CardHeader title="Notification Settings" />
          <div style={{ padding:"12px 14px", background:"rgba(59,130,246,.07)", border:"1px solid rgba(59,130,246,.2)", borderRadius:8, marginBottom:14 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"var(--blue)", marginBottom:6 }}><i className="fa fa-bell" style={{marginRight:6}}></i>Live Alerts Active</div>
            <div style={{ fontSize:11, color:"var(--tx3)", lineHeight:1.7 }}>
              Alerts fire automatically when:<br/>
              • Risk score ≥ <strong>{form.riskThreshold||50}%</strong> → At-Risk flag<br/>
              • GPA &lt; 2.0 → Academic alert<br/>
              • New student registers → Admin/Lecturer notified
            </div>
          </div>
          <div style={{ fontSize:11, color:"var(--tx3)", padding:"8px 12px", background:"rgba(16,185,129,.06)", borderRadius:7, border:"1px solid rgba(16,185,129,.2)" }}>
            <i className="fa fa-info-circle" style={{marginRight:6, color:"var(--green)"}}></i>
            Notifications update in real-time. No email server needed.
          </div>
        </Card>

        <Card>
          <CardHeader title="Data & Security" />
          <Sel name="dataRetention"  label="Data Retention"  options={["1 Year","2 Years","5 Years","Indefinite"]} />
          <Sel name="exportFormat"   label="Export Format"   options={["CSV / HTML","CSV Only","HTML Only"]} />
          <Sel name="sessionTimeout" label="Session Timeout" options={["1 Hour","2 Hours","4 Hours","8 Hours","Never"]} />
          <div style={{ marginBottom:14, padding:"10px 12px", background:"rgba(245,158,11,.07)", border:"1px solid rgba(245,158,11,.2)", borderRadius:8, fontSize:11, color:"var(--amber)", lineHeight:1.6 }}>
            <i className="fa fa-lock" style={{marginRight:6}}></i>
            <strong>Students</strong> use DOB as password (DDMMYYYY).<br/>
            <strong>Lecturers</strong> use a custom password (letters + numbers + symbol, max 8 chars).
          </div>
          <SaveBtn section="data" />
          <div style={{ marginTop:16, padding:"14px", background:"rgba(239,68,68,.06)", border:"1px solid rgba(239,68,68,.25)", borderRadius:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"var(--red)", marginBottom:8 }}><i className="fa fa-warning" style={{marginRight:6}}></i>Danger Zone</div>
            <Btn variant="danger" size="sm" onClick={() => { if(window.confirm("Reset ALL data? This cannot be undone.")) { localStorage.clear(); window.location.reload(); } }}>
              <i className="fa fa-trash"></i> Reset All Data
            </Btn>
            <div style={{ fontSize:10, color:"var(--tx3)", marginTop:6 }}>Clears all data and reloads the system.</div>
          </div>
        </Card>

      </div>
    </div>
  );
};

// ─── PREDICTION TREND (semesters over programme) ─────────────────────────────
const PredictionTrendChart = ({ history, totalSemesters }) => {
  const points = React.useMemo(() => {
    const rows = (history || []).filter(h => h && h.res);
    const sorted = [...rows].sort((a, b) => {
      const ai = a.periodIndex != null ? a.periodIndex : 999;
      const bi = b.periodIndex != null ? b.periodIndex : 999;
      if (ai !== bi) return ai - bi;
      return new Date(a.ts) - new Date(b.ts);
    });
    return sorted;
  }, [history]);

  if (!points.length) return null;

  // ── Helper: extract { yearNum, semNum, acYear } from a periodLabel like
  //   "Year 1 · Sem 2"   or   "Year 2 · Sem 1 · 2024/2025"
  // Falls back to deriving year/sem from a sequential periodIndex (assumes
  // SEMESTERS_PER_YEAR = 2) so legacy predictions still group correctly.
  const parsePeriod = (label, fallbackIndex) => {
    if (label) {
      const m = String(label).match(/Year\s+(\d+)[^\d]+Sem(?:ester)?\s+(\d+)(?:[^\w]+(\d{4}\s*\/\s*\d{2,4}|\d{4}\s*[-–]\s*\d{2,4}))?/i);
      if (m) {
        return {
          yearNum: parseInt(m[1], 10) || null,
          semNum:  parseInt(m[2], 10) || null,
          acYear:  m[3] ? m[3].replace(/\s+/g, "") : "",
        };
      }
    }
    const pi = parseInt(fallbackIndex, 10);
    if (pi > 0) {
      return { yearNum: Math.ceil(pi / 2), semNum: ((pi - 1) % 2) + 1, acYear: "" };
    }
    return { yearNum: null, semNum: null, acYear: "" };
  };

  // ── Bar-chart layout ──────────────────────────────────────────────────────
  // Width adapts to the number of bars so a 10-semester programme doesn't
  // squash bars into invisible slivers. Each bar gets a comfortable slot
  // width with sensible min/max, and the SVG can horizontally scroll if it
  // overflows on small screens.
  const padL  = 56;   // room for rotated Y-axis title + % labels
  const padR  = 20;
  const padT  = 40;   // room for year-grouping band above the plot
  const padB  = 78;   // room for stacked "Sem N / Y1" axis labels
  const minSlot = 60;
  const maxSlot = 110;
  const n = points.length;
  const slot   = Math.min(maxSlot, Math.max(minSlot, Math.floor(560 / Math.max(1, n))));
  const innerW = slot * n;
  const W      = padL + padR + innerW;
  const H      = 270;
  const innerH = H - padT - padB;

  const risks = points.map(p => p.res.risk * 100);
  const maxR = 100;
  const barWidth = Math.max(18, Math.min(46, slot * 0.55));
  const bars = points.map((p, i) => {
    const slotCenter = padL + slot * i + slot / 2;
    const r = p.res.risk * 100;
    const barH = (r / maxR) * innerH;
    const x = slotCenter - barWidth / 2;
    const y = padT + innerH - barH;
    const meta = parsePeriod(p.periodLabel, p.periodIndex);
    return { x, y, w: barWidth, h: barH, r, slotCenter, p, meta, slotLeft: padL + slot * i, slotRight: padL + slot * (i + 1) };
  });

  // ── Group consecutive bars by yearNum → year-band rectangles above the plot.
  const yearGroups = [];
  bars.forEach((b, i) => {
    const yn = b.meta.yearNum;
    const last = yearGroups[yearGroups.length - 1];
    if (last && last.yearNum === yn) {
      last.right  = b.slotRight;
      last.count += 1;
    } else {
      yearGroups.push({ yearNum: yn, left: b.slotLeft, right: b.slotRight, count: 1 });
    }
  });

  const firstR = risks[0];
  const lastR  = risks[risks.length - 1];
  const delta  = lastR - firstR;
  const avgR   = risks.reduce((s, v) => s + v, 0) / risks.length;
  const avgY   = padT + innerH - (avgR / maxR) * innerH;

  // Year-band palette — alternates so adjacent years stay visually distinct.
  const yearPalette = [
    { fill:"rgba(59,130,246,.10)",  stroke:"rgba(59,130,246,.45)",  text:"#60a5fa" },  // blue
    { fill:"rgba(168,85,247,.10)",  stroke:"rgba(168,85,247,.45)",  text:"#c084fc" },  // purple
    { fill:"rgba(245,158,11,.10)",  stroke:"rgba(245,158,11,.45)",  text:"#fbbf24" },  // amber
    { fill:"rgba(20,184,166,.10)",  stroke:"rgba(20,184,166,.45)",  text:"#5eead4" },  // teal
    { fill:"rgba(244,114,182,.10)", stroke:"rgba(244,114,182,.45)", text:"#f9a8d4" },  // pink
    { fill:"rgba(148,163,184,.10)", stroke:"rgba(148,163,184,.45)", text:"#cbd5e1" },  // slate (unknown)
  ];
  const palFor = (g, gi) => {
    if (g.yearNum == null) return yearPalette[5];
    return yearPalette[(g.yearNum - 1) % 5];
  };

  return (
    <Card>
      <CardHeader title="Risk trend across semesters" action={
        <span style={{ fontSize:11, color:"var(--tx3)" }}>
          Programme checkpoints: <strong style={{ color:"var(--tx2)" }}>{totalSemesters || "—"}</strong> semesters
        </span>
      } />
      <div style={{ fontSize:12, color:"var(--tx3)", marginBottom:12, lineHeight:1.6 }}>
        Each bar is one semester's predicted dropout risk, grouped by academic year.
        {" "}<span style={{ color:"var(--green)", fontWeight:600 }}>Green</span> = Not at Risk,
        {" "}<span style={{ color:"var(--red)", fontWeight:600 }}>red</span> = At Risk.
        {points.length >= 2 && (
          <span> Latest vs first: <strong style={{ color: delta > 1 ? "var(--red)" : delta < -1 ? "var(--green)" : "var(--amber)" }}>{delta > 0 ? "+" : ""}{delta.toFixed(1)}%</strong> · average: <strong style={{ color:"var(--tx2)" }}>{avgR.toFixed(1)}%</strong>.</span>
        )}
      </div>
      <div style={{ overflowX:"auto" }}>
        <svg width={W} height={H} style={{ display:"block", margin:"0 auto", maxWidth:"100%", minWidth: Math.min(W, 380) }}>
          <defs>
            <linearGradient id="barRisk" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#ef4444" stopOpacity={0.95} />
              <stop offset="100%" stopColor="#b91c1c" stopOpacity={0.85} />
            </linearGradient>
            <linearGradient id="barSafe" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#10b981" stopOpacity={0.95} />
              <stop offset="100%" stopColor="#047857" stopOpacity={0.85} />
            </linearGradient>
          </defs>

          {/* Plot background */}
          <rect x={0} y={0} width={W} height={H} fill="rgba(255,255,255,.02)" rx={10} />

          {/* ── Year-grouping band (top): one pill per academic year ─────────── */}
          {yearGroups.map((g, gi) => {
            const pal = palFor(g, gi);
            const w   = g.right - g.left;
            const cx  = g.left + w / 2;
            const yTop = 8;
            const yH   = 22;
            const label = g.yearNum != null ? `YEAR ${g.yearNum}` : "YEAR ?";
            const sub   = g.count === 1 ? "1 semester" : `${g.count} semesters`;
            return (
              <g key={`yb-${gi}`}>
                <rect x={g.left + 2} y={yTop} width={Math.max(0, w - 4)} height={yH}
                      rx={6} ry={6}
                      fill={pal.fill} stroke={pal.stroke} strokeWidth={1} />
                <text x={cx} y={yTop + 14}
                      fontSize={11} fontWeight={800}
                      fill={pal.text} textAnchor="middle"
                      fontFamily="var(--mono)" style={{ letterSpacing:".08em" }}>
                  {label}
                </text>
                {w >= 70 && (
                  <text x={cx} y={yTop + 14 + 11}
                        fontSize={8} fill="var(--tx3)"
                        textAnchor="middle" fontFamily="var(--mono)">
                    {sub}
                  </text>
                )}
              </g>
            );
          })}

          {/* Light vertical separators between year groups */}
          {yearGroups.slice(0, -1).map((g, gi) => (
            <line key={`ysep-${gi}`}
                  x1={g.right} y1={padT}
                  x2={g.right} y2={padT + innerH}
                  stroke="var(--bdr)" strokeWidth={1} strokeDasharray="2 4" opacity={0.6} />
          ))}

          {/* ── Y-axis title (rotated) ──────────────────────────────────────── */}
          <text
            transform={`translate(14 ${padT + innerH / 2}) rotate(-90)`}
            fontSize={10} fontWeight={700}
            fill="var(--tx3)" textAnchor="middle"
            fontFamily="var(--mono)" style={{ letterSpacing:".08em" }}>
            DROPOUT RISK (%)
          </text>

          {/* Horizontal grid lines + Y-axis % ticks */}
          {[0, 25, 50, 75, 100].map(t => {
            const y = padT + innerH - (t / maxR) * innerH;
            return (
              <g key={t}>
                <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="var(--bdr)" strokeWidth={1} strokeDasharray="4 4" opacity={0.7} />
                <text x={padL - 6} y={y + 4} fontSize={9} fill="var(--tx3)" fontFamily="var(--mono)" textAnchor="end">{t}%</text>
              </g>
            );
          })}

          {/* Average reference line — only when 2+ bars exist */}
          {points.length >= 2 && (
            <g>
              <line x1={padL} y1={avgY} x2={W - padR} y2={avgY} stroke="#f59e0b" strokeWidth={1.2} strokeDasharray="6 4" opacity={0.85} />
              <text x={W - padR} y={avgY - 4} fontSize={9} fill="#f59e0b" textAnchor="end" fontFamily="var(--mono)">avg {avgR.toFixed(0)}%</text>
            </g>
          )}

          {/* ── Bars + per-bar labels ───────────────────────────────────────── */}
          {bars.map((b, i) => {
            const atRisk = b.p.res.prediction === 1;
            const fill   = atRisk ? "url(#barRisk)" : "url(#barSafe)";
            const semText  = b.meta.semNum  != null ? `Sem ${b.meta.semNum}` : `S${b.p.periodIndex || i + 1}`;
            const yearText = b.meta.yearNum != null ? `Y${b.meta.yearNum}` : "Y?";
            const baseline = padT + innerH;
            const titleText = (b.meta.yearNum != null && b.meta.semNum != null)
              ? `Year ${b.meta.yearNum} · Semester ${b.meta.semNum}${b.meta.acYear ? ` · ${b.meta.acYear}` : ""} — ${b.r.toFixed(1)}% · ${atRisk ? "At Risk" : "Not at Risk"}`
              : `${b.p.periodLabel || `Semester ${b.p.periodIndex || i + 1}`} — ${b.r.toFixed(1)}% · ${atRisk ? "At Risk" : "Not at Risk"}`;
            return (
              <g key={`${b.p.ts}-${i}`}>
                <title>{titleText}</title>
                <rect
                  x={b.x.toFixed(1)} y={b.y.toFixed(1)}
                  width={b.w.toFixed(1)} height={Math.max(2, b.h).toFixed(1)}
                  rx={4} ry={4}
                  fill={fill}
                  stroke={atRisk ? "#fca5a5" : "#86efac"}
                  strokeWidth={1}
                />
                {/* Risk-% label on top of each bar */}
                <text
                  x={b.slotCenter} y={Math.max(padT + 10, b.y - 4)}
                  fontSize={10} fontWeight={700}
                  fill={atRisk ? "var(--red)" : "var(--green)"}
                  textAnchor="middle" fontFamily="var(--mono)"
                >{b.r.toFixed(0)}%</text>

                {/* Per-bar X-axis labels — stacked: "Sem N" (bold) over "Y1" (muted) over RISK/SAFE pill */}
                <text
                  x={b.slotCenter} y={baseline + 14}
                  fontSize={11} fontWeight={700}
                  fill="var(--tx2)"
                  textAnchor="middle" fontFamily="var(--mono)"
                >{semText}</text>
                <text
                  x={b.slotCenter} y={baseline + 28}
                  fontSize={9} fontWeight={600}
                  fill="var(--tx3)"
                  textAnchor="middle" fontFamily="var(--mono)"
                  style={{ letterSpacing:".05em" }}
                >{yearText}</text>
                <text
                  x={b.slotCenter} y={baseline + 44}
                  fontSize={8} fontWeight={700}
                  fill={atRisk ? "#ef4444" : "#10b981"}
                  textAnchor="middle" fontFamily="var(--mono)"
                  style={{ textTransform:"uppercase", letterSpacing:".06em" }}
                >{atRisk ? "RISK" : "SAFE"}</text>
              </g>
            );
          })}

          {/* Baseline */}
          <line x1={padL} y1={padT + innerH} x2={W - padR} y2={padT + innerH} stroke="var(--bdr)" strokeWidth={1.4} />

          {/* X-axis title */}
          <text
            x={padL + innerW / 2} y={H - 6}
            fontSize={10} fontWeight={700}
            fill="var(--tx3)" textAnchor="middle"
            fontFamily="var(--mono)" style={{ letterSpacing:".08em" }}>
            SEMESTER · YEAR (oldest → newest)
          </text>
        </svg>
      </div>

      {/* Compact legend below the chart */}
      <div style={{ display:"flex", gap:14, marginTop:8, flexWrap:"wrap", fontSize:11, color:"var(--tx3)", justifyContent:"center" }}>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <span style={{ display:"inline-block", width:12, height:12, borderRadius:3, background:"linear-gradient(180deg,#10b981,#047857)" }}></span>
          Not at Risk
        </span>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <span style={{ display:"inline-block", width:12, height:12, borderRadius:3, background:"linear-gradient(180deg,#ef4444,#b91c1c)" }}></span>
          At Risk
        </span>
        {points.length >= 2 && (
          <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
            <span style={{ display:"inline-block", width:14, height:2, background:"#f59e0b" }}></span>
            Average risk
          </span>
        )}
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <span style={{ display:"inline-block", width:12, height:12, borderRadius:3, background:"rgba(59,130,246,.25)", border:"1px solid rgba(59,130,246,.45)" }}></span>
          Year groupings
        </span>
      </div>
    </Card>
  );
};

// ─── PREDICTION HISTORY TABLE ─────────────────────────────────────────────────
const PredHistoryTable = ({ history, title="Prediction History", onDelete }) => {
  const [filter, setFilter] = useState("");
  const filtered = filter ? history.filter(h => filter==="risk"?h.res.prediction===1:h.res.prediction===0) : history;
  const cols = ["Time","Period","Name","GPA","Fin.","Result","Risk%","By", ...(onDelete?["Action"]:[])];
  return (
    <div style={S.col(14)}>
      <div style={S.flex(10,"center")}>
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{ width:"auto" }}>
          <option value="">All Results</option>
          <option value="risk">At Risk Only</option>
          <option value="safe">Safe Only</option>
        </select>
        <span style={{ fontSize:12, color:"var(--tx3)", marginLeft:"auto" }}>{filtered.length} records</span>
      </div>
      <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:12, background:"var(--sur)" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr style={{ background:"var(--sur2)" }}>
              {cols.map(h=>(
                <th key={h} style={{ padding:"9px 12px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:"0.09em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((h,i) => {
              const ir = h.res.prediction === 1;
              return (
                <tr key={`${h.ts}-${i}`} style={{ borderBottom:"1px solid var(--bdr)" }}>
                  <td style={{ padding:"10px 12px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{new Date(h.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"var(--tx2)", maxWidth:140 }}>{h.periodLabel || "—"}</td>
                  <td style={{ padding:"10px 12px", fontWeight:600 }}>{h.student.name||"—"}</td>
                  <td style={{ padding:"10px 12px", fontFamily:"var(--mono)" }}>{h.student.gpa ?? "—"}</td>
                  <td style={{ padding:"10px 12px" }}><FinBadge fin={h.student.fin} /></td>
                  <td style={{ padding:"10px 12px" }}><RiskBadge risk={h.res.prediction} /></td>
                  <td style={{ padding:"10px 12px", fontFamily:"var(--mono)", fontWeight:700, color: ir?"var(--red)":"var(--green)" }}>{(h.res.risk*100).toFixed(1)}%</td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"var(--tx3)" }}>{h.by||"—"}</td>
                  {onDelete && (
                    <td style={{ padding:"6px 12px" }}>
                      <Btn size="sm" variant="danger" title="Delete Prediction" onClick={() => {
                        if(window.confirm(`Delete this prediction for ${h.student?.name}?`)) onDelete(h.ts);
                      }}>
                        <i className="fa fa-trash"></i>
                      </Btn>
                    </td>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0 && <Empty icon={<i className="fa fa-clipboard" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No predictions yet." />}
      </div>
    </div>
  );
};

// ─── STUDENT DASHBOARD ────────────────────────────────────────────────────────
const StudentDashboard = ({ page, setPage, students, setStudents, predHistory, addPred, setPredHist, interventions=[], globalSearch="", setGlobalSearch, addAudit }) => {
  const { user, updateUser } = useContext(AuthCtx);
  const myData = students.find(s =>
    s.id === user.studentId ||
    s.id === user.id ||
    s.sid === user.sid ||
    s.sid === user.studentId ||
    (s.name && user.name && s.name.toLowerCase().trim() === user.name.toLowerCase().trim())
  ) || null;
  // Use the actual student record ID for matching predictions/interventions
  const myId = myData?.id ?? user.studentId;
  const myPreds = predHistory.filter(h =>
    h.studentId === myId ||
    h.studentId === user.studentId ||
    h.studentId === user.id ||
    h.studentId === user.sid ||
    (h.student?.name && user.name && h.student.name.toLowerCase().trim() === user.name.toLowerCase().trim())
  );
  const { settings } = useContext(SettingsCtx) || { settings: DEFAULT_SETTINGS };
  const courseYears = Math.min(6, Math.max(1, parseInt(myData?.courseYears ?? settings?.defaultCourseYears ?? 3, 10) || 3));
  const totalSemCheckpoints = totalCourseSemesters(courseYears);
  const maxPeriodDone = myPreds.reduce((m, h) => Math.max(m, h.periodIndex || 0), 0);
  const latestPred = myPreds[0];
  const myInterventions = interventions.filter(i =>
    i.studentId === myId ||
    i.studentId === user.studentId ||
    i.studentId === user.id ||
    i.studentId === user.sid ||
    (i.studentName && user.name && i.studentName.toLowerCase().trim() === user.name.toLowerCase().trim())
  );
  const [submitMsg, setSubmitMsg] = useState("");
  const [submitErr, setSubmitErr] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [editingFactors, setEditingFactors] = useState(false);
  const [slipVerification, setSlipVerification] = useState({ status:"idle", message:"Not verified yet.", confidence:0 });
  const [studentForm, setStudentForm] = useState({
    feesLevel: String(myData?.feesLevel ?? "1"),
    familyBackground: String(myData?.familyBackground ?? "1"),
    workingStatus: String(myData?.workingStatus ?? "0"),
    courseChoice: String(myData?.courseChoice ?? "1"),
    age: String(myData?.age ?? ""),
    homeResponsibility: String(myData?.homeResponsibility ?? "1"),
    hasHealthIssue: String(myData?.hasHealthIssue ?? "0"),
    medicalFormSubmitted: String(myData?.medicalFormSubmitted ?? "0"),
    semesterResultSubmitted: String(myData?.semesterResultSubmitted ?? "0"),
    medicalFormFile: myData?.medicalFormFile || null,
    semesterResultFile: myData?.semesterResultFile || null,
  });
  useEffect(() => {
    setStudentForm({
      feesLevel: String(myData?.feesLevel ?? "1"),
      familyBackground: String(myData?.familyBackground ?? "1"),
      workingStatus: String(myData?.workingStatus ?? "0"),
      courseChoice: String(myData?.courseChoice ?? "1"),
      age: String(myData?.age ?? ""),
      homeResponsibility: String(myData?.homeResponsibility ?? "1"),
      hasHealthIssue: String(myData?.hasHealthIssue ?? "0"),
      medicalFormSubmitted: String(myData?.medicalFormSubmitted ?? "0"),
      semesterResultSubmitted: String(myData?.semesterResultSubmitted ?? "0"),
      medicalFormFile: myData?.medicalFormFile || null,
      semesterResultFile: myData?.semesterResultFile || null,
    });
  }, [myData?.id]);
  const updStudentForm = (k, v) => setStudentForm(prev => ({ ...prev, [k]: v }));

  const [academicDraft, setAcademicDraft] = useState({ year: "Year 1", semesterInYear: 1, courseYears: 3 });
  const [academicSaveMsg, setAcademicSaveMsg] = useState("");
  useEffect(() => {
    if (!myData) return;
    setAcademicDraft({
      year: (myData.year && String(myData.year).trim()) || user.year || "Year 1",
      semesterInYear: studentSemesterInYear(myData),
      // Programme length is now editable from the dashboard so a Law/Engineering
      // student who registered with the default 3-year track can extend their
      // checkpoints without re-creating an account.
      courseYears: Math.min(6, Math.max(3, parseInt(myData?.courseYears ?? user?.courseYears ?? settings?.defaultCourseYears ?? 3, 10) || 3)),
    });
  }, [myData?.id, myData?.year, myData?.semesterInYear, myData?.courseYears, user?.year, user?.semesterInYear, user?.courseYears, settings?.defaultCourseYears]);

  const saveAcademicPosition = () => {
    if (!myData?.id) return;
    const year = academicDraft.year || "Year 1";
    const semesterInYear = academicDraft.semesterInYear === 2 ? 2 : 1;
    const courseYears = Math.min(6, Math.max(3, parseInt(academicDraft.courseYears, 10) || 3));
    // Defensive: if the chosen year of study doesn't fit the chosen programme
    // length (e.g. Year 5 selected then programme length lowered to 3), bail
    // out with a clear message instead of silently saving a broken state.
    const chosenYearNum = parseYearOfStudy(year);
    if(year !== "Postgraduate" && chosenYearNum > courseYears) {
      setAcademicSaveMsg(`Year ${chosenYearNum} doesn't fit a ${courseYears}-year programme. Please adjust either field.`);
      setTimeout(() => setAcademicSaveMsg(""), 4500);
      return;
    }
    setStudents(prev => {
      const next = prev.map(s => s.id === myData.id ? { ...s, year, semesterInYear, courseYears } : s);
      lsSet("dai_s", next);
      return next;
    });
    updateUser({ year, semesterInYear, courseYears });
    setAcademicSaveMsg("Academic position saved.");
    setTimeout(() => setAcademicSaveMsg(""), 2800);
    addAudit?.({ action:`Student updated programme: ${year} · Sem ${semesterInYear} · ${courseYears}-year track`, target: myData.name || user.name, by: user.name });
  };

  // ── Advance to the next semester so the student keeps a continuous, per
  //    semester prediction history on the SAME account. From Sem 1 → Sem 2
  //    of the same year, and from Sem 2 → Sem 1 of the next year. Final
  //    semester is treated as the end of programme.
  const advanceToNextSemester = () => {
    if(!myData?.id) return;
    const courseYears = Math.min(6, Math.max(1, parseInt(myData?.courseYears ?? settings?.defaultCourseYears ?? 3, 10) || 3));
    const totalSemCheckpointsLocal = totalCourseSemesters(courseYears);
    const meta = buildPeriodMeta({
      yearOfStudy: myData.year || user.year,
      semesterInYear: studentSemesterInYear(myData) || studentSemesterInYear(user),
      academicYearLabel: settings?.academicYear || "",
      courseYears,
    });
    if(meta.periodIndex >= totalSemCheckpointsLocal) {
      setSubmitMsg("You have completed the final semester of your programme. No further semester submissions are needed.");
      setTimeout(() => setSubmitMsg(""), 6000);
      return;
    }
    let nextYearStr;
    let nextSem;
    if(meta.semesterInYear === 1) {
      nextYearStr = `Year ${meta.yearOfStudy}`;
      nextSem = 2;
    } else {
      nextYearStr = `Year ${Math.min(courseYears, meta.yearOfStudy + 1)}`;
      nextSem = 1;
    }
    setAcademicDraft({ year: nextYearStr, semesterInYear: nextSem });
    setStudents(prev => {
      const next = prev.map(s => s.id === myData.id ? { ...s, year: nextYearStr, semesterInYear: nextSem } : s);
      lsSet("dai_s", next);
      return next;
    });
    updateUser({ year: nextYearStr, semesterInYear: nextSem });
    setEditingFactors(true);                  // immediately open the form for fresh input
    setSubmitMsg(`Advanced to ${nextYearStr} · Sem ${nextSem}. Review and resubmit your factors to generate this semester's prediction.`);
    setTimeout(() => setSubmitMsg(""), 7000);
    addAudit?.({ action:`Student advanced to ${nextYearStr} · Sem ${nextSem}`, target: myData.name || user.name, by: user.name });
  };

  // Period meta + per-semester progress summary used by the dashboard card.
  const studentCourseYearsLocal = Math.min(6, Math.max(1, parseInt(myData?.courseYears ?? settings?.defaultCourseYears ?? 3, 10) || 3));
  const studentPeriodMetaLocal = buildPeriodMeta({
    yearOfStudy: myData?.year || user?.year || "Year 1",
    semesterInYear: studentSemesterInYear(myData) || studentSemesterInYear(user),
    academicYearLabel: settings?.academicYear || "",
    courseYears: studentCourseYearsLocal,
  });
  const submittedPeriodIndexes = new Set((myPreds || []).map(h => h.periodIndex).filter(Boolean));
  const currentSemesterSubmitted = submittedPeriodIndexes.has(studentPeriodMetaLocal.periodIndex);
  const semestersDone   = submittedPeriodIndexes.size;
  const semestersTotal  = studentPeriodMetaLocal.totalSemesters;
  const semestersRemaining = Math.max(0, semestersTotal - semestersDone);
  const programmeFinished = studentPeriodMetaLocal.periodIndex >= semestersTotal && currentSemesterSubmitted;

  const academicPositionCard = (() => {
    // Year options are derived from the chosen programme length so a Law
    // (5-year) or Medicine (6-year) student sees Year 5 / Year 6 options. A
    // standard 3-year Bachelor's student still only sees Year 1–3.
    const draftCy = Math.min(6, Math.max(3, parseInt(academicDraft.courseYears, 10) || 3));
    const ordinal = ["1st","2nd","3rd","4th","5th","6th"];
    const yearOptions = [];
    for(let i = 1; i <= draftCy; i++) {
      yearOptions.push(<option key={i} value={`Year ${i}`}>{`Year ${i} (${ordinal[i-1]} year)`}</option>);
    }
    return (
      <Card>
        <CardHeader
          title="Your academic position"
          action={
            <span style={{ fontSize:11, color:"var(--tx3)" }}>
              <i className="fa fa-graduation-cap" style={{marginRight:4}}></i>
              {studentPeriodMetaLocal.periodLabel} · {semestersDone}/{semestersTotal} semester{semestersTotal===1?"":"s"} submitted
            </span>
          }
        />
        <div style={{ fontSize:12, color:"var(--tx3)", marginBottom:12, lineHeight:1.6 }}>
          Set your programme length once, then update your current year and semester each time you progress. Every semester, resubmit your factors — the system uses the <strong>same account</strong> for your entire programme and adds a new prediction to your trend each time.
        </div>
        <div style={S.grid("repeat(auto-fit, minmax(160px, 1fr))", 12)}>
          <FieldGroup
            label="Programme length"
            help="Pick the full length of your degree (e.g. 5 years for Law, 6 for Medicine)."
          >
            <select value={academicDraft.courseYears} onChange={e => {
              const cy = parseInt(e.target.value, 10) || 3;
              setAcademicDraft(d => {
                const chosenNum = parseYearOfStudy(d.year);
                // If switching to a shorter programme leaves the current year
                // out of range, snap year back to Year 1 so the form stays
                // internally consistent.
                const nextYear = (d.year && d.year !== "Postgraduate" && chosenNum > cy)
                  ? "Year 1"
                  : d.year;
                return { ...d, courseYears: cy, year: nextYear };
              });
            }}>
              <option value={3}>3 years</option>
              <option value={4}>4 years</option>
              <option value={5}>5 years</option>
              <option value={6}>6 years</option>
            </select>
          </FieldGroup>
          <FieldGroup label="Year of study">
            <select value={academicDraft.year} onChange={e => setAcademicDraft(d => ({ ...d, year: e.target.value }))}>
              {yearOptions}
              <option value="Postgraduate">Postgraduate</option>
            </select>
          </FieldGroup>
          <FieldGroup label="Semester">
            <select value={academicDraft.semesterInYear} onChange={e => setAcademicDraft(d => ({ ...d, semesterInYear: +e.target.value }))}>
              <option value={1}>Semester 1</option>
              <option value={2}>Semester 2</option>
            </select>
          </FieldGroup>
        </div>
        <div style={{ fontSize:11, color:"var(--tx3)", marginTop:4, marginBottom:10, lineHeight:1.5 }}>
          <i className="fa fa-info-circle" style={{ marginRight:4 }}></i>
          A <strong>{draftCy}-year</strong> programme has <strong>{totalCourseSemesters(draftCy)}</strong> semester checkpoints. Each semester you submit factors, a new prediction is added to your trend.
        </div>
        <div style={{ marginTop:6, flexWrap:"wrap", ...S.flex(10, "center", "flex-start") }}>
          <Btn size="sm" onClick={saveAcademicPosition} style={{ background:"#0ea5e9" }}><i className="fa fa-save"></i> Save position</Btn>
          <Btn
            size="sm"
            variant="ghost"
            onClick={advanceToNextSemester}
            disabled={programmeFinished}
            title={programmeFinished ? "You have completed all semesters of your programme." : "Roll the period forward and open the factors form for the new semester."}
          >
            <i className="fa fa-arrow-right"></i> Start next semester
          </Btn>
          {academicSaveMsg ? (
            <span style={{ fontSize:12, color: academicSaveMsg.includes("doesn't fit") ? "var(--red)" : "var(--green)" }}>{academicSaveMsg}</span>
          ) : null}
        </div>
      </Card>
    );
  })();

  // ── Continuous per-semester tracker — shows what's been submitted across
  //    the whole programme so the student understands they keep ONE account
  //    and add a new prediction each semester.
  const semesterCheckpoints = Array.from({ length: semestersTotal }, (_, i) => {
    const idx = i + 1;
    const y = Math.ceil(idx / SEMESTERS_PER_YEAR);
    const sem = ((idx - 1) % SEMESTERS_PER_YEAR) + 1;
    const submitted = submittedPeriodIndexes.has(idx);
    const isCurrent = idx === studentPeriodMetaLocal.periodIndex;
    return { idx, y, sem, submitted, isCurrent };
  });
  const continuousTrackerCard = (
    <Card>
      <CardHeader
        title="Continuous semester predictions"
        action={
          <span style={{ fontSize:11, color:"var(--tx3)" }}>
            <i className="fa fa-history" style={{marginRight:4}}></i>
            Same account · 1 prediction per semester
          </span>
        }
      />
      <div style={{ fontSize:12, color:"var(--tx3)", marginBottom:14, lineHeight:1.6 }}>
        Each semester, submit your latest factors and the AI logs a fresh prediction under the <strong>same account you created at registration</strong> — no need to sign up again. The dots below show every semester checkpoint of your programme.
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:12 }}>
        {semesterCheckpoints.map(({ idx, y, sem, submitted, isCurrent }) => (
          <div key={idx}
            title={submitted ? `Year ${y} · Sem ${sem} — prediction recorded` : isCurrent ? `Year ${y} · Sem ${sem} — current semester, submit your factors` : `Year ${y} · Sem ${sem} — upcoming`}
            style={{
              padding:"6px 10px",
              borderRadius:10,
              fontSize:11,
              fontWeight:700,
              fontFamily:"var(--mono)",
              letterSpacing:"0.03em",
              border:`1px solid ${submitted ? "rgba(16,185,129,.4)" : isCurrent ? "rgba(14,165,233,.4)" : "var(--bdr)"}`,
              background: submitted ? "rgba(16,185,129,.1)" : isCurrent ? "rgba(14,165,233,.12)" : "var(--sur2)",
              color: submitted ? "var(--green)" : isCurrent ? "#0ea5e9" : "var(--tx3)",
              display:"inline-flex", alignItems:"center", gap:6,
            }}>
            <i className={`fa fa-${submitted ? "check-circle" : isCurrent ? "dot-circle-o" : "circle-o"}`}></i>
            Y{y}·S{sem}
          </div>
        ))}
      </div>
      <div style={{ ...S.grid("repeat(3,1fr)",10), marginBottom:14 }}>
        <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:12, textAlign:"center" }}>
          <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:800, color:"var(--green)" }}>{semestersDone}</div>
          <div style={S.label}>Submitted</div>
        </div>
        <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:12, textAlign:"center" }}>
          <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:800, color:"#0ea5e9" }}>{semestersTotal}</div>
          <div style={S.label}>Programme total</div>
        </div>
        <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:12, textAlign:"center" }}>
          <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:800, color:"var(--amber)" }}>{semestersRemaining}</div>
          <div style={S.label}>Remaining</div>
        </div>
      </div>
      <div style={{
        background: programmeFinished ? "rgba(16,185,129,.08)" : currentSemesterSubmitted ? "rgba(245,158,11,.08)" : "rgba(14,165,233,.08)",
        border: `1px solid ${programmeFinished ? "rgba(16,185,129,.3)" : currentSemesterSubmitted ? "rgba(245,158,11,.3)" : "rgba(14,165,233,.3)"}`,
        borderRadius:10, padding:"10px 14px", fontSize:12,
        color: programmeFinished ? "var(--green)" : currentSemesterSubmitted ? "var(--amber)" : "#0ea5e9",
        lineHeight:1.6,
        display:"flex", alignItems:"flex-start", gap:8,
      }}>
        <i className={`fa fa-${programmeFinished ? "trophy" : currentSemesterSubmitted ? "arrow-right" : "bell"}`} style={{marginTop:2}}></i>
        <span>
          {programmeFinished
            ? <><strong>Programme complete.</strong> You've submitted factors for every semester — no further submissions required.</>
            : currentSemesterSubmitted
              ? <><strong>{studentPeriodMetaLocal.periodLabel}</strong> already has a prediction. When the next semester starts, click <em>Start next semester</em> above to update your factors and add the next prediction to your trend.</>
              : <><strong>Action needed:</strong> submit your factors for <strong>{studentPeriodMetaLocal.periodLabel}</strong> to record this semester's prediction. Use the form below.</>}
        </span>
      </div>
    </Card>
  );
  const toDataUrl = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => resolve(ev.target.result);
    reader.onerror = () => reject(new Error("Failed to read file"));
    reader.readAsDataURL(file);
  });
  const loadScriptOnce = (src, globalName) => new Promise((resolve, reject) => {
    if(window[globalName]) { resolve(window[globalName]); return; }
    const existing = document.querySelector(`script[data-src="${src}"]`);
    if(existing) {
      existing.addEventListener("load", () => resolve(window[globalName]));
      existing.addEventListener("error", () => reject(new Error("Script load failed")));
      return;
    }
    const s = document.createElement("script");
    s.src = src;
    s.async = true;
    s.dataset.src = src;
    s.onload = () => resolve(window[globalName]);
    s.onerror = () => reject(new Error("Script load failed"));
    document.head.appendChild(s);
  });
  const scoreAcademicSlipText = (text) => {
    const t = String(text || "").toLowerCase();
    const keywords = ["semester", "result", "transcript", "gpa", "cgpa", "course", "student", "university", "grade"];
    const keywordHits = keywords.filter(k => t.includes(k)).length;
    const hasCourseCodes = /[a-z]{2,4}\s?-?\d{3,4}/i.test(t);
    const hasGrades = /\b(a|a-|b\+|b|b-|c\+|c|c-|d|f)\b/i.test(t);
    const hasGpa = /\b(cgpa|gpa|sgpa)\b/i.test(t);
    let score = keywordHits;
    if(hasCourseCodes) score += 2;
    if(hasGrades) score += 2;
    if(hasGpa) score += 2;
    const confidence = Math.min(99, Math.round((score / 12) * 100));
    const ok = score >= 5;
    return { ok, confidence };
  };
  const verifyAcademicSlip = async (file, dataUrl) => {
    const name = (file.name || "").toLowerCase();
    let extractedText = "";
    if(file.type === "application/pdf") {
      const buf = await file.arrayBuffer();
      // Lightweight PDF text scan (works for many digital PDFs).
      const decoder = new TextDecoder("latin1");
      extractedText = decoder.decode(buf).replace(/[^\x20-\x7E\n\r\t]/g, " ");
    } else if(file.type.startsWith("image/")) {
      try {
        const Tesseract = await loadScriptOnce("https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js", "Tesseract");
        if(Tesseract?.recognize) {
          const out = await Tesseract.recognize(dataUrl, "eng");
          extractedText = out?.data?.text || "";
        }
      } catch {
        extractedText = "";
      }
    }
    const base = scoreAcademicSlipText(extractedText);
    const nameBoost = /(semester|result|transcript|slip|report|gpa)/i.test(name) ? 8 : 0;
    const confidence = Math.min(99, base.confidence + nameBoost);
    const ok = base.ok || confidence >= 60;
    return {
      ok,
      confidence,
      message: ok
        ? `Academic slip detected (${confidence}% confidence).`
        : "Could not confidently detect an academic result slip. Upload a clearer/official semester result PDF or image.",
    };
  };
  const readUpload = async (file, key) => {
    const okType = ["application/pdf", "image/png", "image/jpeg", "image/jpg", "image/webp"];
    if(!file) return;
    if(!okType.includes(file.type)) { setSubmitErr("Only PDF or image files are allowed."); return; }
    if(file.size > 5 * 1024 * 1024) { setSubmitErr("Each upload must be under 5MB."); return; }
    try {
      const dataUrl = await toDataUrl(file);
      updStudentForm(key, { name: file.name, type: file.type, size: file.size, data: dataUrl });
      setSubmitErr("");
      if(key === "semesterResultFile") {
        setSlipVerification({ status:"checking", message:"Verifying academic slip…", confidence:0 });
        const v = await verifyAcademicSlip(file, dataUrl);
        setSlipVerification({ status: v.ok ? "verified" : "failed", message: v.message, confidence: v.confidence });
      }
    } catch {
      setSubmitErr("Failed to process uploaded file.");
    }
  };
  const hasSubmittedFactors = (s) => !!(s && s.age && s.feesLevel != null && s.familyBackground != null && s.workingStatus != null && s.courseChoice != null && s.homeResponsibility != null && s.hasHealthIssue != null);
  const hasRequiredUploads = !!(studentForm.semesterResultFile);
  // Eagerly compute these flags so the reusable cards (factorsFormCard,
  // mySubmittedFactorsCard) declared below can reference them safely.
  const hasStudentData = myData && myData.gpa > 0;
  const hasStudentSubmission = hasSubmittedFactors(myData) && !!(myData?.semesterResultFile);
  const isNewStudent = !hasStudentData && myPreds.length === 0;
  const saveStudentSubmission = () => {
    setSubmitErr("");
    setSubmitMsg("");
    if(!myData?.id) { setSubmitErr("Student record not found. Contact admin."); return; }
    if(!studentForm.age || +studentForm.age < 21 || +studentForm.age > 80) { setSubmitErr("Age must be between 21 and 80 — university applicants under 21 are not accepted."); return; }
    if(!hasRequiredUploads) { setSubmitErr("Please upload the semester result sheet."); return; }
    setSubmitting(true);
    const feesLevel = +studentForm.feesLevel;
    const workingStatus = +studentForm.workingStatus;
    const courseChoice = +studentForm.courseChoice;
    const homeResponsibility = +studentForm.homeResponsibility;
    const hasHealthIssue = +studentForm.hasHealthIssue;
    const gpa = Math.max(1.5, Math.min(4.0, 4.0 - (feesLevel*0.35 + workingStatus*0.25 + homeResponsibility*0.2 + hasHealthIssue*0.2 + (courseChoice===0 ? 0.2 : 0))));
    const fin = feesLevel;
    const payload = {
      feesLevel,
      familyBackground: +studentForm.familyBackground,
      workingStatus,
      courseChoice,
      age: +studentForm.age,
      homeResponsibility,
      hasHealthIssue,
      medicalFormSubmitted: studentForm.medicalFormFile ? 1 : 0,
      semesterResultSubmitted: 1,
      medicalFormFile: studentForm.medicalFormFile,
      semesterResultFile: studentForm.semesterResultFile,
      gpa, fin,
      studentSubmissionComplete: true,
      submittedAt: new Date().toISOString(),
    };
    // Build a snapshot of the student AFTER this submission so the prediction
    // reflects the just-saved factors (mlPredict consumes the same object).
    const updatedStudent = { ...myData, ...payload };
    setStudents(prev => {
      const next = prev.map(s => s.id === myData.id ? updatedStudent : s);
      lsSet("dai_s", next);
      return next;
    });

    // ── Log a fresh prediction for THIS semester so the student gets a
    //    continuous per-semester history under their original account. The
    //    student keeps the same login forever — they just resubmit each new
    //    semester to add another data point.
    const periodMeta = buildPeriodMeta({
      yearOfStudy: updatedStudent.year || user.year,
      semesterInYear: studentSemesterInYear(updatedStudent) || studentSemesterInYear(user),
      academicYearLabel: settings?.academicYear || "",
      courseYears: updatedStudent.courseYears || settings?.defaultCourseYears || 3,
    });
    const res = mlPredict(updatedStudent);
    const predEntry = {
      res,
      student: {
        name: updatedStudent.name || user.name,
        sid:  updatedStudent.sid  || user.sid,
        dept: updatedStudent.dept || user.dept,
        year: updatedStudent.year || user.year,
        gpa:  updatedStudent.gpa,
        fin:  updatedStudent.fin,
      },
      ts: new Date().toISOString(),
      by: user.name,                     // student self-submitted
      studentId: myData.id,
      periodLabel:    periodMeta.periodLabel,
      periodIndex:    periodMeta.periodIndex,
      totalSemesters: periodMeta.totalSemesters,
      academicYear:   periodMeta.academicYear,
    };
    // Replace an existing entry for the same semester so the history holds
    // exactly one prediction per semester (the latest submission wins).
    if(setPredHist) {
      setPredHist(prev => {
        const withoutCurrent = prev.filter(h =>
          !(h.studentId === myData.id && h.periodIndex === periodMeta.periodIndex)
        );
        const next = [predEntry, ...withoutCurrent];
        lsSet("dai_p", next);
        return next;
      });
    } else if(addPred) {
      addPred(predEntry);
    }

    addAudit?.({
      action: `Semester submission · ${periodMeta.periodLabel} · ${res.prediction===1?"At Risk":"Safe"} (${(res.risk*100).toFixed(1)}%)`,
      target: myData.name || user.name,
      by:     user.name,
    });
    setSubmitting(false);
    setEditingFactors(false);
    setSubmitMsg(`Submission saved for ${periodMeta.periodLabel}. A new prediction has been added to your history — submit again next semester to keep your trend up to date.`);
    setTimeout(() => setSubmitMsg(""), 7000);
  };

  // ── Reusable factors-input form (used on the welcome screen AND on the
  //    regular dashboard when the student clicks "Edit my submitted factors"). ─
  const factorsFormCard = (
    <Card>
      <CardHeader
        title="Submit Dropout Prediction Information"
        action={editingFactors ? (
          <Btn size="sm" variant="ghost" onClick={() => { setEditingFactors(false); setSubmitErr(""); setSubmitMsg(""); }}>
            <i className="fa fa-times" style={{marginRight:4}}></i> Cancel
          </Btn>
        ) : null}
      />
      <div style={{ fontSize:12, color:"var(--tx3)", marginBottom:12, lineHeight:1.6 }}>
        Every field below is fed into the AI model — not just GPA. Update any factor that changed and resubmit. Accepted file formats: PDF, PNG, JPG, WEBP (max 5MB each).
      </div>
      <div style={S.grid("1fr 1fr", 12)}>
        <FieldGroup label="Fees Status" required><select value={studentForm.feesLevel} onChange={e=>updStudentForm("feesLevel",e.target.value)}><option value="0">Stable</option><option value="1">Moderate challenge</option><option value="2">Serious challenge</option></select></FieldGroup>
        <FieldGroup label="Family Background Support" required><select value={studentForm.familyBackground} onChange={e=>updStudentForm("familyBackground",e.target.value)}><option value="0">Strong support</option><option value="1">Average support</option><option value="2">Low support</option></select></FieldGroup>
        <FieldGroup label="Nature of Student (Working?)" required><select value={studentForm.workingStatus} onChange={e=>updStudentForm("workingStatus",e.target.value)}><option value="0">Not working</option><option value="1">Working</option></select></FieldGroup>
        <FieldGroup label="Course Choice" required><select value={studentForm.courseChoice} onChange={e=>updStudentForm("courseChoice",e.target.value)}><option value="1">My choice</option><option value="0">Not my choice</option></select></FieldGroup>
        <FieldGroup label="Age" required>
          <input type="number" min={21} max={80} value={studentForm.age} onChange={e=>updStudentForm("age", e.target.value)} placeholder="21" />
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            For your record only — age contributes a very small share of the prediction. Behavioural factors (working, home responsibility, fees, health, GPA) are what really drive the result.
          </div>
        </FieldGroup>
        <FieldGroup label="Responsibility in Family" required><select value={studentForm.homeResponsibility} onChange={e=>updStudentForm("homeResponsibility",e.target.value)}><option value="0">Low</option><option value="1">Moderate</option><option value="2">High</option></select></FieldGroup>
        <FieldGroup label="Health Issues" required><select value={studentForm.hasHealthIssue} onChange={e=>updStudentForm("hasHealthIssue",e.target.value)}><option value="0">No</option><option value="1">Yes</option></select></FieldGroup>
        <FieldGroup label={Number(studentForm.hasHealthIssue) === 1 ? "Medical Form (PDF/Image)" : "Medical Form (only if you have a health issue)"}>
          <input
            type="file" accept=".pdf,image/*"
            onChange={e => readUpload(e.target.files?.[0], "medicalFormFile")}
            disabled={Number(studentForm.hasHealthIssue) !== 1}
          />
          <div style={{ fontSize:11, color:"var(--tx3)", marginTop:4 }}>
            {Number(studentForm.hasHealthIssue) === 1
              ? (studentForm.medicalFormFile ? `Uploaded: ${studentForm.medicalFormFile.name}` : "Please attach your medical form so we can plan support.")
              : "Not required — you indicated you have no health issue. If that changes, switch \"Health Issues\" to Yes and upload the form here."}
          </div>
        </FieldGroup>
        <FieldGroup label="Semester Result Sheet (PDF/Image)" required>
          <input type="file" accept=".pdf,image/*" onChange={e => readUpload(e.target.files?.[0], "semesterResultFile")} />
          <div style={{ fontSize:11, color:"var(--tx3)", marginTop:4 }}>{studentForm.semesterResultFile ? `Uploaded: ${studentForm.semesterResultFile.name}` : "No file uploaded"}</div>
          <div style={{ fontSize:11, marginTop:4, color:"var(--tx3)" }}>
            Testing mode: any uploaded result slip file is accepted.
          </div>
        </FieldGroup>
      </div>
      {submitErr && <Alert type="error" style={{ marginTop:10 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{submitErr}</Alert>}
      {submitMsg && <Alert type="success" style={{ marginTop:10 }}><i className="fa fa-check-circle" style={{marginRight:6}}></i>{submitMsg}</Alert>}
      <div style={{ marginTop:12, display:"flex", gap:8, flexWrap:"wrap" }}>
        <Btn onClick={saveStudentSubmission} disabled={submitting} style={{ background:"#0ea5e9" }}>
          {submitting ? <><Spinner /> Saving…</> : <><i className="fa fa-upload"></i> {editingFactors ? "Save Updates" : "Submit Information & Enable Prediction"}</>}
        </Btn>
        {editingFactors && (
          <Btn variant="ghost" onClick={() => { setEditingFactors(false); setSubmitErr(""); setSubmitMsg(""); }}>
            Cancel
          </Btn>
        )}
      </div>
    </Card>
  );

  // ── Read-only card listing every factor the student already submitted. Shown
  //    on the regular dashboard so the values never just disappear after save. ─
  const factorRow = (label, value, color = "var(--tx)") => (
    <div key={label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"9px 12px", background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:9, fontSize:13 }}>
      <span style={{ color:"var(--tx3)" }}>{label}</span>
      <span style={{ fontWeight:700, color }}>{value}</span>
    </div>
  );
  const mySubmittedFactorsCard = myData ? (() => {
    const ageVal     = myData.age != null && myData.age !== "" ? Number(myData.age) : null;
    const feesVal    = myData.feesLevel != null ? Number(myData.feesLevel) : null;
    const familyVal  = myData.familyBackground != null ? Number(myData.familyBackground) : null;
    const workVal    = myData.workingStatus != null ? Number(myData.workingStatus) : null;
    const choiceVal  = myData.courseChoice != null ? Number(myData.courseChoice) : null;
    const homeVal    = myData.homeResponsibility != null ? Number(myData.homeResponsibility) : null;
    const healthVal  = myData.hasHealthIssue != null ? Number(myData.hasHealthIssue) : null;
    const submitted  = hasStudentSubmission;
    return (
      <Card>
        <CardHeader
          title="My Submitted Factors"
          action={
            <Btn size="sm" onClick={() => { setEditingFactors(true); setSubmitErr(""); setSubmitMsg(""); }} style={{ background:"#0ea5e9" }}>
              <i className="fa fa-pencil" style={{marginRight:4}}></i> {submitted ? "Edit my factors" : "Complete my factors"}
            </Btn>
          }
        />
        <div style={{ fontSize:12, color:"var(--tx3)", marginBottom:12, lineHeight:1.6 }}>
          {submitted
            ? "These are the values that drive your dropout prediction. Update them whenever your situation changes — every factor is considered, not just GPA."
            : "You haven't yet submitted all the required factors. Click \"Complete my factors\" to enable AI prediction."}
        </div>
        <div style={S.grid("1fr 1fr", 10)}>
          {factorRow("Age",
            ageVal != null ? `${ageVal} yrs` : "—",
            ageVal == null ? "var(--tx3)" : ageVal >= 60 ? "var(--red)" : ageVal >= 45 ? "var(--amber)" : "var(--green)")}
          {factorRow("Fees status",
            feesVal != null ? ["Stable","Moderate","Serious"][feesVal] : "—",
            feesVal == null ? "var(--tx3)" : ["var(--green)","var(--amber)","var(--red)"][feesVal])}
          {factorRow("Family support",
            familyVal != null ? ["Strong","Average","Low"][familyVal] : "—",
            familyVal == null ? "var(--tx3)" : ["var(--green)","var(--amber)","var(--red)"][familyVal])}
          {factorRow("Working while studying",
            workVal != null ? (workVal === 1 ? "Yes" : "No") : "—",
            workVal == null ? "var(--tx3)" : workVal === 1 ? "var(--amber)" : "var(--green)")}
          {factorRow("Course is my choice",
            choiceVal != null ? (choiceVal === 1 ? "Yes" : "No") : "—",
            choiceVal == null ? "var(--tx3)" : choiceVal === 1 ? "var(--green)" : "var(--red)")}
          {factorRow("Responsibility at home",
            homeVal != null ? ["Low","Moderate","High"][homeVal] : "—",
            homeVal == null ? "var(--tx3)" : ["var(--green)","var(--amber)","var(--red)"][homeVal])}
          {factorRow("Health issues",
            healthVal != null ? (healthVal === 1 ? "Yes" : "No") : "—",
            healthVal == null ? "var(--tx3)" : healthVal === 1 ? "var(--red)" : "var(--green)")}
          {factorRow("Medical form",
            myData?.medicalFormFile
              ? "Uploaded"
              : (healthVal === 1 ? "Not uploaded" : "Not required"),
            myData?.medicalFormFile
              ? "var(--green)"
              : (healthVal === 1 ? "var(--amber)" : "var(--tx3)"))}
          {factorRow("Semester result sheet",
            myData?.semesterResultFile ? "Uploaded" : "Not uploaded",
            myData?.semesterResultFile ? "var(--green)" : "var(--red)")}
        </div>
        {submitMsg && (
          <Alert type="success" style={{ marginTop:12 }}>
            <i className="fa fa-check-circle" style={{marginRight:6}}></i>{submitMsg}
          </Alert>
        )}
      </Card>
    );
  })() : null;

  if(page === "my-profile") {
    return (
      <RoleBasedRoute allowed={["student"]}>
        <EditableProfilePage role="student" />
      </RoleBasedRoute>
    );
  }

  if(page === "calendar") return (
    <RoleBasedRoute allowed={["student"]}>
      <CalendarPage />
    </RoleBasedRoute>
  );

  if(page === "my-predictions") return (
    <RoleBasedRoute allowed={["student"]}>
      <div style={S.col(20)}>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-magic" style={{fontSize:18,marginRight:8}}></i>My Predictions</h2>
        <p style={S.sub}>Semester-by-semester history under <strong>one account</strong>. Each time you submit your factors on the dashboard, a new prediction is logged here for the matching semester — no need to create a new account.</p>
        <div style={{ height:1, background:"#000", marginTop:16, marginBottom:4 }} />
        {myPreds.length > 0 && (
          <PredictionTrendChart history={myPreds} totalSemesters={totalSemCheckpoints} />
        )}
        <PredHistoryTable history={myPreds} />
      </div>
    </RoleBasedRoute>
  );

  // keep rest of student dashboard going — dummy branch for old profile rendering

  // Default: my-dashboard
  // hasStudentData / hasStudentSubmission / isNewStudent were computed above so
  // the reusable form/summary cards can use them.
  if(isNewStudent) {
    return (
      <RoleBasedRoute allowed={["student"]}>
        <div style={S.col(20)}>
          {/* Welcome header */}
          <div style={{ ...S.card(28), background:"var(--sur2)", border:"1px solid rgba(14,165,233,.25)", boxShadow:"0 4px 18px rgba(14,165,233,.1)", textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:12 }}><i className="fa fa-graduation-cap"></i></div>
            <div style={{ fontSize:22, fontWeight:800, marginBottom:6 }}>Welcome, {user.name.split(" ")[0]}!</div>
            <div style={{ fontSize:14, color:"var(--tx2)", maxWidth:420, margin:"0 auto", lineHeight:1.7 }}>
              Your account is all set up. Your dashboard will come alive once admin verifies your submitted records.
            </div>
          </div>

          {/* Status steps */}
          <Card>
            <CardHeader title="Getting Started" />
            <div style={S.col(0)}>
              {[
                { step:1, done:true,  icon:<i className="fa fa-check-circle" style={{color:"var(--green)"}}></i>, title:"Account Created",           desc:"You've successfully registered on DropoutAI." },
                { step:2, done:true,  icon:<i className="fa fa-check-circle" style={{color:"var(--green)"}}></i>, title:"Profile Complete",           desc:`${myData?.dept || user.dept} · ${formatStudentPeriodLine(myData, user)} — name and department are locked; you can update year and semester below.` },
                { step:3, done:hasStudentSubmission,  icon: hasStudentSubmission ? <i className="fa fa-check-circle" style={{color:"var(--green)"}}></i> : <i className="fa fa-hourglass-half"></i>, title:"Student Data Submitted", desc: hasStudentSubmission ? "You submitted fees, family background, work status, health form and semester results." : "Fill and submit your required profile + uploads below." },
                { step:4, done:myPreds.length > 0, icon: myPreds.length > 0 ? <i className="fa fa-check-circle" style={{color:"var(--green)"}}></i> : <i className="fa fa-lock"></i>, title:"Prediction Run",        desc: myPreds.length > 0 ? `${myPreds.length} prediction${myPreds.length>1?"s":""} run — latest by ${myPreds[0]?.by}` : "Once data is entered, the AI model will generate your dropout risk prediction." },
                { step:5, done:myPreds.length > 0, icon: myPreds.length > 0 ? <i className="fa fa-check-circle" style={{color:"var(--green)"}}></i> : <i className="fa fa-lock"></i>, title:"View Your Results",      desc: myPreds.length > 0 ? `Risk score: ${(myPreds[0]?.res?.risk*100).toFixed(1)}% — ${myPreds[0]?.res?.prediction===1?"At Risk":"Safe"}. Click My Predictions to see full details.` : "Your risk score, confidence level and personalised recommendations will appear here." },
              ].map(({ step, done, icon, title, desc }) => (
                <div key={step} style={{ display:"flex", gap:14, padding:"14px 0", borderBottom:"1px solid var(--bdr)", opacity: done ? 1 : 0.5 }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background: done ? "rgba(16,185,129,.15)" : "rgba(255,255,255,.04)", border:`1px solid ${done?"rgba(16,185,129,.4)":"var(--bdr)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>{icon}</div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, marginBottom:3, color: done ? "var(--tx)" : "var(--tx3)" }}>{title}</div>
                    <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6 }}>{desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </Card>

          {academicPositionCard}

          {continuousTrackerCard}

          {/* Student submission form (reusable) */}
          {factorsFormCard}

          {/* Info cards row */}
          <div style={S.grid("1fr 1fr 1fr", 16)}>
            <div style={{ ...S.card(20), background:"rgba(14,165,233,.07)", border:"1px solid rgba(14,165,233,.2)" }}>
              <div style={{ fontSize:24, marginBottom:8 }}><i className="fa fa-clipboard"></i></div>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:4 }}>Your Profile</div>
