  { id:"fin2",  cond: s => s.fin === 1,            priority:"medium",  icon:"credit-card",        color:"#f59e0b", category:"Financial",   title:"Scholarship & Bursary Guidance",  desc:"Moderate financial strain detected. Provide list of available scholarships, part-time work opportunities and financial counselling." },
  { id:"age1",  cond: s => Number(s.age) >= 60,    priority:"critical", icon:"user",                color:"#ef4444", category:"Demographic", title:"Mature-Learner Wrap-Around Support", desc:"Student is 60+ — dropout risk rises sharply in this age band. Assign a dedicated mentor, review workload and offer flexible/part-time study options." },
  { id:"age2",  cond: s => Number(s.age) >= 45 && Number(s.age) < 60, priority:"high", icon:"user-circle", color:"#f59e0b", category:"Demographic", title:"Older-Cohort Mentorship",         desc:"Student older than the typical cohort (45–59). Pair with a mentor and check for time-management or work/family conflicts." },
  { id:"age3",  cond: s => Number(s.age) > 0 && Number(s.age) <= 16, priority:"medium", icon:"child", color:"#3b82f6", category:"Demographic", title:"Young-Learner Transition Support", desc:"Student younger than the typical cohort (≤16). Provide transition support and assign an academic mentor." },
  { id:"work1", cond: s => Number(s.workingStatus) === 1, priority:"medium",  icon:"briefcase",      color:"#3b82f6", category:"Lifestyle",   title:"Workload & Time-Management Counselling", desc:"Student is working while studying. Counsel on time management, schedule reviews and possibly a reduced course load." },
  { id:"home1", cond: s => Number(s.homeResponsibility) >= 2, priority:"high", icon:"home",           color:"#f59e0b", category:"Personal",   title:"Heavy Home Responsibility Plan",  desc:"Heavy responsibilities at home. Explore distance/part-time learning or connect with family-support resources." },
  { id:"hlth1", cond: s => Number(s.hasHealthIssue) === 1, priority:"high",   icon:"medkit",           color:"#f59e0b", category:"Wellbeing",   title:"Health Coordination",             desc:"Health issue declared. Coordinate with the university medical centre and academic registrar for accommodations." },
  { id:"docm",  cond: s => Number(s.hasHealthIssue) === 1 && !s.medicalFormFile && Number(s.medicalFormSubmitted) !== 1, priority:"medium", icon:"file-text", color:"#3b82f6", category:"Compliance", title:"Request Medical Form", desc:"Student declared a health issue but has not attached the medical form. Request submission so care planning can begin." },
  { id:"docs",  cond: s => s.semesterResultSubmitted != null && Number(s.semesterResultSubmitted) === 0, priority:"medium", icon:"file-text-o", color:"#3b82f6", category:"Compliance", title:"Request Semester Results", desc:"Last semester result document missing. Follow up with the examinations office." },
  { id:"chc1",  cond: s => Number(s.courseChoice) === 0, priority:"medium",   icon:"compass",         color:"#3b82f6", category:"Academic",    title:"Career-Fit Counselling",          desc:"Programme is not the student's own choice. Schedule career counselling to confirm fit and explore alternatives." },
  { id:"fam1",  cond: s => Number(s.familyBackground) >= 2, priority:"medium", icon:"users",          color:"#3b82f6", category:"Personal",   title:"Welfare & Peer-Mentoring Referral", desc:"Low family-support background. Connect with the student welfare office and peer-mentoring programme." },
  { id:"mul2",  cond: s => (s.fin === 2 && s.gpa < 2.0), priority:"critical", icon:"exclamation-triangle",   color:"#ef4444", category:"Multi-Factor", title:"Financial + Academic Crisis",   desc:"Severe financial hardship combined with low GPA. Coordinate cross-departmental support package: financial aid + academic coaching." },
  { id:"mul3",  cond: s => Number(s.age) >= 50 && s.fin === 2, priority:"critical", icon:"exclamation-triangle", color:"#ef4444", category:"Multi-Factor", title:"Mature + Financial Crisis",      desc:"Older learner in severe financial hardship — extremely high dropout pressure. Combine financial aid, mentorship and a flexible study plan." },
];

const PRIORITY_ORDER = { critical:0, high:1, medium:2, low:3 };
const PRIORITY_LABELS = { critical:["Critical","#ef4444"], high:["High","#f59e0b"], medium:["Medium","#3b82f6"], low:["Low","#10b981"] };

const RecommendedActionsPanel = ({ student, interventions, addIntervention, userName }) => {
  const { addAudit } = useContext(AuditCtx);
  const [done, setDone] = useState(new Set());
  const [logFor, setLogFor] = useState(null);
  const [logNote, setLogNote] = useState("");
  const [logType, setLogType] = useState("Counselling");

  const pred = mlPredict(student);
  const actions = ACTIONS_DB.filter(a => a.cond(student)).sort((a,b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);
  const existingIvs = interventions.filter(iv => iv.studentId === student.id);

  const markDone = (actionId, actionTitle) => {
    setDone(prev => new Set([...prev, actionId]));
    if(addIntervention) {
      addIntervention({ studentId:student.id, student, type:"Academic Counselling", note:`Action completed: ${actionTitle}`, date:new Date().toISOString().split("T")[0], by:userName });
      addAudit?.({ action:`Action marked done: "${actionTitle}"`, target:student.name, by:userName });
    }
  };

  const logIntervention = () => {
    if(!logNote.trim()) return;
    addIntervention?.({ studentId:student.id, student, type:logType, note:logNote.trim(), date:new Date().toISOString().split("T")[0], by:userName });
    addAudit?.({ action:`Intervention logged: "${logType}"`, target:student.name, by:userName });
    setLogFor(null);
    setLogNote("");
  };

  if(actions.length === 0) return (
    <Card>
      <div style={{ textAlign:"center", padding:"28px 16px" }}>
        <div style={{ fontSize:36, marginBottom:10, color:"var(--green)" }}><i className="fa fa-check-circle"></i></div>
        <div style={{ fontSize:15, fontWeight:800, marginBottom:6, color:"var(--green)" }}>No Critical Actions Required</div>
        <div style={{ fontSize:12, color:"var(--tx3)" }}>This student's indicators are within acceptable ranges. Continue routine monitoring.</div>
      </div>
    </Card>
  );

  const criticalCount = actions.filter(a=>a.priority==="critical").length;
  const highCount = actions.filter(a=>a.priority==="high").length;

  return (
    <div style={S.col(16)}>
      {/* Header banner */}
      <div style={{ background: criticalCount > 0 ? "rgba(239,68,68,.07)" : "rgba(245,158,11,.07)", border:`1px solid ${criticalCount > 0 ? "rgba(239,68,68,.25)" : "rgba(245,158,11,.25)"}`, borderRadius:12, padding:"14px 18px", display:"flex", alignItems:"center", gap:14 }}>
        <div style={{ width:44, height:44, borderRadius:10, background: criticalCount > 0 ? "rgba(239,68,68,.15)" : "rgba(245,158,11,.15)", border:`1px solid ${criticalCount > 0 ? "rgba(239,68,68,.3)" : "rgba(245,158,11,.3)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color: criticalCount > 0 ? "var(--red)" : "var(--amber)", flexShrink:0 }}>
          <i className="fa fa-tasks"></i>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:800, marginBottom:3 }}>{actions.length} Recommended Action{actions.length!==1?"s":""} for {student.name.split(" ")[0]}</div>
          <div style={{ fontSize:12, color:"var(--tx3)" }}>
            {criticalCount > 0 && <span style={{ color:"var(--red)", fontWeight:700, marginRight:10 }}>⚠ {criticalCount} Critical</span>}
            {highCount > 0 && <span style={{ color:"var(--amber)", fontWeight:700, marginRight:10 }}>▲ {highCount} High Priority</span>}
            {existingIvs.length > 0 && <span style={{ color:"var(--green)" }}>✓ {existingIvs.length} intervention{existingIvs.length!==1?"s":""} already logged</span>}
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <span style={{ ...S.tag(pred.prediction===1?"#ef4444":"#10b981"), fontSize:11 }}>Risk: {(pred.risk*100).toFixed(0)}%</span>
        </div>
      </div>

      {/* Action cards */}
      <div style={S.col(10)}>
        {actions.map(action => {
          const isDone = done.has(action.id);
          const [prioLabel, prioColor] = PRIORITY_LABELS[action.priority];
          return (
            <div key={action.id} style={{ background:"var(--sur)", border:`1px solid ${isDone ? "rgba(16,185,129,.3)" : action.color+"33"}`, borderLeft:`4px solid ${isDone ? "#10b981" : action.color}`, borderRadius:12, padding:"14px 16px", opacity: isDone ? 0.6 : 1, transition:"all .2s" }}>
              <div style={{ display:"flex", alignItems:"flex-start", gap:14 }}>
                <div style={{ width:36, height:36, borderRadius:9, background:`${isDone ? "#10b981" : action.color}18`, border:`1px solid ${isDone ? "#10b981" : action.color}30`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, color: isDone ? "#10b981" : action.color, flexShrink:0 }}>
                  <i className={`fa fa-${isDone ? "check" : action.icon}`}></i>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5, flexWrap:"wrap" }}>
                    <span style={{ fontSize:13, fontWeight:800 }}>{action.title}</span>
                    <span style={{ ...S.tag(prioColor), fontSize:10 }}>{prioLabel}</span>
                    <span style={{ ...S.tag("#6b7280"), fontSize:10 }}>{action.category}</span>
                    {isDone && <span style={{ ...S.tag("#10b981"), fontSize:10 }}>Done</span>}
                  </div>
                  <div style={{ fontSize:12, color:"var(--tx2)", lineHeight:1.65 }}>{action.desc}</div>
                </div>
                {!isDone && (
                  <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                    <button onClick={() => { setLogFor(action); setLogNote(action.title); }}
                      style={{ padding:"5px 12px", borderRadius:7, border:"1px solid var(--bdr)", background:"var(--sur2)", color:"var(--tx2)", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                      <i className="fa fa-plus" style={{marginRight:5}}></i>Log
                    </button>
                    <button onClick={() => markDone(action.id, action.title)}
                      style={{ padding:"5px 12px", borderRadius:7, border:"1px solid rgba(16,185,129,.4)", background:"rgba(16,185,129,.08)", color:"var(--green)", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                      <i className="fa fa-check" style={{marginRight:5}}></i>Done
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Quick Log Modal */}
      {logFor && (
        <div onClick={() => setLogFor(null)} style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(3px)" }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:14, width:"100%", maxWidth:460, boxShadow:"0 20px 60px rgba(0,0,0,.6)", animation:"fadeUp .2s ease" }}>
            <div style={{ padding:"16px 20px", borderBottom:"1px solid var(--bdr)", display:"flex", alignItems:"center", gap:10 }}>
              <i className="fa fa-clipboard" style={{ fontSize:18, color:"var(--primary,#3b82f6)" }}></i>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:800 }}>Log Intervention</div>
                <div style={{ fontSize:12, color:"var(--tx3)" }}>For: {student.name} · {logFor.title}</div>
              </div>
              <button onClick={() => setLogFor(null)} style={{ width:28, height:28, borderRadius:7, border:"1px solid var(--bdr)", background:"var(--sur2)", cursor:"pointer", fontSize:13, color:"var(--tx2)" }}>✕</button>
            </div>
            <div style={{ padding:"16px 20px" }}>
              <FieldGroup label="Type">
                <select value={logType} onChange={e=>setLogType(e.target.value)}>
                  {INTERVENTION_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </FieldGroup>
              <FieldGroup label="Notes" required>
                <textarea value={logNote} onChange={e=>setLogNote(e.target.value)} style={{ minHeight:80 }} placeholder="Describe the intervention taken…" />
              </FieldGroup>
              <div style={S.flex(8)}>
                <Btn onClick={logIntervention} disabled={!logNote.trim()} style={{ background:"var(--primary,#3b82f6)" }}><i className="fa fa-floppy-o"></i> Save</Btn>
                <Btn variant="ghost" onClick={()=>setLogFor(null)}>Cancel</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── DEPT COMPARISON PAGE ─────────────────────────────────────────────────────
const DeptComparisonPage = ({ students=[], users=[], depts=[] }) => {
  const [sortBy, setSortBy] = useState("risk"); // "risk"|"students"|"gpa"
  const [view, setView] = useState("bar"); // "bar"|"table"

  const allDepts = Array.from(new Set([
    ...depts,
    ...students.map(s=>s.dept),
    ...users.filter(u=>u.role==="admin").map(u=>u.dept)
  ].filter(Boolean)));

  const deptData = allDepts.map(dept => {
    const studs = students.filter(s => s.dept === dept);
    const withData = studs.filter(s => s.gpa > 0);
    const atRisk = withData.filter(s => mlPredict(s).prediction===1);
    const avgGPA = withData.length ? (withData.reduce((a,s)=>a+s.gpa,0)/withData.length) : 0;
    const poorFin = studs.filter(s=>s.fin===2).length;
    const riskRate = withData.length ? (atRisk.length/withData.length*100) : 0;
    return { dept, studs:studs.length, withData:withData.length, atRisk:atRisk.length, avgGPA, poorFin, riskRate };
  });

  const sorted = [...deptData].sort((a,b) => {
    if(sortBy==="risk")     return b.riskRate - a.riskRate;
    if(sortBy==="students") return b.studs - a.studs;
    if(sortBy==="gpa")      return b.avgGPA - a.avgGPA;
    return 0;
  });

  const maxRisk = Math.max(...deptData.map(d=>d.riskRate), 1);
  const maxStudents = Math.max(...deptData.map(d=>d.studs), 1);

  const tabBtn = (v, label) => (
    <button onClick={()=>setSortBy(v)} style={{ padding:"7px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", border:"none", background:sortBy===v?"var(--primary,#f59e0b)":  "var(--sur2)", color:sortBy===v?"#000":"var(--tx2)", transition:"all .15s" }}>{label}</button>
  );

  return (
    <div style={S.col(20)}>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-bar-chart" style={{fontSize:18,marginRight:8}}></i>Department Comparison</h2>
            <p style={S.sub}>Side-by-side comparison of all departments across key dropout indicators.</p>
          </div>
          <div style={S.flex(6)}>
            <button onClick={()=>setView("bar")} style={{ padding:"7px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", border:"none", background:view==="bar"?"var(--primary,#f59e0b)":"var(--sur2)", color:view==="bar"?"#000":"var(--tx2)", transition:"all .15s" }}><i className="fa fa-bar-chart" style={{marginRight:5}}></i>Chart</button>
            <button onClick={()=>setView("table")} style={{ padding:"7px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", border:"none", background:view==="table"?"var(--primary,#f59e0b)":"var(--sur2)", color:view==="table"?"#000":"var(--tx2)", transition:"all .15s" }}><i className="fa fa-table" style={{marginRight:5}}></i>Table</button>
          </div>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Sort controls */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        <span style={{ fontSize:12, color:"var(--tx3)", alignSelf:"center", marginRight:4 }}>Sort by:</span>
        {tabBtn("risk","Risk Rate")}
        {tabBtn("students","Student Count")}
        {tabBtn("gpa","Avg GPA")}
      </div>

      {/* Summary KPIs */}
      <div style={S.grid("repeat(4,1fr)",14)}>
        {[
          ["Departments",  allDepts.length,   "#f59e0b", "building"],
          ["Total Students", students.length,  "#3b82f6", "users"],
          ["Overall At-Risk", `${students.filter(s=>s.gpa>0&&mlPredict(s).prediction===1).length}`, "#ef4444","exclamation-triangle"],
          ["Avg Risk Rate",  `${(deptData.reduce((a,d)=>a+d.riskRate,0)/Math.max(deptData.length,1)).toFixed(1)}%`, "#8b5cf6","pie-chart"],
        ].map(([label,value,color,icon])=>(
          <div key={label} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderLeft:`4px solid ${color}`, borderRadius:12, padding:16 }}>
            <div style={{ width:36, height:36, borderRadius:8, background:`${color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, color, marginBottom:10 }}><i className={`fa fa-${icon}`}></i></div>
            <div style={S.label}>{label}</div>
            <div style={{ fontFamily:"var(--mono)", fontSize:24, fontWeight:700, color, marginTop:6 }}>{value}</div>
          </div>
        ))}
      </div>

      {/* BAR CHART VIEW */}
      {view === "bar" && (
        <div style={S.col(12)}>
          <Card>
            <CardHeader title="Dropout Risk Rate by Department (%)" action={<span style={{ fontSize:11, color:"var(--tx3)" }}>Higher = more at-risk students</span>} />
            <div style={S.col(10)}>
              {sorted.map(d => {
                const pct = maxRisk > 0 ? (d.riskRate/maxRisk*100) : 0;
                const color = d.riskRate >= 50 ? "#ef4444" : d.riskRate >= 25 ? "#f59e0b" : "#10b981";
                return (
                  <div key={d.dept} style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ width:160, fontSize:12, color:"var(--tx2)", flexShrink:0, textAlign:"right", fontWeight:600 }}>{d.dept.length > 20 ? d.dept.slice(0,18)+"…" : d.dept}</div>
                    <div style={{ flex:1, height:28, background:"rgba(255,255,255,.04)", borderRadius:7, overflow:"hidden", position:"relative" }}>
                      <div style={{ height:"100%", width:`${pct}%`, background:color, borderRadius:7, transition:"width .8s ease", minWidth:d.riskRate>0?8:0 }} />
                      <div style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", fontSize:11, fontWeight:700, color:pct>30?"#fff":"var(--tx2)" }}>{d.riskRate.toFixed(1)}% ({d.atRisk}/{d.withData})</div>
                    </div>
                    <span style={{ ...S.tag(color), fontSize:10, flexShrink:0 }}>{d.riskRate >= 50 ? "HIGH" : d.riskRate >= 25 ? "MED" : "LOW"}</span>
                  </div>
                );
              })}
            </div>
          </Card>

          <div style={S.grid("1fr 1fr",16)}>
            <Card>
              <CardHeader title="Student Count by Department" />
              <div style={S.col(8)}>
                {[...deptData].sort((a,b)=>b.studs-a.studs).map(d => (
                  <div key={d.dept} style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:130, fontSize:11, color:"var(--tx3)", flexShrink:0, textAlign:"right" }}>{d.dept.slice(0,16)}{d.dept.length>16?"…":""}</div>
                    <div style={{ flex:1, height:20, background:"rgba(255,255,255,.04)", borderRadius:5, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${d.studs/maxStudents*100}%`, background:"#3b82f6", borderRadius:5, transition:"width .6s ease" }} />
                    </div>
                    <span style={{ fontFamily:"var(--mono)", fontSize:11, width:24, textAlign:"right", color:"#3b82f6", fontWeight:700 }}>{d.studs}</span>
                  </div>
                ))}
              </div>
            </Card>
            <Card>
              <CardHeader title="Avg GPA by Department" />
              <div style={S.col(8)}>
                {[...deptData].sort((a,b)=>b.avgGPA-a.avgGPA).map(d => {
                  const gpaColor = d.avgGPA < 2.0 ? "#ef4444" : d.avgGPA < 2.5 ? "#f59e0b" : "#10b981";
                  return (
                    <div key={d.dept} style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ width:130, fontSize:11, color:"var(--tx3)", flexShrink:0, textAlign:"right" }}>{d.dept.slice(0,16)}{d.dept.length>16?"…":""}</div>
                      <div style={{ flex:1, height:20, background:"rgba(255,255,255,.04)", borderRadius:5, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:`${d.avgGPA/4.0*100}%`, background:gpaColor, borderRadius:5, transition:"width .6s ease" }} />
                      </div>
                      <span style={{ fontFamily:"var(--mono)", fontSize:11, width:36, textAlign:"right", color:gpaColor, fontWeight:700 }}>{d.avgGPA.toFixed(2)}</span>
                    </div>
                  );
                })}
              </div>
            </Card>
          </div>
        </div>
      )}

      {/* TABLE VIEW */}
      {view === "table" && (
        <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:12, background:"var(--sur)" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"var(--sur2)" }}>
                {["Department","Students","At Risk","Risk Rate","Avg GPA","Poor Fin.","Status"].map(h=>(
                  <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:"var(--tx3)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map(d => {
                const riskColor = d.riskRate>=50?"var(--red)":d.riskRate>=25?"var(--amber)":"var(--green)";
                const statusLabel = d.riskRate>=50?"High Risk":d.riskRate>=25?"Moderate":"Healthy";
                return (
                  <tr key={d.dept} style={{ borderBottom:"1px solid var(--bdr)" }}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(59,130,246,.04)"}
                    onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <td style={{ padding:"12px 14px", fontWeight:700 }}>{d.dept}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:"#3b82f6", fontWeight:700 }}>{d.studs}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:"var(--red)", fontWeight:700 }}>{d.atRisk}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:riskColor, fontWeight:800 }}>{d.riskRate.toFixed(1)}%</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color: d.avgGPA<2?"var(--red)":d.avgGPA<2.5?"var(--amber)":"var(--green)" }}>{d.avgGPA.toFixed(2)}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:"var(--red)" }}>{d.poorFin}</td>
                    <td style={{ padding:"12px 14px" }}><span style={{ ...S.tag(d.riskRate>=50?"#ef4444":d.riskRate>=25?"#f59e0b":"#10b981"), fontSize:10 }}>{statusLabel}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

// ─── AUDIT LOG PAGE ───────────────────────────────────────────────────────────
const AuditLogPage = ({ auditLog=[] }) => {
  const [search, setSearch] = useState("");
  const [filterBy, setFilterBy] = useState(""); // action category filter
  // Quick filter driven by clicking one of the summary tiles at the top.
  //   null         → no quick filter (show everything subject to search/category)
  //   "all"        → all events (mostly cosmetic, lets the user "select" Total Events)
  //   "predictions"|"interventions"|"logins" → drill-down by event type
  const [quickFilter, setQuickFilter] = useState(null);
  // Ref used to scroll the entries table into view when a tile is clicked.
  const tableRef = React.useRef(null);

  const getCategory = (action) => {
    if(action.includes("Login"))    return "Login";
    if(action.includes("Logout"))   return "Logout";
    if(action.toLowerCase().includes("predict")) return "Prediction";
    if(action.toLowerCase().includes("intervention")) return "Intervention";
    if(action.includes("Student") || action.includes("student")) return "Student";
    if(action.includes("Lecturer") || action.includes("lecturer")) return "Lecturer";
    if(action.includes("Action"))   return "Action";
    return "System";
  };

  // Quick-filter predicate so the same logic is reused for both the count on
  // each tile and the visible rows when a tile is active. Keeping it in one
  // place guarantees "the number on the tile" === "the rows shown below".
  const matchesQuickFilter = (e, qf) => {
    if(!qf || qf === "all") return true;
    const a = (e.action || "").toLowerCase();
    if(qf === "predictions")    return a.includes("predict");
    if(qf === "interventions")  return a.includes("intervention");
    if(qf === "logins")         return a.includes("login");   // catches "Login" / "Failed login" etc.
    return true;
  };

  const filtered = auditLog.filter(e => {
    const q = search.toLowerCase();
    const matchSearch = !q || e.action.toLowerCase().includes(q) || (e.target||"").toLowerCase().includes(q) || (e.by||"").toLowerCase().includes(q);
    const matchCategory = !filterBy || getCategory(e.action) === filterBy;
    const matchQuick    = matchesQuickFilter(e, quickFilter);
    return matchSearch && matchCategory && matchQuick;
  });

  const categories = Array.from(new Set(auditLog.map(e => getCategory(e.action))));

  // Click handler shared by every summary tile. Clicking the active tile
  // again clears the filter — feels natural for a "toggle" interaction.
  const toggleQuick = (key) => {
    setQuickFilter(curr => curr === key ? null : key);
    // Smoothly scroll the entries table into view so the admin sees the
    // filtered results immediately even on a small viewport.
    setTimeout(() => {
      tableRef.current?.scrollIntoView({ behavior:"smooth", block:"start" });
    }, 40);
  };

  const getIcon = (action) => {
    if(action.includes("Login")) return { icon:"sign-in", color:"#10b981" };
    if(action.includes("Logout")) return { icon:"sign-out", color:"#6b7280" };
    if(action.includes("Prediction") || action.includes("prediction")) return { icon:"magic", color:"#8b5cf6" };
    if(action.includes("Intervention") || action.includes("intervention")) return { icon:"clipboard", color:"#3b82f6" };
    if(action.includes("Student") || action.includes("student")) return { icon:"user", color:"#0ea5e9" };
    if(action.includes("Action")) return { icon:"check-circle", color:"#10b981" };
    return { icon:"cog", color:"#f59e0b" };
  };

  return (
    <div style={S.col(20)}>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-history" style={{fontSize:18,marginRight:8}}></i>Audit Log</h2>
            <p style={S.sub}>Complete record of all system actions — predictions, logins, interventions and changes.</p>
          </div>
          <div style={S.flex(8)}>
            <span style={{ fontSize:12, color:"var(--tx3)" }}>{auditLog.length} total events</span>
          </div>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Summary tiles — every tile is now a click-to-filter shortcut.
          Clicking a tile filters the entries table below to just that
          category. Clicking the active tile again clears the filter. */}
      {auditLog.length > 0 && (
        <div style={S.grid("repeat(4,1fr)",14)}>
          {[
            ["Total Events",  "all",           auditLog.length,                                                             "#f59e0b","history"],
            ["Predictions",   "predictions",   auditLog.filter(e=>e.action.toLowerCase().includes("predict")).length,         "#8b5cf6","magic"],
            ["Interventions", "interventions", auditLog.filter(e=>e.action.toLowerCase().includes("intervention")).length,    "#3b82f6","clipboard"],
            ["Logins",        "logins",        auditLog.filter(e=>e.action.toLowerCase().includes("login")).length,            "#10b981","sign-in"],
          ].map(([label,key,value,color,icon])=>{
            const active = quickFilter === key;
            return (
              <div
                key={label}
                role="button"
                tabIndex={0}
                onClick={() => toggleQuick(key)}
                onKeyDown={(ev) => { if(ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); toggleQuick(key); } }}
                title={active ? `Showing only ${label.toLowerCase()} — click again to clear` : `Click to view only ${label.toLowerCase()}`}
                style={{
                  background: active ? `${color}12` : "var(--sur)",
                  border: active ? `1px solid ${color}80` : "1px solid var(--bdr)",
                  borderLeft: `4px solid ${color}`,
                  borderRadius: 12,
                  padding: "14px 16px",
                  cursor: "pointer",
                  transition: "transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease",
                  transform: active ? "translateY(-2px)" : "none",
                  boxShadow: active ? `0 8px 24px ${color}30` : "none",
                  position: "relative",
                  userSelect: "none",
                }}
                onMouseEnter={(ev) => {
                  if(!active) { ev.currentTarget.style.transform = "translateY(-2px)"; ev.currentTarget.style.boxShadow = `0 8px 24px ${color}22`; }
                }}
                onMouseLeave={(ev) => {
                  if(!active) { ev.currentTarget.style.transform = "none"; ev.currentTarget.style.boxShadow = "none"; }
                }}
              >
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                  <div style={{ width:34, height:34, borderRadius:8, background:`${color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, color }}>
                    <i className={`fa fa-${icon}`}></i>
                  </div>
                  {active && (
                    <span style={{ fontSize:9, fontWeight:800, padding:"3px 7px", borderRadius:100, background:color, color:"#fff", letterSpacing:".05em", textTransform:"uppercase" }}>
                      <i className="fa fa-filter" style={{ marginRight:4 }}></i>Active
                    </span>
                  )}
                </div>
                <div style={S.label}>{label}</div>
                <div style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:700, color, marginTop:5 }}>{value}</div>
                <div style={{ fontSize:10, color:"var(--tx3)", marginTop:6, fontStyle: active ? "italic" : "normal" }}>
                  {active ? "Filter applied — click to clear" : "Click to filter the log →"}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Active-filter banner that tells the admin exactly what they're
          looking at, with a one-click "Clear" so they're never stuck. */}
      {quickFilter && (
        <div style={{ display:"flex", alignItems:"center", gap:10, background:"rgba(59,130,246,.08)", border:"1px solid rgba(59,130,246,.3)", borderRadius:10, padding:"10px 14px", fontSize:12, color:"var(--tx2)" }}>
          <i className="fa fa-filter" style={{ color:"var(--blue)" }}></i>
          <span>
            Showing <strong>{filtered.length}</strong> {quickFilter === "all" ? "event" : quickFilter.slice(0, -1)}{filtered.length === 1 ? "" : "s"} {quickFilter === "all" ? "" : `(filtered to "${quickFilter}")`}.
          </span>
          <Btn size="sm" variant="ghost" onClick={() => setQuickFilter(null)} style={{ marginLeft:"auto" }}>
            <i className="fa fa-times" style={{ marginRight:4 }}></i>Clear filter
          </Btn>
        </div>
      )}

      {/* Filters */}
      <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:200 }}>
          <i className="fa fa-search" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--tx3)", fontSize:13, pointerEvents:"none" }}></i>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search actions, students, users…" style={{ paddingLeft:32 }} />
        </div>
        <select value={filterBy} onChange={e=>setFilterBy(e.target.value)} style={{ width:"auto", fontSize:12 }}>
          <option value="">All Categories</option>
          {categories.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>

      {/* Log entries */}
      <div ref={tableRef} />
      {auditLog.length === 0 ? (
        <Card>
          <Empty icon={<i className="fa fa-history" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No audit events recorded yet. Actions like logins, predictions and interventions will appear here." />
        </Card>
      ) : filtered.length === 0 ? (
        <Card><Empty icon={<i className="fa fa-search" style={{fontSize:36,color:"var(--tx3)"}}></i>} text={quickFilter ? `No ${quickFilter === "all" ? "events" : quickFilter} match your current filters.` : "No events match your search."} /></Card>
      ) : (
        <Card p={0}>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"var(--sur2)" }}>
                  {["#","Time","Action","Target","Performed By"].map(h=>(
                    <th key={h} style={{ padding:"10px 16px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".09em", color:"var(--tx3)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.slice(0,200).map((e,i)=>{
                  const { icon, color } = getIcon(e.action);
                  return (
                    <tr key={i} style={{ borderBottom:"1px solid var(--bdr)" }}
                      onMouseEnter={ev=>ev.currentTarget.style.background="rgba(59,130,246,.04)"}
                      onMouseLeave={ev=>ev.currentTarget.style.background=""}>
                      <td style={{ padding:"10px 16px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{filtered.length-i}</td>
                      <td style={{ padding:"10px 16px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)", whiteSpace:"nowrap" }}>
                        {new Date(e.ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})} {new Date(e.ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}
                      </td>
                      <td style={{ padding:"10px 16px" }}>
                        <div style={S.flex(8,"center")}>
                          <div style={{ width:26, height:26, borderRadius:6, background:`${color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color, flexShrink:0 }}><i className={`fa fa-${icon}`}></i></div>
                          <span style={{ fontWeight:600, fontSize:12 }}>{e.action}</span>
                        </div>
                      </td>
                      <td style={{ padding:"10px 16px", fontSize:12, color:"var(--tx2)" }}>{e.target || "—"}</td>
                      <td style={{ padding:"10px 16px", fontSize:12, color:"var(--tx3)" }}>{e.by || "System"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {filtered.length > 200 && <div style={{ padding:"10px 16px", fontSize:12, color:"var(--tx3)", textAlign:"center" }}>Showing 200 of {filtered.length} events</div>}
        </Card>
      )}
    </div>
  );
};

// ─── STUDENT LIST TABLE ───────────────────────────────────────────────────────
const StudentListTable = ({ students, onView, onPredict, onEdit, onDelete, role, externalSearch="" }) => {
  const [search, setSearch] = useState(externalSearch);
  const [filterRisk, setFilterRisk] = useState("");
  const [page, setPage] = useState(1);
  const PER = 8;

  // Sync external search (from topbar) into local search
  React.useEffect(() => { setSearch(externalSearch); setPage(1); }, [externalSearch]);

  const filtered = useMemo(() => {
    let d = students.map(s => ({ ...s, _pred: mlPredict(s) }));
    if(filterRisk === "risk") d = d.filter(s => s._pred.prediction === 1);
    if(filterRisk === "safe") d = d.filter(s => s._pred.prediction === 0);
    if(search) d = d.filter(s => `${s.name} ${s.sid} ${s.dept}`.toLowerCase().includes(search.toLowerCase()));
    return d;
  }, [students, search, filterRisk]);

  const pages = Math.max(1, Math.ceil(filtered.length / PER));
  const slice = filtered.slice((page-1)*PER, page*PER);

  return (
    <div>
      <div style={{ ...S.flex(10,"center"), marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:180 }}>
          <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--tx3)", fontSize:14, pointerEvents:"none" }}><i className="fa fa-search"></i></span>
          <input value={search} onChange={e => {setSearch(e.target.value);setPage(1);}} placeholder="Search name, ID, department…" style={{ paddingLeft:30 }} />
        </div>
        <select value={filterRisk} onChange={e => {setFilterRisk(e.target.value);setPage(1);}} style={{ width:"auto" }}>
          <option value="">All Status</option>
          <option value="risk">At Risk</option>
          <option value="safe">Not At Risk</option>
        </select>
      </div>
      <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:12, background:"var(--sur)" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"var(--sur2)" }}>
              {["SID","Name","GPA","Financial","Dept","Year · Sem","Status","Actions"].map(h => (
                <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {slice.map(s => (
              <tr key={s.id} style={{ borderBottom:"1px solid var(--bdr)", cursor:"pointer" }}
                onMouseEnter={e => e.currentTarget.style.background="rgba(59,130,246,.04)"}
                onMouseLeave={e => e.currentTarget.style.background=""}>
                <td style={{ padding:"11px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{s.sid}</td>
                <td style={{ padding:"11px 14px", fontWeight:600 }} onClick={() => onView?.(s)}>{s.name}</td>
                <td style={{ padding:"11px 14px", fontFamily:"var(--mono)" }}>{Number(s.gpa||0).toFixed(2)}</td>
                <td style={{ padding:"11px 14px" }}><FinBadge fin={s.fin} /></td>
                <td style={{ padding:"11px 14px", fontSize:12, color:"var(--tx3)" }}>{s.dept}</td>
                <td style={{ padding:"11px 14px", fontSize:12, color:"var(--tx3)" }}>{formatStudentPeriodLine(s)}</td>
                <td style={{ padding:"11px 14px" }}><RiskBadge risk={s._pred.prediction} score={s._pred.risk} /></td>
                <td style={{ padding:"11px 14px", whiteSpace:"nowrap" }}>
                  <div style={S.flex(4)}>
                    {onView    && <Btn size="sm" variant="ghost" title="View Student"   onClick={() => onView(s)}><i className="fa fa-eye"></i></Btn>}
                    {onEdit    && role !== "student" && <Btn size="sm" variant="ghost" title="Edit Student" onClick={() => onEdit(s)}><i className="fa fa-pencil"></i></Btn>}
                    {onPredict && <Btn size="sm" title="Run Prediction" onClick={() => onPredict(s)} style={{ background:"#8b5cf6", color:"#fff", fontSize:11, padding:"4px 8px", borderRadius:6, border:"none", cursor:"pointer", display:"inline-flex", alignItems:"center", gap:4 }}><i className="fa fa-magic"></i> Predict</Btn>}
                    {onDelete  && role === "admin"   && <Btn size="sm" variant="danger" title="Delete Student" onClick={() => onDelete(s.id)}><i className="fa fa-trash"></i></Btn>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {slice.length === 0 && <Empty icon={<i className="fa fa-users" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No students match your search." />}
      </div>
      <div style={{ ...S.flex(0,"center","space-between"), marginTop:12, fontSize:12, color:"var(--tx3)" }}>
        <span>Showing {slice.length} of {filtered.length} students</span>
        {pages > 1 && (
          <div style={S.flex(4)}>
            <Btn size="sm" variant="ghost" onClick={() => setPage(p => Math.max(1,p-1))} disabled={page===1}>‹</Btn>
            {Array.from({length:Math.min(pages,6)},(_,i) => (
              <Btn key={i+1} size="sm" variant={page===i+1?"primary":"ghost"} onClick={() => setPage(i+1)}>{i+1}</Btn>
            ))}
            <Btn size="sm" variant="ghost" onClick={() => setPage(p => Math.min(pages,p+1))} disabled={page===pages}>›</Btn>
          </div>
        )}
      </div>

    </div>
  );
};

// ─── STUDENT FACTORS OVERVIEW ────────────────────────────────────────────────
// Compact table showing every factor each student has submitted so the admin
// can see the full picture at a glance from the dashboard. Whatever a student
// has filled in appears here; empty fields render as "—". Rows are sorted by
// the time the student submitted so the freshest data is always on top, and
// submissions made in the last 60 seconds get a pulsing "Just submitted"
// badge so the admin can see when a student has just sent their factors.
const StudentFactorsOverview = ({ students = [], onView }) => {
  const [search, setSearch]     = useState("");
  const [factorFilter, setFactorFilter] = useState("");   // ""|"missing"|"complete"
  const [pageNum, setPageNum]   = useState(1);
  const [now, setNow]           = useState(() => Date.now());
  const PER = 10;

  // Refresh the "Just submitted" highlight every 10s so it fades correctly.
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 10000);
    return () => clearInterval(t);
  }, []);

  // A student is "complete" only when every prediction factor is recorded.
  const isComplete = (s) => s
    && s.age != null && s.age !== ""
    && s.feesLevel != null
    && s.familyBackground != null
    && s.workingStatus != null
    && s.courseChoice != null
    && s.homeResponsibility != null
    && s.hasHealthIssue != null
    && !!s.semesterResultFile;

  const filtered = useMemo(() => {
    let d = students.slice();
    if(search) d = d.filter(s => `${s.name} ${s.sid} ${s.dept}`.toLowerCase().includes(search.toLowerCase()));
    if(factorFilter === "missing")  d = d.filter(s => !isComplete(s));
    if(factorFilter === "complete") d = d.filter(s =>  isComplete(s));
    // Newest submission first so admins instantly see a student that just
    // pressed "Submit". Students who haven't submitted go to the end.
    d.sort((a, b) => {
      const ta = a.submittedAt ? new Date(a.submittedAt).getTime() : 0;
      const tb = b.submittedAt ? new Date(b.submittedAt).getTime() : 0;
      return tb - ta;
    });
    return d;
  }, [students, search, factorFilter]);

  const pages = Math.max(1, Math.ceil(filtered.length / PER));
  const slice = filtered.slice((pageNum - 1) * PER, pageNum * PER);

  const head  = { padding:"10px 12px", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--tx3)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap", textAlign:"left", background:"var(--sur2)" };
  const cell  = { padding:"9px 12px",  fontSize:12, color:"var(--tx2)", whiteSpace:"nowrap", borderBottom:"1px solid var(--bdr)" };
  const greenAmberRed = ["var(--green)", "var(--amber)", "var(--red)"];

  const fmtFin  = v => v != null ? (["Good","Moderate","Poor"][Number(v)] || "—") : "—";
  const fmtFees = v => v != null ? (["Stable","Moderate","Serious"][Number(v)] || "—") : "—";
  const fmtFam  = v => v != null ? (["Strong","Average","Low"][Number(v)] || "—") : "—";
  const fmtHome = v => v != null ? (["Low","Moderate","High"][Number(v)] || "—") : "—";
  const fmtBool = v => v != null ? (Number(v) === 1 ? "Yes" : "No") : "—";
  const fmtAge  = v => v != null && v !== "" ? `${v}` : "—";
  // Build a compact "Y1·S2" badge from the student's saved year + semester so
  // the admin can see at a glance what period each row was submitted for.
  const fmtPeriod = (s) => {
    const yNum = parseYearOfStudy(s.year);
    const sNum = studentSemesterInYear(s);
    return `Y${yNum}·S${sNum}`;
  };

  const colorAge = v => v == null || v === "" ? "var(--tx3)" : Number(v) >= 60 ? "var(--red)" : Number(v) >= 45 ? "var(--amber)" : "var(--green)";
  const colorIdx = (v, palette = greenAmberRed) => v == null ? "var(--tx3)" : (palette[Number(v)] || "var(--tx2)");

  return (
    <div>
      <div style={{ ...S.flex(10,"center"), marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:180 }}>
          <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--tx3)", fontSize:14, pointerEvents:"none" }}><i className="fa fa-search"></i></span>
          <input value={search} onChange={e => { setSearch(e.target.value); setPageNum(1); }} placeholder="Search name, ID, department…" style={{ paddingLeft:30 }} />
        </div>
        <select value={factorFilter} onChange={e => { setFactorFilter(e.target.value); setPageNum(1); }} style={{ width:"auto" }}>
          <option value="">All submissions</option>
          <option value="missing">Incomplete factors</option>
          <option value="complete">All factors submitted</option>
        </select>
      </div>
      <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:12, background:"var(--sur)" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr>
              {["Student","SID","Dept","Year/Sem","Submitted","GPA","Financial","Age","Fees","Family","Working","Own choice","Home resp.","Health","Med form","Sem result"].map(h => (
                <th key={h} style={head}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {slice.map(s => {
              const gpaColor   = !s.gpa ? "var(--tx3)" : s.gpa < 2 ? "var(--red)" : s.gpa < 2.5 ? "var(--amber)" : "var(--green)";
              const submitTs   = s.submittedAt ? new Date(s.submittedAt).getTime() : 0;
              const ageMs      = submitTs ? now - submitTs : Infinity;
              const isJustNow  = submitTs && ageMs < 60_000;
              const isFresh    = submitTs && ageMs < 5 * 60_000;
              const submitText = submitTs
                ? (isJustNow ? "Just now"
                   : ageMs < 60 * 60_000 ? `${Math.max(1, Math.floor(ageMs / 60_000))} min ago`
                   : ageMs < 24 * 60 * 60_000 ? `${Math.floor(ageMs / 3_600_000)}h ago`
                   : new Date(s.submittedAt).toLocaleDateString("en-GB", { day:"2-digit", month:"short" }))
                : "Not yet";
              const rowBg = isJustNow ? "rgba(34,197,94,.10)" : "";
              return (
                <tr key={s.id} onClick={() => onView?.(s)}
                    style={{ cursor: onView ? "pointer" : "default", background: rowBg, transition:"background .25s ease" }}
                    onMouseEnter={e => e.currentTarget.style.background = isJustNow ? "rgba(34,197,94,.18)" : "rgba(245,158,11,.05)"}
                    onMouseLeave={e => e.currentTarget.style.background = rowBg}>
                  <td style={{ ...cell, fontWeight:700, color:"var(--tx)" }}>
                    {s.name}
                    {isJustNow && (
                      <span style={{ marginLeft:8, fontSize:9, fontWeight:800, padding:"2px 6px", borderRadius:100, background:"var(--green)", color:"#fff", letterSpacing:"0.04em", textTransform:"uppercase", verticalAlign:"middle" }}>
                        <i className="fa fa-bolt" style={{marginRight:3}}></i>New
                      </span>
                    )}
                  </td>
                  <td style={{ ...cell, fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{s.sid}</td>
                  <td style={{ ...cell, color:"var(--tx3)" }}>{s.dept || "—"}</td>
                  <td style={{ ...cell, fontFamily:"var(--mono)", fontSize:11, fontWeight:700, color:"var(--tx2)" }} title={`Year ${parseYearOfStudy(s.year)} · Semester ${studentSemesterInYear(s)}`}>{fmtPeriod(s)}</td>
                  <td style={{ ...cell, fontFamily:"var(--mono)", fontSize:11, color: submitTs ? (isFresh ? "var(--green)" : "var(--tx2)") : "var(--tx3)", fontWeight: isJustNow ? 700 : 400 }}>{submitText}</td>
                  <td style={{ ...cell, fontFamily:"var(--mono)", color:gpaColor }}>{s.gpa ? Number(s.gpa).toFixed(2) : "—"}</td>
                  <td style={{ ...cell, color: colorIdx(s.fin) }}>{fmtFin(s.fin)}</td>
                  <td style={{ ...cell, color: colorAge(s.age) }}>{fmtAge(s.age)}</td>
                  <td style={{ ...cell, color: colorIdx(s.feesLevel) }}>{fmtFees(s.feesLevel)}</td>
                  <td style={{ ...cell, color: colorIdx(s.familyBackground) }}>{fmtFam(s.familyBackground)}</td>
                  <td style={{ ...cell, color: s.workingStatus == null ? "var(--tx3)" : Number(s.workingStatus) === 1 ? "var(--amber)" : "var(--green)" }}>{fmtBool(s.workingStatus)}</td>
                  <td style={{ ...cell, color: s.courseChoice == null ? "var(--tx3)" : Number(s.courseChoice) === 1 ? "var(--green)" : "var(--red)" }}>{fmtBool(s.courseChoice)}</td>
                  <td style={{ ...cell, color: colorIdx(s.homeResponsibility) }}>{fmtHome(s.homeResponsibility)}</td>
                  <td style={{ ...cell, color: s.hasHealthIssue == null ? "var(--tx3)" : Number(s.hasHealthIssue) === 1 ? "var(--red)" : "var(--green)" }}>{fmtBool(s.hasHealthIssue)}</td>
                  {(() => {
                    // Med form column: only highlight the missing case when the
                    // student has actually declared a health issue. Healthy
                    // students see a neutral "N/A — no health issue".
                    const declared = Number(s.hasHealthIssue) === 1;
                    if(s.medicalFormFile) {
                      return <td style={{ ...cell, color:"var(--green)" }}>Uploaded</td>;
                    }
                    if(!declared) {
                      return <td style={{ ...cell, color:"var(--tx3)", fontStyle:"italic" }} title="Not required — student has not declared any health issue.">N/A</td>;
                    }
                    return <td style={{ ...cell, color:"var(--amber)" }} title="Health issue declared but no medical form attached.">Missing</td>;
                  })()}
                  <td style={{ ...cell, color: s.semesterResultFile ? "var(--green)" : "var(--red)" }}>{s.semesterResultFile ? "Uploaded" : "—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {slice.length === 0 && <Empty icon={<i className="fa fa-users" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No students match your filter." />}
      </div>
      <div style={{ ...S.flex(0,"center","space-between"), marginTop:12, fontSize:12, color:"var(--tx3)" }}>
        <span>Showing {slice.length} of {filtered.length} students</span>
        {pages > 1 && (
          <div style={S.flex(4)}>
            <Btn size="sm" variant="ghost" onClick={() => setPageNum(p => Math.max(1, p - 1))} disabled={pageNum === 1}>‹</Btn>
            {Array.from({ length: Math.min(pages, 6) }, (_, i) => (
              <Btn key={i + 1} size="sm" variant={pageNum === i + 1 ? "primary" : "ghost"} onClick={() => setPageNum(i + 1)}>{i + 1}</Btn>
            ))}
            <Btn size="sm" variant="ghost" onClick={() => setPageNum(p => Math.min(pages, p + 1))} disabled={pageNum === pages}>›</Btn>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── PREDICTION FORM ──────────────────────────────────────────────────────────
const PredictionForm = ({ student, onResult, onBack, depts=DEPTS }) => {
  const { settings } = useContext(SettingsCtx) || { settings: DEFAULT_SETTINGS };
  const courseYears = Math.min(6, Math.max(1, parseInt(student?.courseYears ?? settings?.defaultCourseYears ?? 3, 10) || 3));
  const maxYear = courseYears;

  const [form, setForm] = useState({
    gpa:  student ? student.gpa  : 2.8,
    fin:  student ? student.fin  : 1,
    age:  student && student.age != null ? student.age : "",
    name: student ? student.name : "",
    dept: student ? student.dept : "",
    notes: "",
    yearOfStudy: student ? parseYearOfStudy(student.year) : 1,
    semesterInYear: student ? studentSemesterInYear(student) : 1,
    academicYear: settings?.academicYear || "2025/2026",
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));

  React.useEffect(() => {
    setForm(f => ({
      ...f,
      gpa: student ? student.gpa : 2.8,
      fin: student ? student.fin : 1,
      age: student && student.age != null ? student.age : f.age,
      name: student ? student.name : "",
      dept: student ? student.dept : "",
      yearOfStudy: student ? parseYearOfStudy(student.year) : f.yearOfStudy,
      semesterInYear: student ? studentSemesterInYear(student) : f.semesterInYear,
      academicYear: settings?.academicYear || f.academicYear,
    }));
  }, [student?.id, student?.year, student?.semesterInYear, settings?.academicYear]);

  const PRESETS = [
    { label:"High Performer",   gpa:3.8, fin:0, age:21, name:"High Performer" },
    { label:"Borderline",       gpa:2.4, fin:1, age:23, name:"Borderline" },
    { label:"High Risk",        gpa:1.8, fin:2, age:24, name:"High Risk" },
    { label:"Mature learner",   gpa:3.0, fin:1, age:62, name:"Mature Learner" },
  ];

  const submit = () => {
    setError("");
    if(form.gpa < 1.5 || form.gpa > 4.0) { setError("GPA must be 1.5–4.0."); return; }
    if(+form.yearOfStudy < 1 || +form.yearOfStudy > maxYear) { setError(`Year of study must be between 1 and ${maxYear}.`); return; }
    if(form.age !== "" && (+form.age < 21 || +form.age > 80)) { setError("Age must be between 21 and 80 — university applicants under 21 are not accepted."); return; }
    setLoading(true);
    setTimeout(() => {
      // Feed every recorded factor into the model — not just GPA / financial.
      // When the form is run for an existing student, their stored fields
      // (feesLevel, family support, working status, course choice, home
      // responsibility, health, medical form, semester result …) all
      // contribute alongside the values typed in this form.
      const ageVal = form.age === "" ? (student?.age ?? null) : +form.age;
      const predictInput = {
        ...(student || {}),
        gpa: +form.gpa,
        fin: +form.fin,
        ...(ageVal != null && ageVal !== "" ? { age: ageVal } : {}),
      };
      const res = mlPredict(predictInput);
      const meta = buildPeriodMeta({
        yearOfStudy: form.yearOfStudy,
        semesterInYear: form.semesterInYear,
        academicYearLabel: form.academicYear,
        courseYears,
      });
      const out = {
        ...(student || {}),
        gpa:+form.gpa,
        fin:+form.fin,
        ...(ageVal != null && ageVal !== "" ? { age: ageVal } : {}),
        name: student ? student.name : form.name,
        dept: student ? student.dept : form.dept,
        sid: student?.sid,
        year: `Year ${form.yearOfStudy}`,
        notes: form.notes,
        ...meta,
      };
      setLoading(false);
      onResult?.(res, out);
    }, 700);
  };

  const SliderField = ({ label, k, min, max, step, suffix="" }) => (
    <FieldGroup label={label} required>
      <div style={{ ...S.flex(8,"center"), marginBottom:6 }}>
        <input type="range" min={min} max={max} step={step} value={form[k]}
          onChange={e => upd(k, parseFloat(e.target.value))} style={{ flex:1 }} />
        <span style={{ fontFamily:"var(--mono)", fontSize:13, fontWeight:600, color:"var(--primary,#3b82f6)", minWidth:50, textAlign:"right" }}>
          {parseFloat(form[k]).toFixed(step < 1 ? 2 : 0)}{suffix}
        </span>
      </div>
      <input type="number" min={min} max={max} step={step} value={form[k]}
        onChange={e => upd(k, parseFloat(e.target.value) || 0)} />
    </FieldGroup>
  );

  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      {onBack && <Btn variant="ghost" size="sm" onClick={onBack} style={{ marginBottom:16 }}>← Back</Btn>}

      {!student && (
        <div style={{ marginBottom:18 }}>
          <div style={{ ...S.label, marginBottom:10 }}>Quick Test Profiles</div>
          <div style={S.flex(8, "center", "flex-start")}>
            {PRESETS.map((p,i) => (
              <Btn key={i} size="sm" variant="ghost" onClick={() => setForm(f => ({...f,...p}))}>{p.label}</Btn>
            ))}
          </div>
        </div>
      )}

      <div style={S.grid("1fr 1fr", 14)}>
        <SliderField label="GPA" k="gpa" min={1.5} max={4.0} step={0.05} />
        <FieldGroup label="Age (years)">
          <input
            type="number"
            min={21}
            max={80}
            step={1}
            value={form.age}
            onChange={e => upd("age", e.target.value)}
            placeholder={student?.age != null ? String(student.age) : "21"}
          />
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Age is one of the factors weighted by the model — older learners (45+) typically face higher dropout risk.
          </div>
        </FieldGroup>
      </div>

      <FieldGroup label="Financial Status" required>
        <select value={form.fin} onChange={e => upd("fin", parseInt(e.target.value))}>
          <option value={0}>Good — No financial difficulties</option>
          <option value={1}>Moderate — Some financial strain</option>
          <option value={2}>Poor — Significant hardship</option>
        </select>
      </FieldGroup>

      {student && (
        <div style={{ fontSize:11, color:"var(--tx3)", marginBottom:14, padding:"10px 12px", background:"rgba(59,130,246,.06)", border:"1px solid rgba(59,130,246,.2)", borderRadius:9, lineHeight:1.55 }}>
          <i className="fa fa-info-circle" style={{ marginRight:6, color:"var(--blue)" }}></i>
          The model also weighs every factor on this student's record — fees status, family support, working status, course choice, home responsibility, health, medical form and semester result. Edit them on the student profile to change the prediction.
        </div>
      )}

      <div style={{ ...S.label, marginBottom:8 }}>Academic period (each semester builds your long-term trend)</div>
      <div style={S.grid("1fr 1fr 1fr", 12)}>
        <FieldGroup label={`Year of study (1–${maxYear})`} required>
          <select value={form.yearOfStudy} onChange={e => upd("yearOfStudy", +e.target.value)}>
            {Array.from({ length: maxYear }, (_, i) => i + 1).map(y => <option key={y} value={y}>Year {y}</option>)}
          </select>
        </FieldGroup>
        <FieldGroup label="Semester" required>
          <select value={form.semesterInYear} onChange={e => upd("semesterInYear", +e.target.value)}>
            <option value={1}>Semester 1</option>
            <option value={2}>Semester 2</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Session label" required>
          <input value={form.academicYear} onChange={e => upd("academicYear", e.target.value)} placeholder="2025/2026" />
        </FieldGroup>
      </div>
      <div style={{ fontSize:11, color:"var(--tx3)", marginBottom:12, lineHeight:1.5 }}>
        Program length: <strong>{courseYears} year{courseYears>1?"s":""}</strong> ({totalCourseSemesters(courseYears)} semester checkpoints). Run again each semester until final year.
      </div>

      {!student && (
        <div style={S.grid("1fr 1fr", 12)}>
          <FieldGroup label="Student Name / ID">
            <input value={form.name} onChange={e => upd("name", e.target.value)} placeholder="e.g. John Doe or STU-001" />
          </FieldGroup>
          <FieldGroup label="Department">
            <select value={form.dept} onChange={e => upd("dept", e.target.value)}>
              <option value="">— Select —</option>
              {depts.map(d => <option key={d}>{d}</option>)}
            </select>
          </FieldGroup>
        </div>
      )}

      <FieldGroup label="Notes (Optional)">
        <textarea value={form.notes} onChange={e => upd("notes", e.target.value)} placeholder="Additional observations…" />
      </FieldGroup>

      {error && <Alert type="error" style={{ marginBottom:12 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}

      <Btn size="lg" onClick={submit} disabled={loading} style={{ background:"var(--primary,#3b82f6)" }}>
        {loading ? <><Spinner /> Analysing…</> : <><i className="fa fa-bolt"></i> Run Prediction</>}
      </Btn>
    </div>
  );
};

// ─── ADD/EDIT STUDENT FORM ────────────────────────────────────────────────────
const StudentForm = ({ initial, onSave, onBack, title="Add New Student", depts=DEPTS, existingStudents=[] }) => {
  const { settings } = useContext(SettingsCtx) || { settings: DEFAULT_SETTINGS };
  const defaultFormFields = () => ({
    firstName:"", lastName:"", sid:"", email:"",
    feesLevel:"1", familyBackground:"1", workingStatus:"0", courseChoice:"1",
    age:"", homeResponsibility:"1", hasHealthIssue:"0", medicalFormSubmitted:"0", semesterResultSubmitted:"0",
    dept:"", year:"", semesterInYear:"1", notes:"",
    courseYears: String(settings?.defaultCourseYears ?? 3),
  });
  const [form, setForm] = useState(() => {
    const d = defaultFormFields();
    if(!initial) return d;
    const cy = initial.courseYears != null && initial.courseYears !== ""
      ? initial.courseYears
      : (settings?.defaultCourseYears ?? 3);
    return { ...d, ...initial, courseYears: String(cy) };
  });
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const upd = (k,v) => setForm(f => ({...f,[k]:v}));

  const isEditing = !!(initial && initial.id);
  const submit = () => {
    setError(""); setSuccess("");
    if(!form.firstName||!form.lastName) { setError("First and last name are required."); return; }
    if(!form.sid) { setError("Student ID is required."); return; }
    if(!isEditing && !form.email) { setError("Email is required — the student will use it to log in."); return; }
    if(form.email && !/^[a-z]+\.[a-z]+@unik\.ac\.ug$/i.test(form.email.trim())) { setError("Email must be in university format: jn.nakamya@unik.ac.ug"); return; }
    if(!form.age || +form.age < 21 || +form.age > 80) { setError("Age must be between 21 and 80 — university applicants under 21 are not accepted."); return; }
    const fullName = `${form.firstName.trim()} ${form.lastName.trim()}`;
    const sidUpper = form.sid.trim().toUpperCase();
    // Duplicate check — skip the student's own record when editing
    const others = isEditing ? existingStudents.filter(s => String(s.id) !== String(initial.id)) : existingStudents;
    const dupSid  = others.find(s => s.sid  && s.sid.trim().toUpperCase() === sidUpper);
    const dupName = others.find(s => s.name && s.name.trim().toLowerCase() === fullName.toLowerCase());
    if(dupSid)  { setError(`Student ID "${form.sid}" is already assigned to ${dupSid.name}. Use a unique ID.`); return; }
    if(dupName) { setError(`A student named "${fullName}" already exists (${dupName.sid}). Check if this is a duplicate.`); return; }
    const feesLevel = +form.feesLevel;
    const familyBackground = +form.familyBackground;
    const workingStatus = +form.workingStatus;
    const courseChoice = +form.courseChoice;
    const age = +form.age;
    const homeResponsibility = +form.homeResponsibility;
    const hasHealthIssue = +form.hasHealthIssue;
    const medicalFormSubmitted = +form.medicalFormSubmitted;
    const semesterResultSubmitted = +form.semesterResultSubmitted;
    const courseYears = Math.min(6, Math.max(2, parseInt(String(form.courseYears).trim(), 10) || settings?.defaultCourseYears || 3));
    const semesterInYear = parseInt(form.semesterInYear, 10) === 2 ? 2 : 1;
    const gpa = Math.max(1.5, Math.min(4.0, 4.0 - (feesLevel*0.35 + workingStatus*0.25 + homeResponsibility*0.2 + hasHealthIssue*0.2 + (courseChoice===0 ? 0.2 : 0))));
    const fin = feesLevel;
    // Use the FULL feature set (not only GPA / financial) so age and every other
    // input the student supplied influence the dropout prediction.
    const pred = mlPredict({
      gpa, fin, age, feesLevel, familyBackground, workingStatus, courseChoice,
      homeResponsibility, hasHealthIssue, medicalFormSubmitted, semesterResultSubmitted,
    });
    const student = {
      ...form, name:fullName,
      feesLevel, familyBackground, workingStatus, courseChoice, age, homeResponsibility, hasHealthIssue, medicalFormSubmitted, semesterResultSubmitted,
      gpa, fin, courseYears,
      semesterInYear,
      _pred: pred
    };
    setSuccess(`Student "${student.name}" saved. Model predicts: ${pred.prediction===1?"At Risk":"Not at Risk"} (${(pred.risk*100).toFixed(1)}%)`);
    onSave?.(student);
  };

  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      {onBack && <Btn variant="ghost" size="sm" onClick={onBack} style={{ marginBottom:16 }}>← Back</Btn>}
      <div style={{ ...S.label, marginBottom:16 }}>{title}</div>

      <div style={S.grid("1fr 1fr",14)}>
        <FieldGroup label="First Name" required><input value={form.firstName} onChange={e=>upd("firstName",e.target.value)} placeholder="Alice" /></FieldGroup>
        <FieldGroup label="Last Name"  required><input value={form.lastName}  onChange={e=>upd("lastName",e.target.value)}  placeholder="Nakamya" /></FieldGroup>
        <FieldGroup label="Student ID" required><input value={form.sid}       onChange={e=>upd("sid",e.target.value)}        placeholder="STU-2024-001" /></FieldGroup>
        <FieldGroup label="Email (for login)" required>
          <input type="email" value={form.email} onChange={e=>upd("email",e.target.value.toLowerCase())} placeholder="jn.nakamya@unik.ac.ug" />
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Format: <strong>initials.lastname@unik.ac.ug</strong> — e.g. jn.nakamya@unik.ac.ug
          </div>
        </FieldGroup>
        <FieldGroup label="Fees Status" required>
          <select value={form.feesLevel} onChange={e=>upd("feesLevel",e.target.value)}>
            <option value="0">Stable</option><option value="1">Moderate challenge</option><option value="2">Serious challenge</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Family Background Support" required>
          <select value={form.familyBackground} onChange={e=>upd("familyBackground",e.target.value)}>
            <option value="0">Strong support</option><option value="1">Average support</option><option value="2">Low support</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Working While Studying" required>
          <select value={form.workingStatus} onChange={e=>upd("workingStatus",e.target.value)}>
            <option value="0">Not working</option><option value="1">Working part-time/full-time</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Course Is Student Choice?" required>
          <select value={form.courseChoice} onChange={e=>upd("courseChoice",e.target.value)}>
            <option value="1">Yes (own choice)</option><option value="0">No (not own choice)</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Age" required><input type="number" value={form.age} onChange={e=>upd("age",e.target.value)} min={21} max={80} step={1} placeholder="21" /></FieldGroup>
        <FieldGroup label="Responsibility at Home" required>
          <select value={form.homeResponsibility} onChange={e=>upd("homeResponsibility",e.target.value)}>
            <option value="0">Low</option><option value="1">Moderate</option><option value="2">High</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Health Issues" required>
          <select value={form.hasHealthIssue} onChange={e=>upd("hasHealthIssue",e.target.value)}>
            <option value="0">No</option><option value="1">Yes</option>
          </select>
        </FieldGroup>
        <FieldGroup
          label="Medical Form Attached"
          required={Number(form.hasHealthIssue) === 1}
          help={Number(form.hasHealthIssue) === 1
            ? "Required because a health issue is declared."
            : "Only required if the student has declared a health issue."}
        >
          <select
            value={Number(form.hasHealthIssue) === 1 ? form.medicalFormSubmitted : "0"}
            onChange={e=>upd("medicalFormSubmitted",e.target.value)}
            disabled={Number(form.hasHealthIssue) !== 1}
          >
            <option value="1">Submitted</option>
            <option value="0">{Number(form.hasHealthIssue) === 1 ? "Not submitted" : "Not required"}</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Semester Result Sheet/Document" required>
          <select value={form.semesterResultSubmitted} onChange={e=>upd("semesterResultSubmitted",e.target.value)}>
            <option value="1">Submitted</option><option value="0">Not submitted</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Department">
          <select value={form.dept} onChange={e=>upd("dept",e.target.value)}>
            <option value="">— Select —</option>{depts.map(d=><option key={d}>{d}</option>)}
          </select>
        </FieldGroup>
        <FieldGroup label="Year of Study">
          <select value={form.year} onChange={e=>upd("year",e.target.value)}>
            <option value="">—</option>{["Year 1","Year 2","Year 3","Year 4","Postgraduate"].map(y=><option key={y}>{y}</option>)}
          </select>
        </FieldGroup>
        <FieldGroup label="Current semester">
          <select value={String(form.semesterInYear)} onChange={e=>upd("semesterInYear", e.target.value)}>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Programme length (years)">
          <select value={form.courseYears} onChange={e=>upd("courseYears", e.target.value)}>
            {[2,3,4,5,6].map(y => <option key={y} value={y}>{y} year{y>1?"s":""} ({y*2} semesters)</option>)}
          </select>
          <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
            <i className="fa fa-info-circle" style={{marginRight:4}}></i>
            Sets semester checkpoints for predictions &amp; trend. System default is {settings?.defaultCourseYears ?? 3} years if not changed.
          </div>
        </FieldGroup>
      </div>
      <FieldGroup label="Notes"><textarea value={form.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Observations…" /></FieldGroup>

      {error   && <Alert type="error"   style={{ marginBottom:12 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}
      {success && <Alert type="success" style={{ marginBottom:12 }}><i className="fa fa-check-circle" style={{marginRight:6}}></i>{success}</Alert>}
      <Btn size="lg" onClick={submit} style={{ background:"var(--primary,#3b82f6)" }}><i className="fa fa-floppy-o"></i> Save Student</Btn>
    </div>
  );
};

// ─── CALENDAR PAGE ────────────────────────────────────────────────────────────
const CALENDAR_COLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#0ea5e9","#ec4899"];
const EVENT_TYPES = ["Class","Assignment","Exam","Meeting","Reminder","Deadline","Personal"];

const CalendarPage = () => {
  const { user } = useContext(AuthCtx);
  const today = new Date();
  const [curYear,  setCurYear]  = useState(today.getFullYear());
  const [curMonth, setCurMonth] = useState(today.getMonth());
  const [view,     setView]     = useState("month"); // month | week | agenda
  const [events,   setEvents]   = useState([
    { id:1,  title:"Academic Progress Review", date:"2026-03-11", type:"Meeting",    color:"#8b5cf6", desc:"Department review of student academic standing for Q1.", allDay:true },
    { id:2,  title:"GPA Submission Deadline", date:"2026-03-14", type:"Deadline",   color:"#ef4444", desc:"Final GPA entries must be submitted.", allDay:true },
    { id:3,  title:"Student Counselling",     date:"2026-03-17", type:"Meeting",    color:"#0ea5e9", desc:"One-on-one counselling for at-risk students.", allDay:false, time:"10:00" },
    { id:4,  title:"Mid-Semester Exams",      date:"2026-03-20", type:"Exam",       color:"#f59e0b", desc:"Mid-semester examination period begins.", allDay:true },
    { id:5,  title:"Dropout Risk Report",     date:"2026-03-25", type:"Assignment", color:"#10b981", desc:"Quarterly dropout risk report due.", allDay:true },
    { id:6,  title:"Faculty Meeting",         date:"2026-03-28", type:"Meeting",    color:"#8b5cf6", desc:"All-faculty academic planning meeting.", allDay:false, time:"14:00" },
    { id:7,  title:"Course Registration",     date:"2026-04-01", type:"Reminder",   color:"#3b82f6", desc:"New semester course registration opens.", allDay:true },
    { id:8,  title:"Study Group",             date:"2026-03-13", type:"Class",      color:"#10b981", desc:"Group study session in library.", allDay:false, time:"09:00" },
    { id:9,  title:"Assignment Due",          date:"2026-03-19", type:"Deadline",   color:"#ef4444", desc:"Research assignment submission.", allDay:false, time:"23:59" },
    { id:10, title:"Semester Break Begins",   date:"2026-04-10", type:"Personal",   color:"#ec4899", desc:"End of first semester.", allDay:true },
  ]);
  const [modal,    setModal]    = useState(null);  // null | "view" | "add" | "edit"
  const [selEvent, setSelEvent] = useState(null);
  const [selDate,  setSelDate]  = useState(null);
  const [form,     setForm]     = useState({ title:"", date:"", type:"Class", color:"#3b82f6", desc:"", allDay:true, time:"09:00" });
  const [filterType, setFilterType] = useState("");
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
  const firstDayOfMonth = (y,m) => new Date(y,m,1).getDay();

  const monthEvents = useMemo(() => {
    const prefix = `${curYear}-${String(curMonth+1).padStart(2,"0")}`;
    return events.filter(e => e.date.startsWith(prefix) && (!filterType || e.type===filterType));
  }, [events, curYear, curMonth, filterType]);

  const eventsForDate = d => {
    const key = `${curYear}-${String(curMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return events.filter(e => e.date === key && (!filterType || e.type===filterType));
  };

  const openAdd = (dateStr) => {
    setForm({ title:"", date:dateStr||`${curYear}-${String(curMonth+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`, type:"Class", color:"#3b82f6", desc:"", allDay:true, time:"09:00" });
    setModal("add");
  };

  const saveEvent = () => {
    if(!form.title.trim() || !form.date) return;
    if(modal === "edit" && selEvent) {
      setEvents(prev => prev.map(e => e.id===selEvent.id ? {...e,...form} : e));
    } else {
      setEvents(prev => [...prev, {...form, id:Date.now()}]);
    }
    setModal(null); setSelEvent(null);
  };

  const deleteEvent = (id) => { setEvents(prev => prev.filter(e=>e.id!==id)); setModal(null); setSelEvent(null); };

  const prevMonth = () => { if(curMonth===0){setCurMonth(11);setCurYear(y=>y-1);}else setCurMonth(m=>m-1); };
  const nextMonth = () => { if(curMonth===11){setCurMonth(0);setCurYear(y=>y+1);}else setCurMonth(m=>m+1); };

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const totalDays = daysInMonth(curYear, curMonth);
  const startDay  = firstDayOfMonth(curYear, curMonth);
  const cells     = Array.from({length: Math.ceil((totalDays+startDay)/7)*7}, (_,i) => {
    const d = i - startDay + 1;
    return (d >= 1 && d <= totalDays) ? d : null;
  });

  const isToday = d => d && curYear===today.getFullYear() && curMonth===today.getMonth() && d===today.getDate();

  // Agenda: all upcoming events sorted
  const agendaEvents = useMemo(() => {
    const todayStr = today.toISOString().slice(0,10);
    return [...events]
      .filter(e => e.date >= todayStr && (!filterType || e.type===filterType))
      .sort((a,b)=>a.date.localeCompare(b.date));
  }, [events, filterType]);

  return (
    <div style={S.col(20)}>
      {/* Header */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"center","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-calendar" style={{marginRight:8}}></i>Calendar</h2>
            <p style={{ ...S.sub }}>Schedule & manage academic events, deadlines and reminders</p>
          </div>
          <div style={S.flex(8)}>
            <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{ width:"auto", fontSize:12 }}>
              <option value="">All Types</option>
              {EVENT_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
            {["month","week","agenda"].map(v=>(
              <Btn key={v} size="sm" variant={view===v?"primary":"ghost"} onClick={()=>setView(v)}
                style={view===v?{}:{}}>{v.charAt(0).toUpperCase()+v.slice(1)}</Btn>
            ))}
            <Btn size="sm" onClick={()=>openAdd("")} style={{ background:"var(--primary,#3b82f6)" }}><i className="fa fa-plus"></i> New Event</Btn>
          </div>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Month/Week Navigation */}
      {view !== "agenda" && (
        <div style={{ ...S.flex(0,"center","space-between"), background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:12, padding:"12px 18px" }}>
